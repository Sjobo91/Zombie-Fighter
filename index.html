<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Mortimer's Horde</title>
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
  body { cursor: none; }
  #game { display: block; position: fixed; inset: 0; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
"use strict";
/* =========================================================================
   MORTIMER'S HORDE — a 2.5D gothic action-RPG
   Single self-contained file. Plain Canvas 2D + WebAudio. No build, no assets.

   An angled top-down ARPG: a lone survivor cuts through the undead in a
   ruined town that opens up district by district. Level up, allocate stats,
   pick a boon after every wave, and earn milestone perks.

   Sections: config · helpers · input · audio · world · area · figures ·
   entities · combat · upgrades · progression · loot · fx · camera ·
   lighting · hud · choice · screens · state · loop
   ========================================================================= */
(function () {

/* ─── config ─────────────────────────────────────────────────────────────── */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const lightCanvas = document.createElement("canvas");
const lctx = lightCanvas.getContext("2d");
let W = 0, H = 0;
function resize() {
  W = canvas.width = lightCanvas.width = window.innerWidth;
  H = canvas.height = lightCanvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

const WORLD = { w: 3200, h: 2560 };

const P = {
  speed: 204, dashSpeed: 760, r: 16,
  baseHp: 120, baseDmg: 7, baseCrit: 0.13, baseCritMul: 2.0,
  atkRange: 116, atkArc: 1.18,
  atkWindup: 0.10, atkStrike: 0.13, atkRecover: 0.15,
  smashRange: 172, smashDmg: 26, smashCd: 4.2,
  dashCd: 1.8, dashTime: 0.17, dashIframes: 0.3,
};

// archetypes — HP is FIXED (no per-wave scaling); the horde gets meaner
// through numbers, speed, damage and tougher types instead.
const ETYPES = {
  shambler: { hp: 6,   speed: 52, dmg: 8,  r: 15, h: 50,  xp: 9,  knock: 1.0 },
  runner:   { hp: 5,   speed: 132,dmg: 6,  r: 12, h: 44,  xp: 13, knock: 1.4 },
  brute:    { hp: 26,  speed: 46, dmg: 20, r: 23, h: 72,  xp: 34, knock: 0.45 },
  giant:    { hp: 130, speed: 36, dmg: 34, r: 37, h: 108, xp: 130,knock: 0.16 },
};

const DISTRICTS = ["The Graveyard", "The Iron Gate", "The Old Streets", "The Market Square", "The Outer Ward"];

/* ─── helpers ────────────────────────────────────────────────────────────── */
const TAU = Math.PI * 2;
const rand  = (a, b) => a + Math.random() * (b - a);
const randi = (a, b) => (a + Math.random() * (b - a + 1)) | 0;
const pick  = (arr) => arr[(Math.random() * arr.length) | 0];
const clamp = (v, a, b) => (v < a ? a : v > b ? b : v);
const lerp  = (a, b, t) => a + (b - a) * t;
const easeOut = (t) => 1 - (1 - t) * (1 - t);
const easeIn  = (t) => t * t;
function angDiff(a, b) { let d = b - a; while (d > Math.PI) d -= TAU; while (d < -Math.PI) d += TAU; return d; }
function pick3(pool) {
  const c = pool.slice(), out = [];
  for (let i = 0; i < 3 && c.length; i++) out.push(c.splice((Math.random() * c.length) | 0, 1)[0]);
  return out;
}

/* ─── input ──────────────────────────────────────────────────────────────── */
const keys = Object.create(null);
const mouse = { x: W / 2, y: H / 2, down: false };
window.addEventListener("keydown", (e) => {
  keys[e.code] = true;
  if (state === ST.PLAYING) {
    if (e.code === "Space") tryDash();
    if (e.code === "KeyQ" || e.code === "KeyE") trySmash();
  }
});
window.addEventListener("keyup", (e) => { keys[e.code] = false; });
canvas.addEventListener("mousemove", (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
canvas.addEventListener("mousedown", (e) => {
  if (e.button === 0) {
    mouse.down = true;
    if (state === ST.TITLE) startGame();
    else if (state === ST.GAMEOVER) { if (gameOverT > 1.1) startGame(); }
    else if (state === ST.CHOICE) clickChoice();
    else if (state === ST.PLAYING) tryAttack();
  } else if (e.button === 2 && state === ST.PLAYING) trySmash();
});
canvas.addEventListener("mouseup", (e) => { if (e.button === 0) mouse.down = false; });
canvas.addEventListener("contextmenu", (e) => e.preventDefault());

/* ─── audio ──────────────────────────────────────────────────────────────── */
const Sound = (() => {
  let ac = null;
  function actx() { if (!ac) { try { ac = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} } return ac; }
  function tone(type, f0, f1, dur, vol, when) {
    const c = actx(); if (!c) return;
    const t = c.currentTime + (when || 0);
    const o = c.createOscillator(), g = c.createGain();
    o.type = type; o.frequency.setValueAtTime(f0, t);
    o.frequency.exponentialRampToValueAtTime(Math.max(1, f1), t + dur);
    g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.0008, t + dur);
    o.connect(g).connect(c.destination); o.start(t); o.stop(t + dur + 0.02);
  }
  function noise(dur, vol, type, f, q) {
    const c = actx(); if (!c) return;
    const t = c.currentTime;
    const b = c.createBuffer(1, Math.max(1, (dur * c.sampleRate) | 0), c.sampleRate), d = b.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 1.8);
    const s = c.createBufferSource(); s.buffer = b;
    const fl = c.createBiquadFilter(); fl.type = type; fl.frequency.value = f; if (q) fl.Q.value = q;
    const g = c.createGain(); g.gain.value = vol;
    s.connect(fl).connect(g).connect(c.destination); s.start(t); s.stop(t + dur + 0.02);
  }
  return {
    actx,
    swing() { noise(0.2, 0.32, "bandpass", 2600, 3); },
    hit()   { noise(0.16, 0.46, "lowpass", 780); tone("sine", 175, 48, 0.14, 0.4); },
    crit()  { noise(0.18, 0.5, "lowpass", 950); tone("sine", 240, 55, 0.18, 0.46); tone("square", 600, 300, 0.1, 0.16); },
    smash() { noise(0.4, 0.55, "lowpass", 420); tone("sine", 130, 32, 0.5, 0.55); },
    dash()  { noise(0.22, 0.28, "highpass", 900); },
    hurt()  { tone("sawtooth", 200, 70, 0.3, 0.38); },
    groan() { tone("sawtooth", 56 + Math.random() * 18, 33, 0.7, 0.06); },
    die()   { noise(0.3, 0.28, "lowpass", 500); tone("sawtooth", 90, 30, 0.4, 0.14); },
    pickup(){ tone("triangle", 520, 880, 0.12, 0.18); },
    levelup(){ [0,0.1,0.2,0.33].forEach((o,i)=>tone("triangle",330*Math.pow(1.26,i),330*Math.pow(1.26,i),0.22,0.18,o)); },
    choose(){ tone("triangle", 440, 660, 0.14, 0.22); },
    wave()  { tone("sawtooth", 84, 36, 1.2, 0.2); },
    open()  { tone("sawtooth", 70, 150, 1.4, 0.24); noise(0.8, 0.2, "lowpass", 300); },
    step()  { noise(0.05, 0.12, "lowpass", 300); },
    heart() { tone("sine", 60, 32, 0.16, 0.32); tone("sine", 58, 30, 0.14, 0.28, 0.17); },
  };
})();
const Ambience = (() => {
  let on = false, nodes = [], master = null, stingT = 0;
  function start() {
    const c = Sound.actx(); if (!c || on) return;
    on = true;
    master = c.createGain();
    master.gain.setValueAtTime(0.0001, c.currentTime);
    master.gain.linearRampToValueAtTime(0.44, c.currentTime + 5);
    const lp = c.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = 230;
    lp.connect(master); master.connect(c.destination);
    [[39,0.15,"sawtooth"],[39.5,0.15,"sawtooth"],[58,0.09,"sine"]].forEach(v => {
      const o = c.createOscillator(); o.type = v[2]; o.frequency.value = v[0];
      const g = c.createGain(); g.gain.value = v[1];
      o.connect(g).connect(lp); o.start(); nodes.push(o);
    });
    const lfo = c.createOscillator(); lfo.frequency.value = 0.06;
    const lg = c.createGain(); lg.gain.value = 0.2;
    lfo.connect(lg).connect(master.gain); lfo.start(); nodes.push(lfo);
    stingT = rand(7, 13);
  }
  function update(dt) {
    if (!on) return;
    stingT -= dt;
    if (stingT <= 0) {
      stingT = rand(8, 17);
      const c = Sound.actx(); if (!c) return;
      const base = 230 + Math.random() * 460, t = c.currentTime;
      [base, base * 1.414].forEach(f => {
        const o = c.createOscillator(); o.type = "triangle"; o.frequency.value = f;
        const g = c.createGain();
        g.gain.setValueAtTime(0.0001, t);
        g.gain.linearRampToValueAtTime(0.038, t + 0.9);
        g.gain.linearRampToValueAtTime(0.0001, t + 3.4);
        o.connect(g).connect(c.destination); o.start(t); o.stop(t + 3.5);
      });
    }
  }
  function stop() {
    if (!on) return; on = false;
    const c = Sound.actx();
    if (c && master) master.gain.linearRampToValueAtTime(0.0001, c.currentTime + 1.3);
    const dy = nodes; nodes = [];
    setTimeout(() => dy.forEach(o => { try { o.stop(); } catch (e) {} }), 1500);
  }
  return { start, update, stop };
})();

/* ─── world ──────────────────────────────────────────────────────────────────
   The whole town is baked once onto an offscreen canvas, themed in rings
   (graveyard heart → streets → market). Props are placed by ring and y-sorted
   with the actors each frame. Only the area currently unlocked is reachable.  */
const worldCanvas = document.createElement("canvas");
worldCanvas.width = WORLD.w; worldCanvas.height = WORLD.h;
const wctx = worldCanvas.getContext("2d");
let props = [], braziers = [];

function ringOf(x, y) {                        // 0 graveyard · 1 streets · 2 market
  const d = Math.max(Math.abs(x - WORLD.w / 2) / 760, Math.abs(y - WORLD.h / 2) / 620);
  return d < 1 ? 0 : d < 1.9 ? 1 : 2;
}
function buildWorld() {
  const g = wctx;
  g.setTransform(1, 0, 0, 1, 0, 0);
  g.fillStyle = "#161417"; g.fillRect(0, 0, WORLD.w, WORLD.h);
  const tones = ["#100f12", "#1c1a17", "#13151a", "#1a1410"];
  for (let i = 0; i < 260; i++) {
    g.save(); g.translate(rand(0, WORLD.w), rand(0, WORLD.h)); g.rotate(rand(0, TAU));
    g.globalAlpha = rand(0.22, 0.6); g.fillStyle = pick(tones);
    g.beginPath(); g.ellipse(0, 0, rand(46, 180), rand(30, 110), 0, 0, TAU); g.fill();
    g.restore();
  }
  g.globalAlpha = 1;
  // cobble flecks, cracks, grass, old blood
  for (let i = 0; i < 1100; i++) {
    g.save(); g.translate(rand(0, WORLD.w), rand(0, WORLD.h)); g.rotate(rand(0, TAU));
    g.globalAlpha = rand(0.1, 0.3); g.strokeStyle = "#000"; g.lineWidth = 1.4;
    g.strokeRect(-rand(7, 16), -rand(6, 12), rand(14, 30), rand(12, 22));
    g.restore();
  }
  g.globalAlpha = 1; g.strokeStyle = "#070708"; g.lineWidth = 2;
  for (let i = 0; i < 170; i++) {
    g.save(); g.translate(rand(0, WORLD.w), rand(0, WORLD.h)); g.rotate(rand(0, TAU));
    g.beginPath(); g.moveTo(0, 0);
    let cx = 0, cy = 0;
    for (let s = 0, n = randi(3, 6); s < n; s++) { cx += rand(12, 34); cy += rand(-18, 18); g.lineTo(cx, cy); }
    g.stroke(); g.restore();
  }
  for (let i = 0; i < 560; i++) {
    g.save(); g.translate(rand(0, WORLD.w), rand(0, WORLD.h));
    g.strokeStyle = pick(["#23281a", "#2c2a17", "#1d2415"]); g.lineWidth = 1.5;
    for (let b = 0; b < 4; b++) { g.beginPath(); g.moveTo(0, 0); g.lineTo(rand(-4, 4), -rand(4, 9)); g.stroke(); }
    g.restore();
  }
  for (let i = 0; i < 34; i++) {
    g.save(); g.translate(rand(0, WORLD.w), rand(0, WORLD.h)); g.rotate(rand(0, TAU));
    g.globalAlpha = rand(0.4, 0.7); g.fillStyle = "#240d09";
    g.beginPath(); g.ellipse(0, 0, rand(18, 48), rand(12, 30), 0, 0, TAU); g.fill();
    g.restore();
  }
  g.globalAlpha = 1;

  // props, themed by ring
  props = []; braziers = [];
  const byRing = [
    ["grave","grave","grave","cross","tree","statue","crypt","bones","urn"],
    ["lamp","lamp","cart","barrel","crate","rubble","fountain","bones","tree"],
    ["stall","stall","crate","crate","barrel","cart","lamp","rubble","statue"],
  ];
  for (let i = 0; i < 240; i++) {
    const x = rand(120, WORLD.w - 120), y = rand(120, WORLD.h - 120);
    const t = pick(byRing[ringOf(x, y)]);
    props.push({ t, x, y, s: rand(0.85, 1.25), f: Math.random() < 0.5 ? -1 : 1, seed: Math.random() });
  }
  for (let i = 0; i < 16; i++) {
    const b = { t: "brazier", x: rand(280, WORLD.w - 280), y: rand(280, WORLD.h - 280),
                s: rand(0.9, 1.2), flick: Math.random() * TAU };
    braziers.push(b); props.push(b);
  }
}
function drawWorld() { ctx.drawImage(worldCanvas, 0, 0); }
function stainGround(x, y, r, col) {
  const g = wctx;
  g.save(); g.translate(x, y); g.rotate(rand(0, TAU));
  g.globalAlpha = rand(0.5, 0.8); g.fillStyle = col || "#3a0908";
  g.beginPath(); g.ellipse(0, 0, r, r * 0.7, 0, 0, TAU); g.fill();
  g.restore(); g.globalAlpha = 1;
}

/* ─── area ───────────────────────────────────────────────────────────────────
   The reachable ground starts narrow and opens outward as the run advances.  */
const AREA_STAGES = [
  { hx: 470, hy: 380 }, { hx: 720, hy: 560 }, { hx: 1020, hy: 800 },
  { hx: 1320, hy: 1040 }, { hx: 1560, hy: 1260 },
];
let areaStage = 0, area = null, areaTgt = null;
function stageRect(i) {
  const cx = WORLD.w / 2, cy = WORLD.h / 2, s = AREA_STAGES[i];
  return { x0: cx - s.hx, y0: cy - s.hy, x1: cx + s.hx, y1: cy + s.hy };
}
function expandArea() {
  if (areaStage >= AREA_STAGES.length - 1) return;
  areaStage++;
  areaTgt = stageRect(areaStage);
  banner = { big: "THE WAY OPENS", sub: DISTRICTS[areaStage], t: 3.2 };
  Sound.open();
}
function updateArea(dt) {
  area.x0 = lerp(area.x0, areaTgt.x0, 0.05);
  area.y0 = lerp(area.y0, areaTgt.y0, 0.05);
  area.x1 = lerp(area.x1, areaTgt.x1, 0.05);
  area.y1 = lerp(area.y1, areaTgt.y1, 0.05);
}
function drawAreaWall() {
  // a heavy ruined wall hemming in the unlocked ground
  ctx.save();
  ctx.fillStyle = "#0a0a0c";
  const t = 60;
  ctx.fillRect(area.x0 - t, area.y0 - t, area.x1 - area.x0 + t * 2, t);
  ctx.fillRect(area.x0 - t, area.y1, area.x1 - area.x0 + t * 2, t);
  ctx.fillRect(area.x0 - t, area.y0, t, area.y1 - area.y0);
  ctx.fillRect(area.x1, area.y0, t, area.y1 - area.y0);
  // rubble crown along the inner edge
  ctx.fillStyle = "#1a1a1e";
  for (let x = area.x0; x < area.x1; x += 46) {
    const h1 = 10 + (Math.sin(x * 0.7) + 1) * 7;
    ctx.fillRect(x, area.y0 - h1, 40, h1);
    const h2 = 10 + (Math.cos(x * 0.6) + 1) * 7;
    ctx.fillRect(x, area.y1, 40, h2);
  }
  for (let y = area.y0; y < area.y1; y += 46) {
    const h1 = 10 + (Math.sin(y * 0.6) + 1) * 7;
    ctx.fillRect(area.x0 - h1, y, h1, 40);
    const h2 = 10 + (Math.cos(y * 0.7) + 1) * 7;
    ctx.fillRect(area.x1, y, h2, 40);
  }
  ctx.restore();
}

/* ─── figures ────────────────────────────────────────────────────────────── */
function softShadow(rx, ry, a) {
  ctx.fillStyle = "rgba(0,0,0," + (a || 0.5) + ")";
  ctx.beginPath(); ctx.ellipse(0, 0, rx, ry, 0, 0, TAU); ctx.fill();
}
function rr(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function drawLimb(px, py, a, len, wid, col, dark, boot) {
  ctx.save();
  ctx.translate(px, py); ctx.rotate(a);
  ctx.fillStyle = col;
  rr(-wid / 2, 0, wid, len, wid / 2.5); ctx.fill();
  if (boot) { ctx.fillStyle = dark; rr(-wid / 2 - 1, len - 5, wid + 3, 8, 3); ctx.fill(); }
  else { ctx.fillStyle = "#b58d63"; ctx.beginPath(); ctx.arc(0, len, wid / 2.4, 0, TAU); ctx.fill(); }
  ctx.restore();
}

function drawSurvivor(e) {
  ctx.save();
  ctx.translate(e.x, e.y);
  softShadow(20, 9, 0.5);
  ctx.scale(e.facing, 1);

  const moving = e.moving ? 1 : 0;
  const run = e.running ? 1 : 0;
  const wp = e.walkP;
  const bob = -Math.abs(Math.sin(wp)) * (3 + run * 1.8) * moving;
  const breath = Math.sin(e.t * 2) * 0.8 * (1 - moving);
  // a forward lean when running
  ctx.rotate(moving * (0.06 + run * 0.06) * e.facing * Math.sign(Math.cos(e.aim) * e.facing || 1) * 0);
  let arm = -0.5;
  if (e.atk) {
    const a = e.atkT, w = e.atkW, s = e.atkS, r = e.atkR;
    if (a < w) arm = lerp(-0.5, -2.5, easeOut(a / w));
    else if (a < w + s) arm = lerp(-2.5, 1.2, easeIn((a - w) / s));
    else arm = lerp(1.2, -0.5, (a - w - s) / r);
  }
  const amp = 0.5 + run * 0.42;
  const legA = Math.sin(wp) * amp * moving;
  const legB = Math.sin(wp + Math.PI) * amp * moving;

  // cloak
  ctx.fillStyle = "#1a0e10";
  ctx.beginPath();
  ctx.moveTo(-4, -47);
  ctx.quadraticCurveTo(-15 - moving * 8, -26, -9 + Math.sin(e.t * 3) * 2, -2);
  ctx.quadraticCurveTo(2, -8, 6, -47);
  ctx.closePath(); ctx.fill();

  ctx.translate(0, bob + breath);
  drawLimb(-2, -28, legB, 13, 11, "#241f24", "#0c0a0c", true);
  drawLimb(2, -28, legA, 14, 12, "#2a242a", "#0c0a0c", true);
  drawLimb(-3, -45, -0.4 + legA * 0.7, 11, 10, "#241a1c", "#171012", false);

  ctx.fillStyle = "#2c2630"; rr(-9, -45, 18, 20, 5); ctx.fill();
  ctx.fillStyle = "#3a3340"; rr(-7, -44, 14, 12, 4); ctx.fill();
  ctx.fillStyle = "#1c1820"; ctx.fillRect(-9, -29, 18, 4);
  ctx.fillStyle = "#6b5a2e"; ctx.fillRect(-3, -29, 6, 4);
  ctx.fillStyle = "#454050"; ctx.beginPath(); ctx.ellipse(6, -45, 6, 5, 0, 0, TAU); ctx.fill();
  ctx.fillStyle = "#5a5466"; ctx.beginPath(); ctx.ellipse(6, -46, 4, 3, 0, 0, TAU); ctx.fill();

  ctx.fillStyle = "#241a1c"; ctx.beginPath(); ctx.arc(1, -53, 8.5, 0, TAU); ctx.fill();
  ctx.fillStyle = "#0e0a0c"; ctx.beginPath(); ctx.ellipse(4, -52, 5.2, 6, 0, 0, TAU); ctx.fill();
  ctx.fillStyle = "#b58d63"; ctx.beginPath(); ctx.ellipse(5, -52, 3, 4, 0, 0, TAU); ctx.fill();
  ctx.fillStyle = "#caa86f"; ctx.fillRect(5.5, -53.5, 2, 1.4);
  ctx.fillStyle = "#241a1c"; ctx.beginPath();
  ctx.moveTo(-6, -54); ctx.lineTo(-2, -62); ctx.lineTo(3, -56); ctx.closePath(); ctx.fill();

  ctx.save();
  ctx.translate(4, -45); ctx.rotate(arm);
  ctx.fillStyle = "#322a2e"; rr(-3, -2, 15, 7, 3); ctx.fill();
  ctx.translate(13, 1);
  ctx.fillStyle = "#b58d63"; ctx.beginPath(); ctx.arc(0, 0, 4, 0, TAU); ctx.fill();
  ctx.fillStyle = "#140f0a"; ctx.fillRect(-3, -2.4, 13, 4.8);
  ctx.fillStyle = "#2a2d33"; ctx.fillRect(10, -3.4, 4, 6.8);
  ctx.fillStyle = "#9298a1"; ctx.beginPath();
  ctx.moveTo(13, -6); ctx.lineTo(44, -12); ctx.lineTo(50, 9); ctx.lineTo(13, 6); ctx.closePath(); ctx.fill();
  ctx.fillStyle = "#d6dbe0"; ctx.beginPath();
  ctx.moveTo(13, -6); ctx.lineTo(44, -12); ctx.lineTo(44, -9); ctx.lineTo(13, -3); ctx.closePath(); ctx.fill();
  ctx.fillStyle = "rgba(120,18,12,0.55)"; ctx.fillRect(20, -3, 18, 5);
  ctx.restore();

  ctx.restore();

  if (e.dashT > 0) {
    ctx.save();
    ctx.globalAlpha = e.dashT / P.dashTime * 0.4;
    ctx.fillStyle = "#9fd0ff";
    ctx.beginPath();
    ctx.ellipse(e.x - Math.cos(e.moveAng) * 22, e.y - Math.sin(e.moveAng) * 22, 18, 10, e.moveAng, 0, TAU);
    ctx.fill();
    ctx.restore();
  }
}

function drawZombie(z) {
  const d = ETYPES[z.type];
  ctx.save();
  if (z.state === "die") ctx.globalAlpha = clamp(1 - z.dieT, 0, 1);
  ctx.translate(z.x, z.y);
  softShadow(d.r * 0.95, d.r * 0.42, 0.46);
  ctx.scale(z.facing, 1);
  ctx.scale(z.scale, z.scale);

  const wp = z.walkP, chasing = z.state === "chase" ? 1 : 0;
  const fast = clamp((z.speed - 50) / 90, 0, 1);            // runners lean & pump harder

}
function drawZLimb(px, py, a, len, wid, col, claw) {

}

function drawProp(p) {

    const fl = 1 + Math.sin(p.flick) * 0.18 + Math.sin(p.flick * 2.3) * 0.1;

    ctx.strokeStyle = "#0e0a06"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(-13, -2, 8, 0, TAU); ctx.arc(13, -2, 8, 0, TAU); ctx.stroke();

    ctx.fillStyle = "#10161c"; ctx.beginPath(); ctx.ellipse(0, -2, 23, 11, 0, 0, TAU); ctx.fill();
    ctx.fillStyle = "#3a3a42"; rr(-5, -34, 10, 30, 3); ctx.fill();
    ctx.beginPath(); ctx.arc(0, -36, 7, 0, TAU); ctx.fill();
  } else if (p.t === "stall") {
    softShadow(30 * s, 12 * s, 0.5); ctx.scale(s, s); ctx.scale(p.f, 1);
    ctx.fillStyle = "#241a10"; ctx.fillRect(-28, -8, 56, 8);            // counter
    ctx.strokeStyle = "#161009"; ctx.lineWidth = 5;                      // posts
    ctx.beginPath(); ctx.moveTo(-26, -8); ctx.lineTo(-26, -54); ctx.moveTo(26, -8); ctx.lineTo(26, -54); ctx.stroke();
    ctx.fillStyle = "#43221f"; ctx.beginPath();                          // tattered awning
    ctx.moveTo(-32, -54); ctx.lineTo(32, -54); ctx.lineTo(36, -44);
    ctx.lineTo(-10, -40); ctx.lineTo(-36, -44); ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#2c2014"; ctx.fillRect(-18, -16, 10, 8); ctx.fillRect(4, -16, 10, 8);
  } else if (p.t === "urn") {
    softShadow(10 * s, 5 * s, 0.4); ctx.scale(s, s);
    ctx.fillStyle = "#2e2a2e"; ctx.beginPath(); ctx.ellipse(0, -14, 9, 14, 0, 0, TAU); ctx.fill();
    ctx.fillStyle = "#201d20"; ctx.beginPath(); ctx.ellipse(0, -27, 7, 4, 0, 0, TAU); ctx.fill();
  } else {
    softShadow(16 * s, 8 * s, 0.4); ctx.scale(s, s);
    ctx.fillStyle = "#222227";
    for (let i = 0; i < 7; i++) { ctx.save(); ctx.rotate(i * 0.9 + p.seed);
      ctx.fillRect(rand(2, 12), -rand(3, 12), rand(9, 20), rand(8, 16)); ctx.restore(); }
  }
  ctx.restore();
}

/* ─── entities ───────────────────────────────────────────────────────────── */
let player = null, zombies = [];
function makePlayer() {
  return {
    kind: "p", x: WORLD.w / 2, y: WORLD.h / 2, facing: 1, t: 0,
    hp: P.baseHp, maxHp: P.baseHp,
    dmgMul: 1, atkSpeed: 1, moveMul: 1,
    critChance: P.baseCrit, critMul: P.baseCritMul, cdMul: 1, dmgTakenMul: 1,
    smashMul: 1, rangeMul: 1, lifesteal: 0, regen: 0, xpMul: 1,
    level: 1, xp: 0, xpNext: 26,
    stats: { str: 0, hp: 0, spd: 0 },
    walkP: 0, moving: false, running: false, stepT: 0, dustT: 0,
    atk: false, atkT: 0, atkW: 0, atkS: 0, atkR: 0, atkHits: null,
    aim: 0, moveAng: 0,
    smashCd: 0, dashCd: 0, dashT: 0, iframes: 0, hurt: 0, alive: true,
  };
}
function spawnZombie(type) {
  const d = ETYPES[type];
  let x, y, tries = 0;
  do {
    if (Math.random() < 0.5) { x = Math.random() < 0.5 ? area.x0 + 30 : area.x1 - 30; y = rand(area.y0 + 30, area.y1 - 30); }
    else { y = Math.random() < 0.5 ? area.y0 + 30 : area.y1 - 30; x = rand(area.x0 + 30, area.x1 - 30); }
    tries++;
  } while (Math.hypot(x - player.x, y - player.y) < 260 && tries < 12);
  const skins = ["#5f6a52", "#6b6256", "#586355", "#6d6450"];
  const sk = pick(skins);
  zombies.push({
    kind: "z", type, x, y, facing: 1, scale: rand(0.92, 1.12),
    hp: d.hp, maxHp: d.hp, speed: d.speed * (1 + wave * 0.015), r: d.r,
    state: "chase", walkP: rand(0, TAU), t: rand(0, 9), flash: 0,
    atkCd: rand(0.2, 1), stagger: 0, kx: 0, ky: 0, groanT: rand(2, 9), dustT: 0,
    pal: { skin: sk, skinD: shade(sk, 0.7), cloth: pick(["#221f1a","#26221d","#1d2024"]),
           cloth2: "#17140f", bone: "#b3ab93" },
  });
  zombiesAlive++;
}
function shade(hex, m) {
  const n = parseInt(hex.slice(1), 16);
  return "rgb(" + (((n>>16)&255)*m|0) + "," + (((n>>8)&255)*m|0) + "," + ((n&255)*m|0) + ")";
}

/* ─── combat ─────────────────────────────────────────────────────────────── */
function tryAttack() {
  if (player.atk || player.dashT > 0) return;
  player.atk = true; player.atkT = 0;
  player.atkW = P.atkWindup / player.atkSpeed;
  player.atkS = P.atkStrike / player.atkSpeed;
  player.atkR = P.atkRecover / player.atkSpeed;
  player.atkHits = new Set();
  Sound.swing();
}
function trySmash() {
  if (player.smashCd > 0 || !player.alive) return;
  player.smashCd = P.smashCd * player.cdMul;
  Sound.smash(); shake(13); flashLight(player.x, player.y, 240, 0.5);
  const rng = P.smashRange * (1 + (player.smashMul - 1) * 0.5);
  for (const z of zombies) {
    if (z.state === "die") continue;
    const dx = z.x - player.x, dy = z.y - player.y;
    if (Math.hypot(dx, dy) < rng + z.r)
      hitZombie(z, (P.smashDmg + player.level * 2) * player.dmgMul * player.smashMul, true, Math.atan2(dy, dx), 2.4);
  }
  for (let i = 0; i < 42; i++) {
    const a = rand(0, TAU);
    parts.push({ x: player.x, y: player.y, vx: Math.cos(a) * rand(120, 480), vy: Math.sin(a) * rand(120, 480),
                 life: rand(0.3, 0.6), age: 0, r: rand(2, 5), col: "#caa24a" });
  }
  smashRing = { t: 0, r: rng };
}
function tryDash() {
  if (player.dashCd > 0 || player.dashT > 0 || !player.alive) return;
  let mx = 0, my = 0;
  if (keys["KeyW"]) my -= 1; if (keys["KeyS"]) my += 1;
  if (keys["KeyA"]) mx -= 1; if (keys["KeyD"]) mx += 1;
  if (mx === 0 && my === 0) { mx = Math.cos(player.aim); my = Math.sin(player.aim); }
  player.moveAng = Math.atan2(my, mx);
  player.dashT = P.dashTime; player.dashCd = P.dashCd * player.cdMul;
  player.iframes = P.dashIframes;
  Sound.dash();
}
function meleeStrike() {
  let hits = 0;
  const range = P.atkRange * player.rangeMul, arc = P.atkArc * player.rangeMul;
  for (const z of zombies) {
    if (z.state === "die" || player.atkHits.has(z)) continue;
    const dx = z.x - player.x, dy = z.y - player.y, dist = Math.hypot(dx, dy);
    if (dist > range + z.r) continue;
    if (Math.abs(angDiff(player.aim, Math.atan2(dy, dx))) > arc) continue;
    player.atkHits.add(z);
    const crit = Math.random() < player.critChance;
    hitZombie(z, P.baseDmg * player.dmgMul * (crit ? player.critMul : 1), crit, Math.atan2(dy, dx), 1);
    hits++;
  }
  if (hits) {
    hitStop = 0.05; shake(4 + hits);
    if (player.lifesteal) { player.hp = Math.min(player.maxHp, player.hp + player.lifesteal); }
  }
}
function hitZombie(z, dmg, crit, ang, knockMul) {
  dmg = Math.max(1, Math.round(dmg));
  z.hp -= dmg; z.flash = 0.13;
  const kb = ETYPES[z.type].knock * 240 * (knockMul || 1);
  z.kx += Math.cos(ang) * kb; z.ky += Math.sin(ang) * kb;
  z.stagger = Math.max(z.stagger, 0.16);
  spawnBlood(z.x, z.y - ETYPES[z.type].h * z.scale * 0.5, ang, crit ? 22 : 13);
  damageNum(z.x, z.y - ETYPES[z.type].h * z.scale, dmg, crit);
  crit ? Sound.crit() : Sound.hit();
  if (z.hp <= 0 && z.state !== "die") killZombie(z);
}
function killZombie(z) {
  z.state = "die"; z.dieT = 0;
  zombiesAlive--;
  kills++; score += ETYPES[z.type].xp;
  gainXp(ETYPES[z.type].xp);
  stainGround(z.x, z.y, ETYPES[z.type].r * z.scale * 1.1);
  spawnBlood(z.x, z.y - 16, rand(0, TAU), 26);
  Sound.die();
  if (Math.random() < (z.type === "giant" ? 1 : z.type === "brute" ? 0.5 : 0.14))
    orbs.push({ x: z.x, y: z.y, t: 0 });
}

/* ─── progression ────────────────────────────────────────────────────────── */
let wave = 0, kills = 0, score = 0, zombiesAlive = 0;
let waveState = "fight", waveTimer = 0, toSpawn = [], spawnT = 0;
let banner = null, levelFx = 0;

function gainXp(n) {
  player.xp += Math.round(n * player.xpMul);
  while (player.xp >= player.xpNext) {
    player.xp -= player.xpNext;
    player.level++;
    // faster early, steeper later
    player.xpNext = Math.round(26 * Math.pow(player.level, 1.8));
    player.hp = Math.min(player.maxHp, player.hp + 14);
    levelFx = 1; Sound.levelup();
    for (let i = 0; i < 46; i++) {
      const a = rand(0, TAU);
      parts.push({ x: player.x, y: player.y - 24, vx: Math.cos(a) * rand(60, 300), vy: Math.sin(a) * rand(60, 300) - 80,
                   life: rand(0.5, 1), age: 0, r: rand(2, 5), col: "#ffe27a" });
    }
    if (player.level % 5 === 0)
      queueChoice({ kind: "perk", title: "MILESTONE — CHOOSE A PERK", opts: pick3(PERKS) });

}
function startWave(n) {
  wave = n;
  toSpawn = [];

  for (let i = 0; i < total; i++) {
    const r = Math.random();
    let t = "shambler";
    if (n >= 3 && r < 0.32) t = "runner";
    if (n >= 5 && r > 0.80) t = "brute";
    toSpawn.push(t);
  }
  if (n % 5 === 0) { toSpawn.push("giant"); if (n >= 15) toSpawn.push("giant"); }
  spawnT = 0.6;
  waveState = "fight";
  banner = { big: "WAVE " + n, sub: n % 5 === 0 ? "Something vast stirs" : "The horde presses in", t: 2.6 };
  Sound.wave();
  if (n === 3 || n === 5 || n === 7 || n === 9) expandArea();   // banner becomes "THE WAY OPENS"
}
function updateWaves(dt) {
  if (banner) { banner.t -= dt; if (banner.t <= 0) banner = null; }
  if (levelFx > 0) levelFx -= dt * 1.4;
  if (waveState === "fight") {
    if (toSpawn.length) {
      spawnT -= dt;
      if (spawnT <= 0 && zombiesAlive < 38) {
        spawnZombie(toSpawn.pop());
        spawnT = Math.max(0.2, 0.85 - wave * 0.035);
      }
    } else if (zombiesAlive <= 0) {
      waveState = "intermission";
      queueChoice({ kind: "wave", title: "WAVE " + wave + " CLEARED — CHOOSE A BOON", opts: pick3(UPGRADES) });
    }
  }
}

let orbs = [];
function updateOrbs(dt) {
  for (let i = orbs.length - 1; i >= 0; i--) {
    const o = orbs[i]; o.t += dt;
    const dx = player.x - o.x, dy = player.y - o.y, dist = Math.hypot(dx, dy);
    if (dist < 160) { o.x += dx / dist * 340 * dt; o.y += dy / dist * 340 * dt; }
    if (dist < 26) {
      player.hp = Math.min(player.maxHp, player.hp + Math.round(player.maxHp * 0.22));
      Sound.pickup();
      for (let k = 0; k < 12; k++) { const a = rand(0, TAU);
        parts.push({ x: o.x, y: o.y, vx: Math.cos(a)*rand(40,170), vy: Math.sin(a)*rand(40,170),
                     life: rand(0.3,0.6), age: 0, r: rand(2,4), col: "#ff5a4a" }); }

}

let parts = [], spatter = [], dmgNums = [], smashRing = null;
function spawnBlood(x, y, dir, amt) {

    spatter.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 40, age: 0, life: rand(0.25,0.6), r: rand(1.8,4.6) });
  }

    const a = rand(0, TAU);
    parts.push({ x, y, vx: Math.cos(a)*rand(10,50), vy: Math.sin(a)*rand(10,50) - 16,
                 life: rand(0.3,0.55), age: 0, r: rand(2.5,5), col: "#3a382f" });

}
function damageNum(x, y, n, crit) { dmgNums.push({ x: x + rand(-10,10), y, n, crit, age: 0, life: crit ? 0.9 : 0.62 }); }
function updateFx(dt) {
  for (let i = spatter.length - 1; i >= 0; i--) {
    const s = spatter[i]; s.age += dt;
    if (s.age >= s.life) { if (Math.random() < 0.4) stainGround(s.x, s.y, rand(3,7)); spatter.splice(i,1); continue; }
    s.vx *= 0.9; s.vy = s.vy*0.9 + 240*dt; s.x += s.vx*dt; s.y += s.vy*dt;
  }
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i]; p.age += dt;
    if (p.age >= p.life) { parts.splice(i,1); continue; }
    p.vx *= 0.92; p.vy *= 0.92; p.x += p.vx*dt; p.y += p.vy*dt;
  }
  for (let i = dmgNums.length - 1; i >= 0; i--) {
    const d = dmgNums[i]; d.age += dt; d.y -= 42*dt;
    if (d.age >= d.life) dmgNums.splice(i,1);

}

    gr.addColorStop(1, "rgba(255,255,255,0)");

  const x0 = W / 2 - tot / 2, y0 = H / 2 - ch / 2 + 20;
  return [0, 1, 2].map((i) => ({ x: x0 + i * (cw + gap), y: y0, w: cw, h: ch }));
}
function clickChoice() {
  if (!curChoice) return;

    const r = rects[i];
    if (mouse.x >= r.x && mouse.x <= r.x + r.w && mouse.y >= r.y && mouse.y <= r.y + r.h) {

/* ─── state ──────────────────────────────────────────────────────────────── */
const ST = { TITLE: 0, PLAYING: 1, CHOICE: 2, GAMEOVER: 3 };
let state = ST.TITLE;
let hitStop = 0, gameOverT = 0, heartT = 0;
function startGame() {
  player = makePlayer();
  zombies = []; parts = []; spatter = []; dmgNums = []; orbs = []; lightFlashes = [];
  choiceQ = []; curChoice = null;
  kills = 0; score = 0; zombiesAlive = 0; smashRing = null; hitStop = 0; heartT = 0;
  areaStage = 0; area = stageRect(0); areaTgt = stageRect(0);
  cam.x = player.x - W/2; cam.y = player.y - H/2; cam.shake = 0;
  buildWorld();
  startWave(1);
  state = ST.PLAYING;
  Sound.actx(); Ambience.start();
}
function gameOver() { state = ST.GAMEOVER; gameOverT = 0; shake(22); Ambience.stop(); }

/* ─── update ─────────────────────────────────────────────────────────────── */
function updatePlayer(dt) {
  const e = player; e.t += dt;
  const psx = e.x - cam.x, psy = e.y - cam.y;
  e.aim = Math.atan2(mouse.y - (psy - 22), mouse.x - psx);
  e.facing = Math.cos(e.aim) >= 0 ? 1 : -1;

  if (e.dashT > 0) {
    e.dashT -= dt;
    e.x = clamp(e.x + Math.cos(e.moveAng)*P.dashSpeed*dt, area.x0 + P.r, area.x1 - P.r);
    e.y = clamp(e.y + Math.sin(e.moveAng)*P.dashSpeed*dt, area.y0 + P.r, area.y1 - P.r);
    e.moving = true; e.running = true;
  } else {
    let mx = 0, my = 0;
    if (keys["KeyW"] || keys["ArrowUp"]) my -= 1;
    if (keys["KeyS"] || keys["ArrowDown"]) my += 1;
    if (keys["KeyA"] || keys["ArrowLeft"]) mx -= 1;
    if (keys["KeyD"] || keys["ArrowRight"]) mx += 1;
    e.moving = mx !== 0 || my !== 0;
    e.running = e.moving;
    if (e.moving) {
      const inv = 1 / Math.hypot(mx, my), sp = P.speed * e.moveMul;
      e.x = clamp(e.x + mx*inv*sp*dt, area.x0 + P.r, area.x1 - P.r);
      e.y = clamp(e.y + my*inv*sp*dt, area.y0 + P.r, area.y1 - P.r);
      e.moveAng = Math.atan2(my, mx);
      e.walkP += dt * 14;
      e.stepT -= dt;
      if (e.stepT <= 0) { Sound.step(); e.stepT = 0.3; }
      e.dustT -= dt;
      if (e.dustT <= 0) { spawnDust(e.x + rand(-6,6), e.y + 4); e.dustT = 0.1; }
    } else { e.walkP += dt * 4; }
  }

  if (e.smashCd > 0) e.smashCd -= dt;
  if (e.dashCd > 0) e.dashCd -= dt;
  if (e.iframes > 0) e.iframes -= dt;
  if (e.hurt > 0) e.hurt -= dt;
  if (e.regen > 0 && e.hp < e.maxHp) e.hp = Math.min(e.maxHp, e.hp + e.regen*dt);

  if (mouse.down && !e.atk && e.dashT <= 0) tryAttack();
  if (e.atk) {
    e.atkT += dt;
    if (e.atkT >= e.atkW && e.atkT < e.atkW + e.atkS) meleeStrike();
    if (e.atkT >= e.atkW + e.atkS + e.atkR) e.atk = false;
  }
  if (e.hp < e.maxHp*0.28 && e.alive) {
    heartT -= dt;
    if (heartT <= 0) { Sound.heart(); heartT = 0.95; }
  }
}
function hurtPlayer(amt) {
  if (!player.alive || player.iframes > 0) return;
  amt = Math.round(amt * player.dmgTakenMul);
  player.hp -= amt; player.hurt = 0.4;
  Sound.hurt(); shake(12);
  if (player.hp <= 0) { player.hp = 0; player.alive = false; gameOver(); }
}
function updateZombies(dt) {
  for (let i = zombies.length - 1; i >= 0; i--) {
    const z = zombies[i];
    if (z.flash > 0) z.flash -= dt;
    z.t += dt;
    if (z.state === "die") { z.dieT += dt; if (z.dieT > 1) zombies.splice(i, 1); continue; }
    z.x += z.kx*dt; z.y += z.ky*dt;
    z.kx *= 0.86; z.ky *= 0.86;
    if (z.stagger > 0) { z.stagger -= dt; continue; }
    const dx = player.x - z.x, dy = player.y - z.y, dist = Math.hypot(dx, dy) || 1;
    z.facing = dx >= 0 ? 1 : -1;
    const reach = z.r + P.r + 6;
    if (dist > reach) {
      z.state = "chase";
      z.x += dx/dist*z.speed*dt; z.y += dy/dist*z.speed*dt;
      z.walkP += dt * (4 + z.speed*0.05);
      if (z.speed > 95) {
        z.dustT -= dt;
        if (z.dustT <= 0) { spawnDust(z.x + rand(-5,5), z.y + 3); z.dustT = 0.16; }
      }
    } else {
      z.state = "attack";
      z.atkCd -= dt;
      if (z.atkCd <= 0) {
        z.atkCd = z.type === "runner" ? 0.8 : 1.15;
        hurtPlayer(ETYPES[z.type].dmg * (1 + wave*0.06));
      }
    }
    for (let j = i - 1; j >= 0; j--) {
      const o = zombies[j];
      if (o.state === "die") continue;
      const ox = z.x - o.x, oy = z.y - o.y, od = Math.hypot(ox, oy), mn = z.r + o.r;
      if (od > 0 && od < mn) {
        const pu = (mn - od) / od * 0.5;
        z.x += ox*pu; z.y += oy*pu; o.x -= ox*pu; o.y -= oy*pu;
      }
    }
    z.groanT -= dt;
    if (z.groanT <= 0) { if (dist < 720) Sound.groan(); z.groanT = rand(5, 13); }
  }
}
function updateCamera(dt) {
  cam.x = lerp(cam.x, player.x - W/2, 0.12);
  cam.y = lerp(cam.y, player.y - H/2, 0.12);
  cam.shake = Math.max(0, cam.shake - dt*48);
}
function update(dt) {
  updatePlayer(dt);
  updateZombies(dt);
  updateWaves(dt);
  updateOrbs(dt);
  updateArea(dt);
  updateFx(dt);
  updateLightFlashes(dt);
  updateCamera(dt);
  Ambience.update(dt);
}

/* ─── render ─────────────────────────────────────────────────────────────── */
function renderWorld() {
  ctx.fillStyle = "#070708"; ctx.fillRect(0, 0, W, H);
  const sx = (Math.random()*2-1)*cam.shake, sy = (Math.random()*2-1)*cam.shake;
  const camX = cam.x + sx, camY = cam.y + sy;
  ctx.save();
  ctx.translate(-camX, -camY);
  drawWorld();
  drawAreaWall();
  drawSpatter();
  for (const o of orbs) drawOrb(o);
  if (smashRing) {
    ctx.save();
    ctx.globalAlpha = (1 - smashRing.t/0.45)*0.7;
    ctx.strokeStyle = "#ffd680"; ctx.lineWidth = 6;
    ctx.beginPath(); ctx.arc(player.x, player.y, smashRing.t/0.45*smashRing.r, 0, TAU); ctx.stroke();
    ctx.restore();
  }
  if (player.atk) {
    const a = player.atkT;
    if (a >= player.atkW && a < player.atkW + player.atkS + 0.05) {
      const k = clamp((a - player.atkW)/player.atkS, 0, 1);
      const arc = P.atkArc * player.rangeMul;
      ctx.save();
      ctx.globalAlpha = (1-k)*0.8;
      ctx.strokeStyle = "#fff2dc"; ctx.lineWidth = 8; ctx.lineCap = "round";
      ctx.beginPath();
      ctx.arc(player.x, player.y - 18, P.atkRange*player.rangeMul*0.88,
              player.aim - arc + k*arc*2 - arc, player.aim + arc - k*0.2);
      ctx.stroke();
      ctx.restore();
    }
  }
  const draws = [];
  for (const p of props) draws.push(p);
  for (const z of zombies) draws.push(z);
  draws.push(player);
  draws.sort((a, b) => a.y - b.y);
  for (const d of draws) {
    if (d !== player && (d.x < camX - 170 || d.x > camX + W + 170 ||
                         d.y < camY - 300 || d.y > camY + H + 170)) continue;   // cull off-screen
    if (d === player) { if (player.alive || gameOverT < 1) drawSurvivor(player); }
    else if (d.kind === "z") drawZombie(d);
    else drawProp(d);
  }
  drawParts();
  for (const dn of dmgNums) {
    ctx.globalAlpha = clamp(1 - dn.age/dn.life, 0, 1);
    txt(dn.crit ? dn.n + "!" : "" + dn.n, dn.x, dn.y, dn.crit ? 26 : 17,
        dn.crit ? "#ffd23a" : "#f0e7d6", "center", 800);
    ctx.globalAlpha = 1;
  }
  ctx.restore();
  renderLighting(camX, camY);
  drawVignette();
  if (levelFx > 0) { ctx.save(); ctx.globalAlpha = levelFx*0.4; ctx.fillStyle = "#ffe27a"; ctx.fillRect(0,0,W,H); ctx.restore(); }
  if (player.hurt > 0) { ctx.save(); ctx.globalAlpha = clamp(player.hurt*1.5,0,0.55); ctx.fillStyle = "#8c0f0a"; ctx.fillRect(0,0,W,H); ctx.restore(); }
  if (player.alive && player.hp < player.maxHp*0.28) {
    ctx.save(); ctx.globalAlpha = 0.12 + Math.sin(performance.now()*0.006)*0.1;
    ctx.fillStyle = "#9c0f0c"; ctx.fillRect(0,0,W,H); ctx.restore();
  }
  drawGrain();
}
function render() {
  if (state === ST.TITLE) { drawTitle(); return; }
  renderWorld();
  drawHUD();
  if (state === ST.CHOICE && curChoice) drawChoice();
  else drawCrosshair();
  if (state === ST.GAMEOVER) drawGameOver();
}

/* ─── loop ───────────────────────────────────────────────────────────────── */
let last = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  let dt = (ts - last)/1000; last = ts;
  if (!dt || dt > 0.05) dt = Math.min(dt || 0.016, 0.05);
  if (state === ST.PLAYING) {
    if (hitStop > 0) hitStop -= dt; else update(dt);
  } else if (state === ST.GAMEOVER) {
    gameOverT += dt;
    cam.shake = Math.max(0, cam.shake - dt*48);
    updateFx(dt); updateLightFlashes(dt);
  }
  render();
}
requestAnimationFrame(loop);

})();
</script>
</body>
</html>
