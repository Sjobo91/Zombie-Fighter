<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Mortimer's Horde</title>
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
  body { cursor: none; }
  #game { display: block; position: fixed; inset: 0; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
"use strict";
/* =========================================================================
   MORTIMER'S HORDE — a 2D top-down survival horror
   Single self-contained file. Plain Canvas 2D, WebAudio for sound. No build
   step, no external assets — every pixel and sound is generated in code.

   You are a lone survivor with a cleaver and a failing flashlight. The dead
   shamble out of the dark in waves. Hold out.

   Sections: config · helpers · input · audio · world · blood · camera ·
   player · zombies · waves · lighting · hud & screens · state · main loop
   ========================================================================= */
(function () {

/* ─── config ─────────────────────────────────────────────────────────────── */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const lightCanvas = document.createElement("canvas");   // offscreen darkness mask
const lctx = lightCanvas.getContext("2d");
let W = 0, H = 0;
function resize() {
  W = canvas.width = lightCanvas.width = window.innerWidth;
  H = canvas.height = lightCanvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

const WORLD = { w: 2800, h: 2200 };

const PLAYER_SPEED = 190, PLAYER_SPRINT = 312, PLAYER_R = 15, PLAYER_HP = 100;
const MELEE_RANGE = 104, MELEE_ARC = 1.15;            // reach + hit-cone half-angle
const SWING_WINDUP = 0.10, SWING_STRIKE = 0.13, SWING_RECOVER = 0.17;
const SWING_TOTAL = SWING_WINDUP + SWING_STRIKE + SWING_RECOVER;
const MELEE_DAMAGE = 1;                               // wave-1 zombie dies in one hit
const FLASH_LEN = 440, FLASH_HALF = 0.42, GLOW_R = 128;
const DECAL_MAX = 170;

/* ─── helpers ────────────────────────────────────────────────────────────── */
const TAU = Math.PI * 2;
const rand  = (a, b) => a + Math.random() * (b - a);
const randi = (a, b) => (a + Math.random() * (b - a + 1)) | 0;
const clamp = (v, a, b) => (v < a ? a : v > b ? b : v);
const lerp  = (a, b, t) => a + (b - a) * t;
const easeOut = (t) => 1 - (1 - t) * (1 - t);
const easeIn  = (t) => t * t;
function angDiff(a, b) { let d = b - a; while (d > Math.PI) d -= TAU; while (d < -Math.PI) d += TAU; return d; }

/* ─── input ──────────────────────────────────────────────────────────────── */
const keys = Object.create(null);
const mouse = { x: W / 2, y: H / 2 };
window.addEventListener("keydown", (e) => { keys[e.code] = true; });
window.addEventListener("keyup",   (e) => { keys[e.code] = false; });
canvas.addEventListener("mousemove", (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
canvas.addEventListener("mousedown", (e) => {
  if (e.button !== 0) return;
  if (state === ST.TITLE) startGame();
  else if (state === ST.GAMEOVER) { if (gameOverT > 1.1) startGame(); }
  else if (state === ST.PLAYING && player.alive) startSwing();
});

/* ─── audio ──────────────────────────────────────────────────────────────────
   Procedural WebAudio. The context is created on the first click.            */
const Sound = (() => {
  let ac = null;
  function ctxA() {
    if (!ac) { try { ac = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
    return ac;
  }
  function noiseBuf(c, dur) {
    const b = c.createBuffer(1, Math.max(1, (dur * c.sampleRate) | 0), c.sampleRate);
    return b;
  }
  // a sharp blade-through-air slash
  function swing() {
    const c = ctxA(); if (!c) return;
    const t = c.currentTime;
    const b = noiseBuf(c, 0.22), d = b.getChannelData(0);
    for (let i = 0; i < d.length; i++) {
      const x = i / d.length;
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - x, 1.8) * Math.min(1, x * 10);
    }
    const s = c.createBufferSource(); s.buffer = b;
    const f = c.createBiquadFilter(); f.type = "bandpass"; f.Q.value = 3;
    f.frequency.setValueAtTime(3600, t);
    f.frequency.exponentialRampToValueAtTime(560, t + 0.2);
    const g = c.createGain(); g.gain.value = 0.4;
    s.connect(f).connect(g).connect(c.destination); s.start(t); s.stop(t + 0.24);
  }
  // a wet, meaty cut: low-passed squelch over a deep thud
  function hit() {
    const c = ctxA(); if (!c) return;
    const t = c.currentTime;
    const b = noiseBuf(c, 0.17), d = b.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 2.2);
    const s = c.createBufferSource(); s.buffer = b;
    const lp = c.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = 820;
    const g = c.createGain(); g.gain.value = 0.5;
    s.connect(lp).connect(g).connect(c.destination); s.start(t); s.stop(t + 0.18);
    const o = c.createOscillator(), og = c.createGain();
    o.type = "sine"; o.frequency.setValueAtTime(165, t);
    o.frequency.exponentialRampToValueAtTime(46, t + 0.13);
    og.gain.setValueAtTime(0.5, t); og.gain.exponentialRampToValueAtTime(0.001, t + 0.16);
    o.connect(og).connect(c.destination); o.start(t); o.stop(t + 0.17);
  }
  function groan() {
    const c = ctxA(); if (!c) return;
    const t = c.currentTime;
    const o = c.createOscillator(), g = c.createGain();
    o.type = "sawtooth";
    o.frequency.setValueAtTime(54 + Math.random() * 20, t);
    o.frequency.linearRampToValueAtTime(34, t + 0.7);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.05, t + 0.15);
    g.gain.linearRampToValueAtTime(0.0001, t + 0.8);
    const f = c.createBiquadFilter(); f.type = "lowpass"; f.frequency.value = 500;
    o.connect(f).connect(g).connect(c.destination); o.start(t); o.stop(t + 0.85);
  }
  function hurt() {
    const c = ctxA(); if (!c) return;
    const t = c.currentTime;
    const o = c.createOscillator(), g = c.createGain();
    o.type = "sawtooth"; o.frequency.setValueAtTime(190, t);
    o.frequency.exponentialRampToValueAtTime(70, t + 0.25);
    g.gain.setValueAtTime(0.32, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    o.connect(g).connect(c.destination); o.start(t); o.stop(t + 0.31);
  }
  function step() {
    const c = ctxA(); if (!c) return;
    const t = c.currentTime;
    const b = noiseBuf(c, 0.05), d = b.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    const s = c.createBufferSource(); s.buffer = b;
    const lp = c.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = 320;
    const g = c.createGain(); g.gain.value = 0.18;
    s.connect(lp).connect(g).connect(c.destination); s.start(t); s.stop(t + 0.06);
  }
  function waveStart() {
    const c = ctxA(); if (!c) return;
    const t = c.currentTime;
    const o = c.createOscillator(), g = c.createGain();
    o.type = "sawtooth"; o.frequency.setValueAtTime(90, t);
    o.frequency.exponentialRampToValueAtTime(38, t + 1.1);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(0.2, t + 0.2);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 1.3);
    const f = c.createBiquadFilter(); f.type = "lowpass"; f.frequency.value = 260;
    o.connect(f).connect(g).connect(c.destination); o.start(t); o.stop(t + 1.35);
  }
  function heartbeat() {
    const c = ctxA(); if (!c) return;
    const t = c.currentTime;
    [0, 0.16].forEach((off) => {
      const o = c.createOscillator(), g = c.createGain();
      o.type = "sine"; o.frequency.setValueAtTime(62, t + off);
      o.frequency.exponentialRampToValueAtTime(34, t + off + 0.12);
      g.gain.setValueAtTime(0.34, t + off); g.gain.exponentialRampToValueAtTime(0.001, t + off + 0.16);
      o.connect(g).connect(c.destination); o.start(t + off); o.stop(t + off + 0.18);
    });
  }
  return { ctxA, swing, hit, groan, hurt, step, waveStart, heartbeat };
})();

/* low horror drone with occasional dissonant stings */
const Ambience = (() => {
  let running = false, voices = [], master = null, stingTimer = 0;
  function start() {
    const c = Sound.ctxA(); if (!c || running) return;
    running = true;
    master = c.createGain();
    master.gain.setValueAtTime(0.0001, c.currentTime);
    master.gain.linearRampToValueAtTime(0.5, c.currentTime + 5);
    const lp = c.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = 220;
    lp.connect(master); master.connect(c.destination);
    [[41, 0.14, "sawtooth"], [41.6, 0.14, "sawtooth"], [62, 0.08, "sine"]].forEach((v) => {
      const o = c.createOscillator(); o.type = v[2]; o.frequency.value = v[0];
      const g = c.createGain(); g.gain.value = v[1];
      o.connect(g).connect(lp); o.start(); voices.push(o);
    });
    const lfo = c.createOscillator(); lfo.frequency.value = 0.06;
    const lg = c.createGain(); lg.gain.value = 0.2;
    lfo.connect(lg).connect(master.gain); lfo.start(); voices.push(lfo);
    stingTimer = rand(6, 12);
  }
  function sting() {
    const c = Sound.ctxA(); if (!c) return;
    const t = c.currentTime;
    const base = 240 + Math.random() * 460;
    [base, base * 1.414].forEach((f) => {
      const o = c.createOscillator(); o.type = "triangle"; o.frequency.value = f;
      const g = c.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(0.04, t + 0.8);
      g.gain.linearRampToValueAtTime(0.0001, t + 3.2);
      o.connect(g).connect(c.destination); o.start(t); o.stop(t + 3.3);
    });
  }
  function update(dt) {
    if (!running) return;
    stingTimer -= dt;
    if (stingTimer <= 0) { sting(); stingTimer = rand(7, 15); }
  }
  function stop() {
    if (!running) return;
    running = false;
    const c = Sound.ctxA();
    if (c && master) master.gain.linearRampToValueAtTime(0.0001, c.currentTime + 1.2);
    const dying = voices; voices = [];
    setTimeout(() => dying.forEach((o) => { try { o.stop(); } catch (e) {} }), 1400);
  }
  return { start, stop, update };
})();

/* ─── world ──────────────────────────────────────────────────────────────────
   The ruined town. Decor is generated once per run and drawn beneath the
   action; nothing here blocks movement (kept deliberately simple).           */
let decor = [], grime = [];
function buildWorld() {
  decor = []; grime = [];
  // ground grime — dark blotches and cracks scattered over the asphalt
  for (let i = 0; i < 150; i++) {
    grime.push({
      x: rand(0, WORLD.w), y: rand(0, WORLD.h),
      r: rand(14, 64), tone: randi(0, 2), rot: rand(0, TAU),
    });
  }
  // props
  const N = 46;
  for (let i = 0; i < N; i++) {
    const k = Math.random();
    const x = rand(120, WORLD.w - 120), y = rand(120, WORLD.h - 120);
    const rot = rand(0, TAU);
    if (k < 0.16)      decor.push({ t: "car",     x, y, rot });
    else if (k < 0.28) decor.push({ t: "dumpster",x, y, rot });
    else if (k < 0.52) decor.push({ t: "crate",   x, y, rot, s: rand(0.7, 1.25) });
    else if (k < 0.70) decor.push({ t: "barrel",  x, y, rot });
    else if (k < 0.86) decor.push({ t: "rubble",  x, y, rot, s: rand(0.8, 1.5) });
    else               decor.push({ t: "planks",  x, y, rot });
  }
}

function drawWorld() {
  // asphalt
  ctx.fillStyle = "#141417";
  ctx.fillRect(0, 0, WORLD.w, WORLD.h);
  // grime blotches
  const tones = ["#101013", "#1b1a16", "#0c0d10"];
  for (const g of grime) {
    ctx.save();
    ctx.translate(g.x, g.y); ctx.rotate(g.rot);
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = tones[g.tone];
    ctx.beginPath();
    ctx.ellipse(0, 0, g.r, g.r * 0.66, 0, 0, TAU);
    ctx.fill();
    ctx.restore();
  }
  ctx.globalAlpha = 1;
  // boundary — a ring of dark rubble walls so the edge reads as ruins
  ctx.strokeStyle = "#0a0a0c"; ctx.lineWidth = 60;
  ctx.strokeRect(-30, -30, WORLD.w + 60, WORLD.h + 60);
  // props
  for (const p of decor) drawProp(p);
}

function drawProp(p) {
  ctx.save();
  ctx.translate(p.x, p.y); ctx.rotate(p.rot);
  // soft contact shadow
  ctx.fillStyle = "rgba(0,0,0,0.45)";
  ctx.beginPath(); ctx.ellipse(4, 6, 26, 16, 0, 0, TAU); ctx.fill();
  if (p.t === "car") {
    ctx.fillStyle = "#1d1f22";
    rrect(-46, -22, 92, 44, 9); ctx.fill();
    ctx.fillStyle = "#121316";
    rrect(-22, -16, 40, 32, 6); ctx.fill();          // cabin
    ctx.fillStyle = "#0c0c0e";
    ctx.fillRect(-44, -25, 18, 8); ctx.fillRect(26, 17, 18, 8);  // wheels
    ctx.strokeStyle = "rgba(120,40,30,0.25)"; ctx.lineWidth = 3;
    rrect(-46, -22, 92, 44, 9); ctx.stroke();        // rust rim
  } else if (p.t === "dumpster") {
    ctx.fillStyle = "#23241d";
    rrect(-30, -20, 60, 40, 4); ctx.fill();
    ctx.fillStyle = "#15160f";
    ctx.fillRect(-30, -20, 60, 8);
  } else if (p.t === "crate") {
    const s = p.s; ctx.scale(s, s);
    ctx.fillStyle = "#2a2014";
    rrect(-16, -16, 32, 32, 2); ctx.fill();
    ctx.strokeStyle = "#150f08"; ctx.lineWidth = 3;
    rrect(-16, -16, 32, 32, 2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-16, -16); ctx.lineTo(16, 16);
    ctx.moveTo(16, -16); ctx.lineTo(-16, 16); ctx.stroke();
  } else if (p.t === "barrel") {
    ctx.fillStyle = "#2a2622";
    ctx.beginPath(); ctx.arc(0, 0, 15, 0, TAU); ctx.fill();
    ctx.strokeStyle = "#0f0d0b"; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(0, 0, 15, 0, TAU); ctx.stroke();
    ctx.beginPath(); ctx.arc(0, 0, 9, 0, TAU); ctx.stroke();
  } else if (p.t === "rubble") {
    const s = p.s; ctx.scale(s, s);
    ctx.fillStyle = "#202024";
    for (let i = 0; i < 6; i++) {
      ctx.save(); ctx.rotate(i * 1.05);
      ctx.fillRect(rand(2, 10), -rand(4, 8), rand(8, 18), rand(8, 14));
      ctx.restore();
    }
  } else { // planks
    ctx.fillStyle = "#241a0f";
    for (let i = 0; i < 3; i++) {
      ctx.save(); ctx.rotate(i * 0.4 - 0.4);
      ctx.fillRect(-26, -3 + i, 52, 6);
      ctx.restore();
    }
  }
  ctx.restore();
}

function rrect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

/* ─── blood ──────────────────────────────────────────────────────────────────
   decals: lasting pools on the ground.  spatter: short-lived flung droplets. */
let decals = [], spatter = [];
function addDecal(x, y, r) {
  decals.push({ x, y, r, rot: rand(0, TAU), a: 0.85 });
  if (decals.length > DECAL_MAX) decals.shift();
}
function spawnBlood(x, y, dir, amount) {
  for (let i = 0; i < amount; i++) {
    const a = dir + rand(-0.9, 0.9);
    const sp = rand(60, 320);
    spatter.push({
      x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: rand(0.25, 0.6), age: 0, r: rand(1.6, 4.2),
    });
  }
}
function updateBlood(dt) {
  for (let i = spatter.length - 1; i >= 0; i--) {
    const s = spatter[i];
    s.age += dt;
    if (s.age >= s.life) {
      if (Math.random() < 0.5) addDecal(s.x, s.y, rand(3, 7));
      spatter.splice(i, 1); continue;
    }
    s.vx *= 0.86; s.vy *= 0.86;
    s.x += s.vx * dt; s.y += s.vy * dt;
  }
}
function drawDecals() {
  for (const d of decals) {
    ctx.save();
    ctx.translate(d.x, d.y); ctx.rotate(d.rot);
    ctx.globalAlpha = d.a;
    ctx.fillStyle = "#3d0907";
    ctx.beginPath(); ctx.ellipse(0, 0, d.r, d.r * 0.72, 0, 0, TAU); ctx.fill();
    ctx.globalAlpha = d.a * 0.6;
    ctx.fillStyle = "#511008";
    ctx.beginPath(); ctx.ellipse(0, 0, d.r * 0.55, d.r * 0.4, 0, 0, TAU); ctx.fill();
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}
function drawSpatter() {
  ctx.fillStyle = "#7c1109";
  for (const s of spatter) {
    const k = 1 - s.age / s.life;
    ctx.globalAlpha = clamp(k + 0.2, 0, 1);
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r * (0.5 + k * 0.5), 0, TAU); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

/* ─── camera ─────────────────────────────────────────────────────────────── */
const cam = { x: WORLD.w / 2, y: WORLD.h / 2, shake: 0 };
function updateCamera(dt) {
  cam.x = lerp(cam.x, player.x, 0.12);
  cam.y = lerp(cam.y, player.y, 0.12);
  cam.shake = Math.max(0, cam.shake - dt * 42);
}
function shake(amt) { cam.shake = Math.min(26, cam.shake + amt); }

/* ─── player ─────────────────────────────────────────────────────────────── */
let player = null;
function makePlayer() {
  return {
    x: WORLD.w / 2, y: WORLD.h / 2, angle: 0,
    hp: PLAYER_HP, maxHp: PLAYER_HP, alive: true,
    swinging: false, swingT: 0, swingDir: 1, swingHits: null,
    walk: 0, moving: false, stepT: 0, hurt: 0,
  };
}
function startSwing() {
  if (player.swinging) return;
  player.swinging = true;
  player.swingT = 0;
  player.swingDir = -player.swingDir;          // alternate sweep direction
  player.swingHits = new Set();
  Sound.swing();
}
function updatePlayer(dt) {
  // aim toward the mouse (player is near screen centre)
  const px = player.x - cam.x + W / 2;
  const py = player.y - cam.y + H / 2;
  player.angle = Math.atan2(mouse.y - py, mouse.x - px);

  // movement
  let mx = 0, my = 0;
  if (keys["KeyW"] || keys["ArrowUp"])    my -= 1;
  if (keys["KeyS"] || keys["ArrowDown"])  my += 1;
  if (keys["KeyA"] || keys["ArrowLeft"])  mx -= 1;
  if (keys["KeyD"] || keys["ArrowRight"]) mx += 1;
  const sprint = keys["ShiftLeft"] || keys["ShiftRight"];
  player.moving = (mx !== 0 || my !== 0);
  if (player.moving) {
    const inv = 1 / Math.hypot(mx, my);
    const sp = sprint ? PLAYER_SPRINT : PLAYER_SPEED;
    player.x = clamp(player.x + mx * inv * sp * dt, 40, WORLD.w - 40);
    player.y = clamp(player.y + my * inv * sp * dt, 40, WORLD.h - 40);
    player.walk += dt * (sprint ? 15 : 10);
    player.stepT -= dt;
    if (player.stepT <= 0) { Sound.step(); player.stepT = sprint ? 0.27 : 0.36; }
  } else {
    player.walk = lerp(player.walk, 0, 0.2);
  }

  // swing
  if (player.swinging) {
    player.swingT += dt;
    if (player.swingT >= SWING_TOTAL) player.swinging = false;
    else if (player.swingT >= SWING_WINDUP && player.swingT < SWING_WINDUP + SWING_STRIKE) {
      meleeHits();
    }
  }

  if (player.hurt > 0) player.hurt -= dt;

  // low-health heartbeat
  if (player.hp < 32) {
    heartT -= dt;
    if (heartT <= 0) { Sound.heartbeat(); heartT = lerp(0.5, 1.0, player.hp / 32); }
  }
}

let heartT = 0;

// the visible weapon angle for the current swing phase
function weaponAngle() {
  if (!player.swinging) return player.angle + 0.45 * player.swingDir;
  const t = player.swingT, A = (MELEE_ARC + 0.3) * player.swingDir;
  if (t < SWING_WINDUP) {
    return player.angle + lerp(0.45 * player.swingDir, A, easeOut(t / SWING_WINDUP));
  } else if (t < SWING_WINDUP + SWING_STRIKE) {
    return player.angle + lerp(A, -A, easeIn((t - SWING_WINDUP) / SWING_STRIKE));
  }
  const k = (t - SWING_WINDUP - SWING_STRIKE) / SWING_RECOVER;
  return player.angle + lerp(-A, 0.45 * player.swingDir, k);
}

function meleeHits() {
  let hits = 0;
  for (const z of zombies) {
    if (z.state === "dying" || player.swingHits.has(z)) continue;
    const dx = z.x - player.x, dy = z.y - player.y;
    const dist = Math.hypot(dx, dy);
    if (dist > MELEE_RANGE + z.r) continue;
    if (Math.abs(angDiff(player.angle, Math.atan2(dy, dx))) > MELEE_ARC) continue;
    // hit
    player.swingHits.add(z);
    z.hp -= MELEE_DAMAGE;
    z.flash = 0.12;
    const kb = 230;
    z.vx += (dx / dist) * kb; z.vy += (dy / dist) * kb;
    z.stagger = 0.35;
    spawnBlood(z.x, z.y, Math.atan2(dy, dx), 14);
    hits++;
    if (z.hp <= 0) killZombie(z);
  }
  if (hits > 0) {
    Sound.hit();
    hitStop = 0.055;
    shake(5 + hits);
  }
}

function drawPlayer() {
  const x = player.x, y = player.y;
  // shadow
  ctx.fillStyle = "rgba(0,0,0,0.5)";
  ctx.beginPath(); ctx.ellipse(x + 3, y + 7, 19, 12, 0, 0, TAU); ctx.fill();

  // slash arc FX during the strike
  if (player.swinging) {
    const t = player.swingT;
    if (t >= SWING_WINDUP && t < SWING_WINDUP + SWING_STRIKE + 0.06) {
      const k = clamp((t - SWING_WINDUP) / SWING_STRIKE, 0, 1);
      const A = (MELEE_ARC + 0.3) * player.swingDir;
      const from = player.angle + A;
      const to = weaponAngle();
      ctx.save();
      ctx.globalAlpha = (1 - k) * 0.8;
      ctx.strokeStyle = "#fff3df";
      ctx.lineWidth = 7;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.arc(x, y, MELEE_RANGE * 0.86, Math.min(from, to), Math.max(from, to));
      ctx.stroke();
      ctx.globalAlpha = (1 - k) * 0.35;
      ctx.lineWidth = 16;
      ctx.stroke();
      ctx.restore();
    }
  }

  const bob = Math.sin(player.walk) * 1.6;
  ctx.save();
  ctx.translate(x, y + bob);
  ctx.rotate(player.angle);

  // weapon — a heavy cleaver, drawn at the swing angle (relative to facing)
  const wa = weaponAngle() - player.angle;
  ctx.save();
  ctx.rotate(wa);
  ctx.fillStyle = "#15100a";                      // grip
  ctx.fillRect(6, -2.5, 13, 5);
  ctx.fillStyle = "#9aa0a6";                      // blade
  ctx.beginPath();
  ctx.moveTo(18, -4); ctx.lineTo(48, -9);
  ctx.lineTo(52, 7); ctx.lineTo(18, 5); ctx.closePath();
  ctx.fill();
  ctx.fillStyle = "#d6dade";                      // edge glint
  ctx.beginPath();
  ctx.moveTo(18, -4); ctx.lineTo(48, -9); ctx.lineTo(48, -6); ctx.lineTo(18, -2); ctx.closePath();
  ctx.fill();
  ctx.restore();

  // coat / torso
  ctx.fillStyle = "#23252a";
  ctx.beginPath(); ctx.ellipse(0, 0, 13, 17, 0, 0, TAU); ctx.fill();
  ctx.strokeStyle = "#34373d"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.ellipse(0, 0, 13, 17, 0, 0, TAU); ctx.stroke();
  // collar
  ctx.fillStyle = "#191b1f";
  ctx.beginPath(); ctx.ellipse(2, 0, 7, 11, 0, 0, TAU); ctx.fill();
  // head — hood up
  ctx.fillStyle = "#1b1d21";
  ctx.beginPath(); ctx.arc(5, 0, 9, 0, TAU); ctx.fill();
  ctx.fillStyle = "#caa07e";                      // a sliver of face
  ctx.beginPath(); ctx.arc(8, 0, 4.2, 0, TAU); ctx.fill();
  ctx.restore();

  // hurt tint
  if (player.hurt > 0) {
    ctx.save();
    ctx.globalAlpha = clamp(player.hurt * 2.2, 0, 0.6);
    ctx.fillStyle = "#c0241a";
    ctx.beginPath(); ctx.arc(x, y + bob, 20, 0, TAU); ctx.fill();
    ctx.restore();
  }
}

function damagePlayer(amt) {
  if (!player.alive) return;
  player.hp -= amt;
  player.hurt = 0.4;
  Sound.hurt();
  shake(13);
  if (player.hp <= 0) { player.hp = 0; player.alive = false; gameOver(); }
}

/* ─── zombies ────────────────────────────────────────────────────────────── */
let zombies = [], zombiesAlive = 0;
function spawnZombie() {
  // appear out of the dark, just beyond the player's view
  const a = rand(0, TAU);
  const dist = Math.max(W, H) * 0.62 + rand(40, 240);
  const x = clamp(player.x + Math.cos(a) * dist, 30, WORLD.w - 30);
  const y = clamp(player.y + Math.sin(a) * dist, 30, WORLD.h - 30);
  const hp = wave;
  zombies.push({
    x, y, angle: 0, vx: 0, vy: 0,
    hp, maxHp: hp, r: 14 * rand(0.92, 1.18),
    speed: rand(48, 70) + wave * 3.2,
    state: "chase", anim: rand(0, TAU), flash: 0, stagger: 0,
    attackCD: rand(0.3, 1), dieT: 0, tone: randi(0, 2),
    groanT: rand(2, 9),
  });
  zombiesAlive++;
}

const ZTONES = [
  { skin: "#5c6353", cloth: "#22231d" },
  { skin: "#67615a", cloth: "#1d2024" },
  { skin: "#566058", cloth: "#241e16" },
];

function killZombie(z) {
  z.state = "dying"; z.dieT = 0;
  zombiesAlive--;
  kills++; score += 10 + wave * 2;
  addDecal(z.x, z.y, rand(14, 22));
  spawnBlood(z.x, z.y, rand(0, TAU), 22);
  shake(3);
}

function updateZombies(dt) {
  for (let i = zombies.length - 1; i >= 0; i--) {
    const z = zombies[i];
    if (z.flash > 0) z.flash -= dt;

    if (z.state === "dying") {
      z.dieT += dt;
      z.vx *= 0.84; z.vy *= 0.84;
      z.x += z.vx * dt; z.y += z.vy * dt;
      if (z.dieT > 1.7) zombies.splice(i, 1);
      continue;
    }

    // knockback / momentum
    z.x += z.vx * dt; z.y += z.vy * dt;
    z.vx *= 0.86; z.vy *= 0.86;
    if (z.stagger > 0) { z.stagger -= dt; z.anim += dt * 4; continue; }

    const dx = player.x - z.x, dy = player.y - z.y;
    const dist = Math.hypot(dx, dy) || 1;
    z.angle = lerp(z.angle, Math.atan2(dy, dx), 0.12);

    if (dist > z.r + PLAYER_R + 6) {
      z.x += (dx / dist) * z.speed * dt;
      z.y += (dy / dist) * z.speed * dt;
      z.anim += dt * (3 + z.speed * 0.03);
    } else {
      // in reach — claw at the survivor
      z.attackCD -= dt;
      z.anim += dt * 7;
      if (z.attackCD <= 0) { damagePlayer(8 + wave); z.attackCD = 1.05; }
    }

    z.groanT -= dt;
    if (z.groanT <= 0) { if (dist < 760) Sound.groan(); z.groanT = rand(4, 12); }
  }
}

function drawZombie(z) {
  const dying = z.state === "dying";
  const fade = dying ? clamp(1 - z.dieT / 1.7, 0, 1) : 1;
  ctx.save();
  ctx.globalAlpha = fade;
  // shadow
  ctx.fillStyle = "rgba(0,0,0,0.45)";
  ctx.beginPath(); ctx.ellipse(z.x + 3, z.y + 6, z.r + 4, z.r * 0.7, 0, 0, TAU); ctx.fill();

  ctx.translate(z.x, z.y);
  if (dying) ctx.scale(1 + z.dieT * 0.15, 1 + z.dieT * 0.15);
  ctx.rotate(z.angle);
  const sway = dying ? 0 : Math.sin(z.anim) * 0.16;
  ctx.rotate(sway);

  const tn = ZTONES[z.tone];
  // reaching arms
  ctx.strokeStyle = tn.skin; ctx.lineWidth = 5; ctx.lineCap = "round";
  const reach = dying ? 4 : 10 + Math.sin(z.anim * 2) * 4;
  ctx.beginPath(); ctx.moveTo(2, -6); ctx.lineTo(z.r + reach, -7);
  ctx.moveTo(2, 6);  ctx.lineTo(z.r + reach, 7); ctx.stroke();
  // torso — torn clothing
  ctx.fillStyle = tn.cloth;
  ctx.beginPath(); ctx.ellipse(0, 0, z.r * 0.9, z.r, 0, 0, TAU); ctx.fill();
  // head, lolling forward
  ctx.fillStyle = tn.skin;
  ctx.beginPath(); ctx.arc(z.r * 0.5, Math.sin(z.anim) * 2, z.r * 0.62, 0, TAU); ctx.fill();
  // sunken eyes
  ctx.fillStyle = "#b8443a";
  ctx.beginPath(); ctx.arc(z.r * 0.72, -3, 1.7, 0, TAU);
  ctx.arc(z.r * 0.72, 3, 1.7, 0, TAU); ctx.fill();

  // hit flash
  if (z.flash > 0) {
    ctx.globalAlpha = fade * clamp(z.flash * 7, 0, 0.8);
    ctx.fillStyle = "#ffffff";
    ctx.beginPath(); ctx.ellipse(0, 0, z.r * 1.05, z.r * 1.15, 0, 0, TAU); ctx.fill();
  }
  ctx.restore();

  // hp pips above wounded zombies
  if (!dying && z.maxHp > 1 && z.hp < z.maxHp) {
    const w = 26, hpf = z.hp / z.maxHp;
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(z.x - w / 2, z.y - z.r - 12, w, 4);
    ctx.fillStyle = "#a52a1f";
    ctx.fillRect(z.x - w / 2, z.y - z.r - 12, w * hpf, 4);
  }
}

/* ─── waves ──────────────────────────────────────────────────────────────── */
let wave = 0, kills = 0, score = 0;
let waveState = "active", waveTimer = 0, toSpawn = 0, spawnTimer = 0;
let banner = null;

function startWave(n) {
  wave = n;
  toSpawn = 4 + n * 2;
  spawnTimer = 0.4;
  waveState = "active";
  banner = { big: "WAVE " + n, sub: n === 1 ? "They come for you" : "The horde swells", t: 2.4 };
  Sound.waveStart();
}
function updateWaves(dt) {
  if (banner) { banner.t -= dt; if (banner.t <= 0) banner = null; }
  if (waveState === "active") {
    if (toSpawn > 0) {
      spawnTimer -= dt;
      if (spawnTimer <= 0 && zombiesAlive < 26) {
        spawnZombie(); toSpawn--;
        spawnTimer = Math.max(0.32, 0.95 - wave * 0.05);
      }
    } else if (zombiesAlive <= 0) {
      waveState = "rest"; waveTimer = 4.5;
      banner = { big: "WAVE CLEARED", sub: "Catch your breath", t: 2.6 };
    }
  } else {
    waveTimer -= dt;
    if (waveTimer <= 0) startWave(wave + 1);
  }
}

/* ─── lighting ───────────────────────────────────────────────────────────────
   The world is drawn fully, then a near-opaque darkness mask is laid over it
   with the flashlight cone and a small glow around the player punched out.   */
function renderLighting(px, py) {
  lctx.globalCompositeOperation = "source-over";
  lctx.clearRect(0, 0, W, H);
  lctx.fillStyle = "rgba(6,7,11,0.9)";
  lctx.fillRect(0, 0, W, H);

  lctx.globalCompositeOperation = "destination-out";
  // flashlight cone
  lctx.save();
  lctx.beginPath();
  lctx.moveTo(px, py);
  lctx.arc(px, py, FLASH_LEN, player.angle - FLASH_HALF, player.angle + FLASH_HALF);
  lctx.closePath();
  lctx.clip();
  const cone = lctx.createRadialGradient(px, py, 0, px, py, FLASH_LEN);
  cone.addColorStop(0, "rgba(255,255,255,0.97)");
  cone.addColorStop(0.6, "rgba(255,255,255,0.62)");
  cone.addColorStop(1, "rgba(255,255,255,0)");
  lctx.fillStyle = cone;
  lctx.fillRect(px - FLASH_LEN, py - FLASH_LEN, FLASH_LEN * 2, FLASH_LEN * 2);
  lctx.restore();
  // glow around the player
  const glow = lctx.createRadialGradient(px, py, 0, px, py, GLOW_R);
  glow.addColorStop(0, "rgba(255,255,255,0.9)");
  glow.addColorStop(1, "rgba(255,255,255,0)");
  lctx.fillStyle = glow;
  lctx.fillRect(px - GLOW_R, py - GLOW_R, GLOW_R * 2, GLOW_R * 2);

  lctx.globalCompositeOperation = "source-over";
  ctx.drawImage(lightCanvas, 0, 0);

  // a faint warm wash inside the cone — the flashlight's colour
  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  ctx.beginPath();
  ctx.moveTo(px, py);
  ctx.arc(px, py, FLASH_LEN * 0.92, player.angle - FLASH_HALF, player.angle + FLASH_HALF);
  ctx.closePath();
  ctx.clip();
  const warm = ctx.createRadialGradient(px, py, 0, px, py, FLASH_LEN * 0.92);
  warm.addColorStop(0, "rgba(255,196,120,0.16)");
  warm.addColorStop(1, "rgba(255,196,120,0)");
  ctx.fillStyle = warm;
  ctx.fillRect(px - FLASH_LEN, py - FLASH_LEN, FLASH_LEN * 2, FLASH_LEN * 2);
  ctx.restore();
}

/* ─── film grain + vignette ──────────────────────────────────────────────── */
const noiseTile = document.createElement("canvas");
noiseTile.width = noiseTile.height = 128;
(function () {
  const nc = noiseTile.getContext("2d");
  const img = nc.createImageData(128, 128);
  for (let i = 0; i < img.data.length; i += 4) {
    const v = (Math.random() * 255) | 0;
    img.data[i] = img.data[i + 1] = img.data[i + 2] = v;
    img.data[i + 3] = (Math.random() * 90) | 0;
  }
  nc.putImageData(img, 0, 0);
})();
const noisePattern = ctx.createPattern(noiseTile, "repeat");

function drawGrain() {
  ctx.save();
  ctx.globalAlpha = 0.05;
  ctx.fillStyle = noisePattern;
  ctx.translate(-(Math.random() * 128) | 0, -(Math.random() * 128) | 0);
  ctx.fillRect(0, 0, W + 128, H + 128);
  ctx.restore();
}
function drawVignette() {
  const g = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.32,
                                     W / 2, H / 2, Math.max(W, H) * 0.74);
  g.addColorStop(0, "rgba(0,0,0,0)");
  g.addColorStop(1, "rgba(0,0,0,0.82)");
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

/* ─── hud & screens ──────────────────────────────────────────────────────── */
function drawHUD() {
  // health
  ctx.save();
  ctx.fillStyle = "#6a655c";
  ctx.font = "9px 'Arial Narrow', Arial, sans-serif";
  ctx.textBaseline = "alphabetic";
  ctx.fillText("V I T A L I T Y", 22, 26);
  ctx.fillStyle = "rgba(0,0,0,0.65)";
  ctx.fillRect(22, 32, 240, 12);
  const hpf = clamp(player.hp / player.maxHp, 0, 1);
  const grad = ctx.createLinearGradient(22, 0, 262, 0);
  grad.addColorStop(0, "#4a0c07"); grad.addColorStop(1, "#b32a1c");
  ctx.fillStyle = grad;
  ctx.fillRect(22, 32, 240 * hpf, 12);
  ctx.strokeStyle = "rgba(150,44,32,0.6)"; ctx.lineWidth = 1;
  ctx.strokeRect(22, 32, 240, 12);

  // wave (top-right)
  ctx.textAlign = "right";
  ctx.fillStyle = "#6a655c";
  ctx.fillText("W A V E", W - 22, 26);
  ctx.fillStyle = "#b6b0a3";
  ctx.font = "700 30px 'Arial Narrow', Arial, sans-serif";
  ctx.fillText(String(wave), W - 22, 54);

  // kills / score (bottom-left)
  ctx.textAlign = "left";
  ctx.fillStyle = "#6a655c";
  ctx.font = "9px 'Arial Narrow', Arial, sans-serif";
  ctx.fillText("K I L L S", 22, H - 40);
  ctx.fillText("S C O R E", 110, H - 40);
  ctx.fillStyle = "#b6b0a3";
  ctx.font = "700 22px 'Arial Narrow', Arial, sans-serif";
  ctx.fillText(String(kills), 22, H - 20);
  ctx.fillText(String(score), 110, H - 20);
  ctx.restore();

  if (banner) {
    const a = clamp(banner.t, 0, 1) * clamp(banner.t > 2 ? (2.4 - banner.t) * 3 : 1, 0, 1);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.textAlign = "center";
    ctx.fillStyle = "#7d4038";
    ctx.font = "12px 'Arial Narrow', Arial, sans-serif";
    ctx.fillText(banner.sub.toUpperCase(), W / 2, H * 0.27 - 34);
    ctx.fillStyle = "#bdb6a8";
    ctx.font = "700 56px 'Arial Narrow', Arial, sans-serif";
    ctx.shadowColor = "rgba(150,25,15,0.7)"; ctx.shadowBlur = 24;
    ctx.fillText(banner.big, W / 2, H * 0.27);
    ctx.restore();
  }
}

function drawCrosshair() {
  ctx.save();
  ctx.translate(mouse.x, mouse.y);
  ctx.strokeStyle = "rgba(190,70,55,0.8)"; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(0, 0, 9, 0, TAU);
  ctx.moveTo(-14, 0); ctx.lineTo(-5, 0);
  ctx.moveTo(14, 0); ctx.lineTo(5, 0);
  ctx.moveTo(0, -14); ctx.lineTo(0, -5);
  ctx.moveTo(0, 14); ctx.lineTo(0, 5);
  ctx.stroke();
  ctx.fillStyle = "rgba(190,70,55,0.9)";
  ctx.fillRect(-1, -1, 2, 2);
  ctx.restore();
}

function drawTitle() {
  ctx.fillStyle = "#070708";
  ctx.fillRect(0, 0, W, H);
  drawVignette();
  drawGrain();
  ctx.save();
  ctx.textAlign = "center";
  ctx.fillStyle = "#b0a99b";
  ctx.font = "700 64px 'Arial Narrow', Arial, sans-serif";
  ctx.shadowColor = "rgba(150,22,12,0.75)"; ctx.shadowBlur = 30;
  ctx.fillText("MORTIMER'S HORDE", W / 2, H / 2 - 40);
  ctx.shadowBlur = 0;
  ctx.strokeStyle = "#7a1a12"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(W / 2 - 200, H / 2 - 14); ctx.lineTo(W / 2 + 200, H / 2 - 14); ctx.stroke();
  ctx.fillStyle = "#6f6a60";
  ctx.font = "13px 'Arial Narrow', Arial, sans-serif";
  ctx.fillText("THE DARK IS FULL OF THEM. YOUR LIGHT IS FAILING.", W / 2, H / 2 + 16);
  ctx.fillStyle = "#8a8478";
  ctx.font = "12px 'Arial Narrow', Arial, sans-serif";
  ctx.fillText("WASD MOVE   ·   MOUSE AIM   ·   CLICK SWING   ·   SHIFT SPRINT", W / 2, H / 2 + 50);
  const pulse = 0.55 + Math.sin(performance.now() * 0.004) * 0.4;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = "#c7bdae";
  ctx.font = "700 16px 'Arial Narrow', Arial, sans-serif";
  ctx.fillText("CLICK TO BEGIN", W / 2, H / 2 + 102);
  ctx.restore();
  drawCrosshair();
}

function drawGameOver() {
  drawVignette();
  ctx.save();
  ctx.globalAlpha = clamp(gameOverT, 0, 0.82);
  ctx.fillStyle = "#0a0608";
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
  drawGrain();
  ctx.save();
  ctx.textAlign = "center";
  ctx.globalAlpha = clamp(gameOverT * 1.4, 0, 1);
  ctx.fillStyle = "#7c1b12";
  ctx.font = "700 78px 'Arial Narrow', Arial, sans-serif";
  ctx.shadowColor = "rgba(0,0,0,0.9)"; ctx.shadowBlur = 20;
  ctx.fillText("YOU DIED", W / 2, H / 2 - 24);
  ctx.shadowBlur = 0;
  ctx.fillStyle = "#9a948a";
  ctx.font = "16px 'Arial Narrow', Arial, sans-serif";
  ctx.fillText("YOU SURVIVED " + wave + " WAVE" + (wave === 1 ? "" : "S")
             + "   ·   " + kills + " KILLS   ·   SCORE " + score, W / 2, H / 2 + 24);
  if (gameOverT > 1.1) {
    const pulse = 0.5 + Math.sin(performance.now() * 0.004) * 0.45;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = "#c7bdae";
    ctx.font = "700 15px 'Arial Narrow', Arial, sans-serif";
    ctx.fillText("CLICK TO TRY AGAIN", W / 2, H / 2 + 78);
  }
  ctx.restore();
  drawCrosshair();
}

/* ─── state machine ──────────────────────────────────────────────────────── */
const ST = { TITLE: 0, PLAYING: 1, GAMEOVER: 2 };
let state = ST.TITLE;
let hitStop = 0, gameOverT = 0;

function startGame() {
  player = makePlayer();
  zombies = []; zombiesAlive = 0;
  decals = []; spatter = [];
  kills = 0; score = 0;
  cam.x = player.x; cam.y = player.y; cam.shake = 0;
  hitStop = 0; heartT = 0;
  buildWorld();
  startWave(1);
  state = ST.PLAYING;
  Sound.ctxA();
  Ambience.start();
}
function gameOver() {
  state = ST.GAMEOVER;
  gameOverT = 0;
  shake(20);
  Ambience.stop();
}

/* ─── main loop ──────────────────────────────────────────────────────────── */
function update(dt) {
  updatePlayer(dt);
  updateZombies(dt);
  updateWaves(dt);
  updateBlood(dt);
  updateCamera(dt);
  Ambience.update(dt);
}

function render() {
  if (state === ST.TITLE) { drawTitle(); return; }

  ctx.fillStyle = "#060608";
  ctx.fillRect(0, 0, W, H);

  // camera transform (with shake)
  const sx = (Math.random() * 2 - 1) * cam.shake;
  const sy = (Math.random() * 2 - 1) * cam.shake;
  ctx.save();
  ctx.translate(W / 2 - cam.x + sx, H / 2 - cam.y + sy);

  drawWorld();
  drawDecals();
  drawSpatter();
  // y-sorted actors for simple top-down overlap
  const actors = zombies.slice();
  actors.push(player);
  actors.sort((a, b) => a.y - b.y);
  for (const a of actors) {
    if (a === player) drawPlayer();
    else drawZombie(a);
  }
  ctx.restore();

  // lighting — player's screen position
  const px = W / 2 - cam.x + sx + player.x;
  const py = H / 2 - cam.y + sy + player.y;
  renderLighting(px, py);

  drawVignette();

  // damage flash
  if (player.hurt > 0) {
    ctx.save();
    ctx.globalAlpha = clamp(player.hurt * 1.5, 0, 0.5);
    ctx.fillStyle = "#8c0f0a";
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }
  // low-health red pulse
  if (player.alive && player.hp < 32) {
    ctx.save();
    ctx.globalAlpha = (0.12 + Math.sin(performance.now() * 0.006) * 0.1) * (1 - player.hp / 32);
    ctx.fillStyle = "#a01410";
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  drawGrain();
  drawHUD();
  drawCrosshair();

  if (state === ST.GAMEOVER) drawGameOver();
}

let last = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  let dt = (ts - last) / 1000;
  last = ts;
  if (!dt || dt > 0.05) dt = Math.min(dt || 0.016, 0.05);

  if (state === ST.PLAYING) {
    if (hitStop > 0) hitStop -= dt;       // brief impact freeze
    else update(dt);
  } else if (state === ST.GAMEOVER) {
    gameOverT += dt;
    cam.shake = Math.max(0, cam.shake - dt * 42);
  }
  render();
}
requestAnimationFrame(loop);

})();
</script>
