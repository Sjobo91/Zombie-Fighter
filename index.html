<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Mortimer's Horde — Survival</title>
<style>
  html, body { margin: 0; height: 100%; background: #050506; overscroll-behavior: none; }
  body { font: 13px/1.4 "Segoe UI", system-ui, -apple-system, sans-serif;
         color: #c4bfb4; overflow: hidden; user-select: none; }
  #stage { position: fixed; inset: 0; }
  #stage canvas { display: block; touch-action: none; cursor: crosshair; }

  /* permanent vignette — darkens the screen edges for dread */
  #vignette { position: fixed; inset: 0; z-index: 2; pointer-events: none;
              box-shadow: inset 0 0 210px 30px rgba(0,0,0,.66); }

  /* HUD */
  .hud { position: fixed; pointer-events: none; z-index: 5;
         text-shadow: 0 1px 3px rgba(0,0,0,.95); }
  .hud .label { font-size: 9px; letter-spacing: .26em; text-transform: uppercase;
                color: #6a665d; margin-bottom: 3px; }
  .hud .value { font: 700 23px/1 "Arial Narrow", "Segoe UI", sans-serif;
                letter-spacing: .07em; text-transform: uppercase; color: #b3aea1; }

  #healthHud   { left: 18px; top: 16px; }
  #waveHud     { right: 18px; top: 16px; text-align: right; }
  #ammoHud     { right: 18px; bottom: 18px; text-align: right; }
  #scoreHud    { left: 18px; bottom: 18px; }

  /* Health bar */
  .bar { width: 232px; height: 9px; background: rgba(0,0,0,.65);
         border: 1px solid rgba(150,42,32,.55); border-radius: 1px; overflow: hidden; }
  .bar > i { display: block; height: 100%;
             background: linear-gradient(90deg, #3a0c08, #a32619);
             transition: width .18s ease; }

  /* Crosshair */
  #crosshair { position: fixed; left: 50%; top: 50%; width: 22px; height: 22px;
               transform: translate(-50%,-50%); z-index: 4; pointer-events: none;
               opacity: .5; }
  #crosshair::before, #crosshair::after {
    content: ""; position: absolute; background: #9a948a;
  }
  #crosshair::before { left: 50%; top: 0; width: 1px; height: 100%; transform: translateX(-50%); }
  #crosshair::after  { top: 50%; left: 0; height: 1px; width: 100%; transform: translateY(-50%); }
  #crosshair.hit { animation: hitPulse .18s ease; }
  @keyframes hitPulse { 0%{transform:translate(-50%,-50%) scale(1.7); opacity:.95}
                        100%{transform:translate(-50%,-50%) scale(1); opacity:.5} }

  /* Center messages */
  .center { position: fixed; left: 50%; top: 50%; transform: translate(-50%,-50%);
            z-index: 7; text-align: center; pointer-events: auto; }
  .center .big { font: 800 46px/1.05 "Arial Narrow", "Segoe UI", sans-serif;
                 letter-spacing: .06em; text-transform: uppercase; color: #b6b0a3;
                 margin-bottom: 12px; text-shadow: 0 2px 20px rgba(150,24,14,.55); }
  .center .sub { font-size: 11px; letter-spacing: .2em; text-transform: uppercase;
                 color: #706b61; max-width: 420px; margin: 0 auto 18px; line-height: 1.9; }
  .btn { display: inline-block; padding: 12px 30px; border: 1px solid #6a3028;
         background: rgba(120,30,22,.12); color: #c2b8a8; cursor: pointer;
         font: 700 11px/1 "Arial Narrow", sans-serif; letter-spacing: .3em;
         text-transform: uppercase; transition: all .15s; }
  .btn:hover { background: #a32619; border-color: #a32619; color: #0a0a0a; }

  #overlay { position: fixed; inset: 0; z-index: 6;
             background: radial-gradient(ellipse at center, rgba(4,4,5,.62), rgba(2,2,3,.97));
             pointer-events: auto; }
  #overlay.hidden { display: none; }

  /* Wave announcement banner */
  #waveBanner { position: fixed; left: 50%; top: 26%; transform: translate(-50%,-50%);
                z-index: 8; text-align: center; pointer-events: none;
                opacity: 0; transition: opacity .4s; }
  #waveBanner.on { opacity: 1; }
  #waveBanner .b1 { font-size: 10px; letter-spacing: .4em; text-transform: uppercase; color: #7d4038; }
  #waveBanner .b2 { font: 800 52px/1 "Arial Narrow", "Segoe UI", sans-serif;
                    letter-spacing: .06em; text-transform: uppercase; color: #b6b0a3;
                    margin-top: 6px; text-shadow: 0 2px 22px rgba(150,25,15,.6); }

  /* Damage vignette */
  #damageVignette { position: fixed; inset: 0; z-index: 3; pointer-events: none;
                    box-shadow: inset 0 0 120px 30px rgba(150,12,12,0);
                    transition: box-shadow .25s ease; }
  #damageVignette.on { box-shadow: inset 0 0 220px 80px rgba(150,12,12,.62); }

  /* Hit marker text */
  .floater { position: fixed; z-index: 7; pointer-events: none;
             font: 700 20px/1 "Arial Narrow", monospace; color: #9a948a;
             text-shadow: 1px 1px 0 #000, 0 0 6px rgba(0,0,0,.9); }
</style>
</head>
<body>
  <div id="stage"></div>
  <div id="vignette"></div>

  <div id="crosshair"></div>
  <div id="damageVignette"></div>

  <div class="hud" id="healthHud">
    <div class="label">Vitality</div>
    <div class="bar"><i id="healthFill" style="width:100%"></i></div>
  </div>

  <div class="hud" id="waveHud">
    <div class="label">Wave</div>
    <div class="value" id="waveNum">1</div>
  </div>

  <div class="hud" id="ammoHud">
    <div class="label">Weapon</div>
    <div class="value" id="weaponText">Splintered Club</div>
  </div>

  <div class="hud" id="scoreHud">
    <div class="label">Kills · Score</div>
    <div class="value" id="scoreText">0 · 0</div>
  </div>

  <div id="waveBanner">
    <div class="b1" id="waveBannerSub">Brace yourself</div>
    <div class="b2" id="waveBannerBig">Wave 1</div>
  </div>

  <div id="overlay">
    <div class="center" id="centerCard">
      <div class="big">Mortimer's Horde</div>
      <div class="sub">
        The town is overrun. Hold the dark as long as you can.<br><br>
        WASD move · Mouse look · Click swing · Shift+W sprint
      </div>
      <button class="btn" id="startBtn">Begin</button>
    </div>
  </div>

<!-- Three.js — try multiple CDNs in case one is blocked / down -->
<script>
(function loadThree() {
  var urls = [
    "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.149.0/three.min.js",
    "https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js",
    "https://unpkg.com/three@0.149.0/build/three.min.js"
  ];
  var i = 0;
  function next() {
    if (i >= urls.length) {
      document.body.innerHTML =
        '<div style="color:#f3edff;font-family:sans-serif;padding:40px;max-width:520px;margin:60px auto;">'
      + '<h2 style="font-family:Georgia,serif">Could not load Three.js</h2>'
      + '<p>None of the CDN URLs were reachable. Check your internet connection or try opening this file from a local web server (e.g. <code>python -m http.server</code>) rather than via <code>file://</code>.</p>'
      + '</div>';
      return;
    }
    var s = document.createElement("script");
    s.src = urls[i++];
    s.onload = function () { if (window.startMortimersHorde) window.startMortimersHorde(); };
    s.onerror = next;
    document.head.appendChild(s);
  }
  next();
})();
</script>
<script>
/* =========================================================================
   MORTIMER'S HORDE — third-person zombie survival
   Single self-contained file. Three.js (r149) via a 3-CDN fallback chain;
   vanilla JavaScript otherwise.

   Layout — each system is fenced with a labelled separator comment:
     helpers, asset builders, audio, world, player, zombies,
     waves, upgrades, hud, state machine, main loop

   Game flow is an explicit finite state machine:
     TITLE - PLAYING - UPGRADE_PICK ;  PLAYING - GAME_OVER - TITLE
   Gameplay systems only update while phase === PLAYING.

   --- HORROR OVERHAUL ---
   Art direction reworked from the cartoon prototype to grim realism:
   realistic Lambert materials (no toon ramp, no cell outlines), dark moody
   lighting, heavy fog, a warm survivor light pool against the dark, gaunt
   menacing zombies and a clearly-human hooded player. Difficulty tuned so
   wave-1 zombies die in one hit (+1 hit per wave) and melee reach is longer.
   ========================================================================= */

window.startMortimersHorde = function () {
  if (window._mortimerStarted) return;
  window._mortimerStarted = true;

/* ─── helpers ──────────────────────────────────────────────────────────────
   Pure math / easing / colour utilities. No game state here.                */

const TAU = Math.PI * 2;
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const lerp  = (a, b, t) => a + (b - a) * t;
const rand  = (a, b) => a + Math.random() * (b - a);
const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);
const easeInQuad   = (t) => t * t;

// shortest-arc angular interpolation (radians)
function lerpAngle(a, b, t) {
  let diff = b - a;
  while (diff >  Math.PI) diff -= TAU;
  while (diff < -Math.PI) diff += TAU;
  return a + diff * t;
}

// multiply a hex colour's brightness, clamped — used for shading variants
function shade(hex, mul) {
  const c = new THREE.Color(hex);
  c.r = clamp(c.r * mul, 0, 1);
  c.g = clamp(c.g * mul, 0, 1);
  c.b = clamp(c.b * mul, 0, 1);
  return "#" + c.getHexString();
}

// shared scratch values — reused every frame, never reallocated in the loop
const _chase = new THREE.Vector3();
const _fwd   = new THREE.Vector3();
const _rgt   = new THREE.Vector3();
const _qTmp  = new THREE.Quaternion();

/* ─── asset builders ───────────────────────────────────────────────────────
   Procedural meshes built once from Three.js primitives. Realistically lit
   (MeshLambertMaterial — no toon ramp, no cell outlines). Zombies are gaunt
   and decayed; the player is a clearly-human hooded survivor.                */

// realistic matte material in one call
function mat(color) { return new THREE.MeshLambertMaterial({ color: color }); }

// vertical gradient — used for the dark night sky
function makeGradientTexture(top, bot) {
  const c = document.createElement("canvas"); c.width = 4; c.height = 256;
  const ctx = c.getContext("2d");
  const g = ctx.createLinearGradient(0,0,0,256);
  g.addColorStop(0, top); g.addColorStop(1, bot);
  ctx.fillStyle = g; ctx.fillRect(0,0,4,256);
  const tex = new THREE.CanvasTexture(c); tex.needsUpdate = true;
  return tex;
}

/* zombie — gaunt, hunched, decayed. The `torso` group keeps rotation 0 so the
   wave/knockback animation drives it cleanly; the hunch is baked into child
   meshes. Returns parts { root, head, torso, armL/R, legL/R, materials }.    */
function buildZombie(variant = 0) {
  const palettes = [
    { skin:"#76836b", cloth:"#262521", clothD:"#141309", blood:"#3a120c", bone:"#b8af99" },
    { skin:"#8a8377", cloth:"#20242a", clothD:"#101216", blood:"#34100a", bone:"#c1b69f" },
    { skin:"#697a6c", cloth:"#2a241b", clothD:"#15110a", blood:"#3e1410", bone:"#b2a991" },
    { skin:"#928777", cloth:"#1d1b20", clothD:"#0e0d10", blood:"#421a10", bone:"#bcb29b" },
  ];
  const p = palettes[variant % palettes.length];
  const matSkin  = mat(p.skin);
  const matSkinD = mat(shade(p.skin, 0.66));
  const matCloth = mat(p.cloth);
  const matClothD= mat(p.clothD);
  const matBlood = mat(p.blood);
  const matBone  = mat(p.bone);
  const matVoid  = mat("#0a0a0c");                                    // hollow shadow
  const emberMat = new THREE.MeshBasicMaterial({ color: "#5e120c" });  // faint dead eye

  const root = new THREE.Group();
  const parts = {};

  /* torso — group stays at rotation 0; the forward hunch is baked into meshes */
  const torso = new THREE.Group();
  const chest = new THREE.Mesh(new THREE.BoxGeometry(1.0, 1.26, 0.5), matCloth);
  chest.rotation.x = 0.34; chest.castShadow = true; torso.add(chest);
  // exposed ribs through torn flesh
  for (let i = 0; i < 3; i++) {
    const rib = new THREE.Mesh(new THREE.BoxGeometry(0.6 - i*0.07, 0.07, 0.1), matBone);
    rib.position.set(0, 0.26 - i*0.2, 0.4 - i*0.06); rib.rotation.x = 0.34;
    torso.add(rib);
  }
  const cavity = new THREE.Mesh(new THREE.BoxGeometry(0.48, 0.46, 0.12), matVoid);
  cavity.position.set(0, 0.04, 0.3); cavity.rotation.x = 0.34; torso.add(cavity);
  // dried bloodstain
  const stain = new THREE.Mesh(new THREE.BoxGeometry(0.38, 0.5, 0.04), matBlood);
  stain.position.set(-0.2, -0.3, 0.31); stain.rotation.x = 0.34; torso.add(stain);
  // tattered hem
  for (let i = 0; i < 5; i++) {
    const t = new THREE.Mesh(new THREE.ConeGeometry(0.11, 0.26, 3), matClothD);
    t.rotation.x = Math.PI; t.position.set(-0.38 + i*0.19, -0.72, 0.14);
    torso.add(t);
  }

  /* head — gaunt, jutting forward and down */
  const head = new THREE.Group();
  const skull = new THREE.Mesh(new THREE.BoxGeometry(0.76, 0.84, 0.78), matSkin);
  skull.castShadow = true; head.add(skull);
  const brow = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.18, 0.1), matSkinD);
  brow.position.set(0, 0.16, 0.35); head.add(brow);
  // deep hollow eye sockets with a faint dead ember
  const sockGeom = new THREE.BoxGeometry(0.22, 0.2, 0.18);
  const sockL = new THREE.Mesh(sockGeom, matVoid); sockL.position.set(-0.18, 0.0, 0.33); head.add(sockL);
  const sockR = sockL.clone(); sockR.position.x = 0.18; head.add(sockR);
  const emberGeom = new THREE.SphereGeometry(0.045, 8, 6);
  const emberL = new THREE.Mesh(emberGeom, emberMat); emberL.position.set(-0.18, 0.0, 0.4); head.add(emberL);
  const emberR = emberL.clone(); emberR.position.x = 0.18; head.add(emberR);
  // hollow cheeks
  const cheekL = new THREE.Mesh(new THREE.BoxGeometry(0.11, 0.26, 0.12), matSkinD);
  cheekL.position.set(-0.27, -0.18, 0.29); head.add(cheekL);
  const cheekR = cheekL.clone(); cheekR.position.x = 0.27; head.add(cheekR);
  // agape jaw + jagged teeth
  const jaw = new THREE.Mesh(new THREE.BoxGeometry(0.48, 0.24, 0.4), matSkin);
  jaw.position.set(0, -0.46, 0.1); jaw.rotation.x = 0.42; head.add(jaw);
  const maw = new THREE.Mesh(new THREE.BoxGeometry(0.38, 0.2, 0.16), matVoid);
  maw.position.set(0, -0.3, 0.29); head.add(maw);
  for (let i = 0; i < 4; i++) {
    const tooth = new THREE.Mesh(new THREE.ConeGeometry(0.035, 0.1, 4), matBone);
    tooth.position.set(-0.14 + i*0.095, -0.24, 0.35); head.add(tooth);
  }
  // sparse matted hair
  for (let i = 0; i < 3; i++) {
    const hair = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 0.2), matClothD);
    hair.position.set(-0.2 + i*0.2, 0.42, -0.04 + (i%2)*0.1); head.add(hair);
  }
  head.position.set(0, 1.12, 0.32);   // jut forward
  head.rotation.x = 0.3;              // tilt down

  /* arms — long, gaunt, reaching. upper.rotation.x is overwritten by the AI
     while the zombie is active, so the rest pose here is just a fallback.    */
  function buildArm() {
    const arm = new THREE.Group();
    const shoulder = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.32), matCloth);
    arm.add(shoulder);
    const upper = new THREE.Group();
    const ua = new THREE.Mesh(new THREE.BoxGeometry(0.19, 0.74, 0.19), matSkin);
    ua.position.y = -0.4; upper.add(ua);
    arm.add(upper);
    const forearm = new THREE.Group(); forearm.position.y = -0.78;
    const fa = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.74, 0.16), matSkin);
    fa.position.y = -0.38; forearm.add(fa);
    const hand = new THREE.Mesh(new THREE.BoxGeometry(0.19, 0.18, 0.24), matSkinD);
    hand.position.y = -0.82; forearm.add(hand);
    for (let i = 0; i < 3; i++) {                          // clawed fingers
      const fng = new THREE.Mesh(new THREE.ConeGeometry(0.035, 0.17, 4), matBone);
      fng.rotation.x = -1.9; fng.position.set(-0.055 + i*0.055, -0.95, 0.12);
      forearm.add(fng);
    }
    upper.add(forearm);
    upper.rotation.x = -1.2;
    forearm.rotation.x = -0.4;
    arm.userData = { upper, forearm };
    return arm;
  }
  const armL = buildArm(); armL.position.set(-0.6, 0.6, 0.05);
  const armR = buildArm(); armR.position.set( 0.6, 0.6, 0.05);

  /* legs — thin and stiff */
  function buildLeg() {
    const leg = new THREE.Group();
    const thighPiv = new THREE.Group();
    const thigh = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.62, 0.27), matClothD);
    thigh.position.y = -0.31; thighPiv.add(thigh);
    const shin = new THREE.Group(); shin.position.y = -0.62;
    const sh = new THREE.Mesh(new THREE.BoxGeometry(0.21, 0.6, 0.23), matSkinD);
    sh.position.y = -0.3; shin.add(sh);
    const foot = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.15, 0.44), matClothD);
    foot.position.set(0, -0.66, 0.1); shin.add(foot);
    thighPiv.add(shin);
    leg.add(thighPiv);
    leg.userData = { thighPiv, shin };
    return leg;
  }
  const legL = buildLeg(); legL.position.set(-0.23, -0.44, 0);
  const legR = buildLeg(); legR.position.set( 0.23, -0.44, 0);

  root.add(torso); root.add(head); root.add(armL); root.add(armR); root.add(legL); root.add(legR);
  root.position.y = 1.8;

  parts.root = root; parts.head = head; parts.torso = torso;
  parts.armL = armL; parts.armR = armR; parts.legL = legL; parts.legR = legR;
  parts.materials = { matSkin, matCloth };
  return parts;
}

/* player — a clearly-human hooded survivor. Upright posture (contrast to the
   hunched dead). Returns { root, torso, head, armL/R, legL/R, stickPivot }.  */
function buildPlayer() {
  const matSkin   = mat("#b5876a");
  const matJacket = mat("#262a2e");
  const matJacketD= mat("#16181b");
  const matHood   = mat("#1e2024");
  const matPants  = mat("#191a1d");
  const matBoot   = mat("#0d0d0e");
  const matStubble= mat("#2a2620");
  const matEye    = new THREE.MeshBasicMaterial({ color: "#0a0a0a" });

  const root = new THREE.Group();
  const parts = {};

  /* torso — heavy jacket, upright */
  const torso = new THREE.Group();
  const jacket = new THREE.Mesh(new THREE.BoxGeometry(1.24, 1.34, 0.78), matJacket);
  jacket.castShadow = true; torso.add(jacket);
  // open jacket front panel (darker, slightly proud)
  const front = new THREE.Mesh(new THREE.BoxGeometry(0.34, 1.2, 0.06), matJacketD);
  front.position.set(0, 0, 0.41); torso.add(front);
  // shoulder yoke
  const yoke = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.3, 0.84), matJacketD);
  yoke.position.y = 0.6; torso.add(yoke);

  /* head — human, hood up */
  const head = new THREE.Group();
  const skull = new THREE.Mesh(new THREE.BoxGeometry(0.92, 0.9, 0.86), matSkin);
  skull.castShadow = true; head.add(skull);
  // hood — crown, back and side drapes leave the face open
  const hoodTop = new THREE.Mesh(new THREE.BoxGeometry(1.06, 0.42, 1.0), matHood);
  hoodTop.position.set(0, 0.42, -0.04); head.add(hoodTop);
  const hoodBack = new THREE.Mesh(new THREE.BoxGeometry(1.04, 0.92, 0.36), matHood);
  hoodBack.position.set(0, 0.05, -0.46); head.add(hoodBack);
  const hoodL = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.94, 1.0), matHood);
  hoodL.position.set(-0.6, 0.0, -0.06); head.add(hoodL);
  const hoodR = hoodL.clone(); hoodR.position.x = 0.6; head.add(hoodR);
  // shadowed brow under the hood
  const brow = new THREE.Mesh(new THREE.BoxGeometry(0.86, 0.2, 0.1), matJacketD);
  brow.position.set(0, 0.26, 0.4); head.add(brow);
  // eyes — set, human, watchful
  const eyeGeom = new THREE.BoxGeometry(0.12, 0.07, 0.06);
  const eyeL = new THREE.Mesh(eyeGeom, matEye); eyeL.position.set(-0.19, 0.06, 0.44); head.add(eyeL);
  const eyeR = eyeL.clone(); eyeR.position.x = 0.19; head.add(eyeR);
  // nose + stubbled jaw
  const nose = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.16, 0.12), matSkin);
  nose.position.set(0, -0.08, 0.46); head.add(nose);
  const jaw = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.34, 0.5), matStubble);
  jaw.position.set(0, -0.34, 0.24); head.add(jaw);
  head.position.set(0, 1.06, 0);

  /* arms — two-handed grip stance. The arm GROUP is twisted by the swing
     animation; the grip pose lives in the upper / forearm groups.            */
  function buildArm(side) {
    const arm = new THREE.Group();
    const shoulder = new THREE.Mesh(new THREE.BoxGeometry(0.34, 0.36, 0.44), matJacket);
    arm.add(shoulder);
    const upper = new THREE.Group();
    const ua = new THREE.Mesh(new THREE.BoxGeometry(0.27, 0.6, 0.3), matJacket);
    ua.position.y = -0.33; upper.add(ua);
    arm.add(upper);
    const forearm = new THREE.Group(); forearm.position.y = -0.64;
    const fa = new THREE.Mesh(new THREE.BoxGeometry(0.23, 0.52, 0.27), matJacketD);
    fa.position.y = -0.28; forearm.add(fa);
    const hand = new THREE.Mesh(new THREE.BoxGeometry(0.24, 0.2, 0.3), matSkin);
    hand.position.y = -0.62; forearm.add(hand);
    upper.add(forearm);
    if (side === 'R') {
      upper.rotation.x = -0.45; upper.rotation.z = -0.15;
      forearm.rotation.x = -1.25; forearm.rotation.y = -0.25;
    } else {
      upper.rotation.x = -0.55; upper.rotation.z = 0.15;
      forearm.rotation.x = -1.35; forearm.rotation.y = 0.35;
    }
    arm.userData = { upper, forearm, hand };
    return arm;
  }
  const armL = buildArm('L'); armL.position.set(-0.76, 0.46, 0);
  const armR = buildArm('R'); armR.position.set( 0.76, 0.46, 0);

  /* weapon — a splintered, nail-studded club. Mesh runs along +X so rotating
     the pivot around Y sweeps a true horizontal arc.                         */
  const stickPivot = new THREE.Group();
  stickPivot.position.set(0.0, 0.55, 0.5);
  const stickMesh = new THREE.Group();
  const matWood = mat("#3a2a1a");
  const matWoodD= mat("#21160d");
  const matNail = mat("#2a2c30");

  const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.1, 1.5, 6), matWood);
  shaft.rotation.z = Math.PI/2; shaft.position.x = 0.7; stickMesh.add(shaft);
  const head1 = new THREE.Mesh(new THREE.BoxGeometry(0.34, 0.3, 0.3), matWoodD);
  head1.position.x = 1.2; stickMesh.add(head1);
  const grip = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.11, 0.34, 8), matWoodD);
  grip.rotation.z = Math.PI/2; grip.position.x = 0.14; stickMesh.add(grip);
  // protruding nails near the head
  for (let i = 0; i < 4; i++) {
    const nail = new THREE.Mesh(new THREE.ConeGeometry(0.035, 0.22, 4), matNail);
    const ang = i * (TAU/4) + 0.4;
    nail.position.set(1.2, Math.sin(ang)*0.22, Math.cos(ang)*0.22);
    nail.rotation.x = -ang; stickMesh.add(nail);
  }
  stickPivot.add(stickMesh);

  const E = THREE.Euler, Q = THREE.Quaternion;
  // overhand chop — REST: up by the shoulder · WIND: reared up behind the
  // head · STRIKE: swung down and across the body
  const qRest   = new Q().setFromEuler(new E( 0.00,  0.15,  1.15));
  const qWind   = new Q().setFromEuler(new E(-0.35,  0.20,  1.78));
  const qStrike = new Q().setFromEuler(new E( 0.35, -1.05, -0.85));
  stickPivot.quaternion.copy(qRest);
  stickPivot.userData = { qRest, qWind, qStrike };

  /* legs */
  function buildLeg() {
    const leg = new THREE.Group();
    const thighPiv = new THREE.Group();
    const thigh = new THREE.Mesh(new THREE.BoxGeometry(0.36, 0.66, 0.4), matPants);
    thigh.position.y = -0.33; thighPiv.add(thigh);
    const shin = new THREE.Group(); shin.position.y = -0.66;
    const sh = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.62, 0.36), matPants);
    sh.position.y = -0.31; shin.add(sh);
    const boot = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.2, 0.56), matBoot);
    boot.position.set(0, -0.66, 0.08); shin.add(boot);
    thighPiv.add(shin);
    leg.add(thighPiv);
    leg.userData = { thighPiv, shin };
    return leg;
  }
  const legL = buildLeg(); legL.position.set(-0.27, -0.36, 0);
  const legR = buildLeg(); legR.position.set( 0.27, -0.36, 0);

  /* slash streak — a bright crescent that flashes along the chop path */
  const slashFx = new THREE.Mesh(
    new THREE.RingGeometry(1.7, 3.7, 24, 1, 0.5, 2.4),
    new THREE.MeshBasicMaterial({ color: 0xf4efe2, transparent: true, opacity: 0,
                                  side: THREE.DoubleSide, depthWrite: false }));
  slashFx.position.set(0.0, 0.7, 1.7);
  slashFx.rotation.set(0.25, 0, -0.95);
  slashFx.visible = false;

  root.add(torso); root.add(head); root.add(armL); root.add(armR);
  root.add(stickPivot); root.add(slashFx); root.add(legL); root.add(legR);
  root.position.y = 1.65;

  parts.root = root; parts.torso = torso; parts.head = head;
  parts.armL = armL; parts.armR = armR; parts.legL = legL; parts.legR = legR;
  parts.stickPivot = stickPivot; parts.slashFx = slashFx;
  return parts;
}

/* ─── audio ─────────────────────────────────────────────────────────────────
   Procedurally-generated WebAudio sound bank. No external files. The context
   is created lazily on first use (after a user gesture).                     */
// shared WebAudio context — created lazily on first use (after a user gesture)
let _actx = null;
function audioCtx() {
  if (!_actx) { try { _actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} }
  return _actx;
}

const Audio = (() => {
  // swing — a sharp blade-through-air slash; the filter sweeps down fast
  function swing() {
    const c = audioCtx(); if (!c) return;
    const t = c.currentTime;
    const bs = c.createBufferSource();
    const buf = c.createBuffer(1, 0.24 * c.sampleRate, c.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) {
      const x = i / d.length;
      const env = Math.pow(1 - x, 1.7) * Math.min(1, x * 9);   // sharp attack, quick decay
      d[i] = (Math.random()*2 - 1) * env;
    }
    bs.buffer = buf;
    const f = c.createBiquadFilter();
    f.type = "bandpass"; f.Q.value = 3.2;
    f.frequency.setValueAtTime(3800, t);
    f.frequency.exponentialRampToValueAtTime(520, t + 0.22);    // the downward whoosh
    const g = c.createGain(); g.gain.value = 0.55;
    bs.connect(f).connect(g).connect(c.destination);
    bs.start(t); bs.stop(t + 0.26);
  }
  // hit — a wet, meaty cut: a low-passed squelch over a deep thud
  function hit() {
    const c = audioCtx(); if (!c) return;
    const t = c.currentTime;
    const bs = c.createBufferSource();
    const buf = c.createBuffer(1, 0.17 * c.sampleRate, c.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2 - 1) * Math.pow(1 - i/d.length, 2.2);
    bs.buffer = buf;
    const lp = c.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = 850;
    const sg = c.createGain(); sg.gain.value = 0.55;
    bs.connect(lp).connect(sg).connect(c.destination);
    bs.start(t); bs.stop(t + 0.19);
    const o = c.createOscillator(), og = c.createGain();
    o.type = "sine"; o.frequency.setValueAtTime(170, t);
    o.frequency.exponentialRampToValueAtTime(46, t + 0.14);
    og.gain.setValueAtTime(0.6, t); og.gain.exponentialRampToValueAtTime(0.001, t + 0.17);
    o.connect(og).connect(c.destination); o.start(t); o.stop(t + 0.18);
  }
  function groan() {
    const c = audioCtx(); if (!c) return;
    const t = c.currentTime;
    const o = c.createOscillator(), g = c.createGain();
    o.type = "sawtooth";
    o.frequency.setValueAtTime(58 + Math.random()*16, t);
    o.frequency.linearRampToValueAtTime(38, t+0.6);
    g.gain.setValueAtTime(0.0, t);
    g.gain.linearRampToValueAtTime(0.07, t+0.12);
    g.gain.linearRampToValueAtTime(0.001, t+0.7);
    o.connect(g).connect(c.destination); o.start(t); o.stop(t+0.75);
  }
  function hurt() {
    const c = audioCtx(); if (!c) return;
    const t = c.currentTime;
    const o = c.createOscillator(), g = c.createGain();
    o.type = "sawtooth"; o.frequency.value = 180;
    g.gain.setValueAtTime(0.22, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.3);
    o.connect(g).connect(c.destination); o.start(t); o.stop(t+0.31);
  }
  return { swing, hit, groan, hurt };
})();

/* Ambience — a low horror drone with occasional dissonant stings. Started
   when a run begins, stopped on game over.                                  */
const Ambience = (() => {
  let running = false, voices = [], master = null, stingTimer = null;
  function start() {
    const c = audioCtx(); if (!c || running) return;
    running = true;
    master = c.createGain();
    master.gain.setValueAtTime(0.0001, c.currentTime);
    master.gain.linearRampToValueAtTime(0.5, c.currentTime + 4);
    const lp = c.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = 240;
    lp.connect(master); master.connect(c.destination);
    // low, slightly detuned drone — the detune gives a slow uneasy beating
    [[43, 0.13, "sawtooth"], [43.7, 0.13, "sawtooth"], [65, 0.07, "sine"]].forEach(v => {
      const o = c.createOscillator(); o.type = v[2]; o.frequency.value = v[0];
      const g = c.createGain(); g.gain.value = v[1];
      o.connect(g).connect(lp); o.start();
      voices.push(o);
    });
    // slow breathing swell on the master gain
    const lfo = c.createOscillator(); lfo.frequency.value = 0.07;
    const lfoG = c.createGain(); lfoG.gain.value = 0.18;
    lfo.connect(lfoG).connect(master.gain); lfo.start();
    voices.push(lfo);
    scheduleSting();
  }
  function scheduleSting() {
    stingTimer = setTimeout(() => {
      if (!running) return;
      sting(); scheduleSting();
    }, 7000 + Math.random()*12000);
  }
  function sting() {
    const c = audioCtx(); if (!c) return;
    const t = c.currentTime;
    const base = 260 + Math.random()*420;
    [base, base*1.414].forEach(f => {                  // a tritone — deeply uneasy
      const o = c.createOscillator(); o.type = "triangle"; o.frequency.value = f;
      const g = c.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(0.05, t + 0.7);
      g.gain.linearRampToValueAtTime(0.0001, t + 3.0);
      o.connect(g).connect(c.destination); o.start(t); o.stop(t + 3.1);
    });
  }
  function stop() {
    if (!running) return;
    running = false;
    clearTimeout(stingTimer);
    const c = audioCtx();
    if (c && master) master.gain.linearRampToValueAtTime(0.0001, c.currentTime + 1.4);
    const dying = voices; voices = [];
    setTimeout(() => dying.forEach(o => { try { o.stop(); } catch(e){} }), 1600);
  }
  return { start, stop };
})();

/* ─── world ─────────────────────────────────────────────────────────────────
   A dark, derelict town at night — building shells ring the play area,
   debris and dead trees scatter the ground. Lit almost entirely by the
   player's own light against heavy fog. Collision is a simple arena radius
   for now (ARENA_RADIUS); the expanding-town zone system is the next step.   */
function buildEnvironment(scene) {
  scene.background = makeGradientTexture("#0b0d14", "#020204");

  // dark, cold earth / cracked street
  const ground = new THREE.Mesh(new THREE.CircleGeometry(95, 48), mat("#0c0d0b"));
  ground.rotation.x = -Math.PI/2; ground.receiveShadow = true;
  scene.add(ground);

  // a barely-there ring marking the ground you can hold
  const ring = new THREE.Mesh(new THREE.RingGeometry(26.4, 27.4, 56), mat("#16150f"));
  ring.rotation.x = -Math.PI/2; ring.position.y = 0.02; scene.add(ring);

  // dim hazy moon, low and sickly
  const moon = new THREE.Mesh(new THREE.SphereGeometry(2.6, 20, 14),
    new THREE.MeshBasicMaterial({ color: "#39414f" }));
  moon.position.set(-30, 19, -40); scene.add(moon);

  // derelict building shells ringing the arena
  const buildMats = [mat("#15161a"), mat("#101015"), mat("#13110f")];
  const roofMat = mat("#08080a");
  const winDark = mat("#050507");
  const winLit  = new THREE.MeshBasicMaterial({ color: "#241803" });   // a faint distant light
  function makeBuilding() {
    const g = new THREE.Group();
    const w = rand(5, 9.5), h = rand(7, 15), d = rand(5, 9);
    const body = new THREE.Mesh(new THREE.BoxGeometry(w, h, d),
      buildMats[Math.floor(Math.random()*buildMats.length)]);
    body.position.y = h/2; body.castShadow = true; body.receiveShadow = true; g.add(body);
    const roof = new THREE.Mesh(new THREE.BoxGeometry(w+0.5, 0.5, d+0.5), roofMat);
    roof.position.y = h + 0.2; g.add(roof);
    const cols = Math.max(1, Math.round(w / 2.6));
    const rows = Math.max(1, Math.round(h / 3.4));
    for (let c = 0; c < cols; c++) {
      const wx = cols === 1 ? 0 : -((w-2.4)/2) + c * ((w-2.4)/(cols-1));
      for (let r = 0; r < rows; r++) {
        if (Math.random() < 0.25) continue;
        const lit = Math.random() < 0.1;
        const win = new THREE.Mesh(new THREE.BoxGeometry(0.85, 1.3, 0.3), lit ? winLit : winDark);
        win.position.set(wx, 1.9 + r*3.2, d/2 + 0.08);
        g.add(win);
      }
    }
    return g;
  }
  for (let i = 0; i < 9; i++) {
    const a = (i/9)*TAU + rand(-0.16, 0.16);
    const r = 34 + rand(0, 8);
    const b = makeBuilding();
    b.position.set(Math.cos(a)*r, 0, Math.sin(a)*r);
    b.rotation.y = Math.atan2(-Math.cos(a), -Math.sin(a));   // window face toward centre
    scene.add(b);
  }

  // dead, gnarled trees
  const treeMat = mat("#0d0a0c");
  for (let i = 0; i < 6; i++) {
    const r = 24 + Math.random()*7, a = Math.random()*TAU;
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.3, 4.4, 6), treeMat);
    trunk.position.set(Math.cos(a)*r, 2.2, Math.sin(a)*r);
    trunk.rotation.z = (Math.random()-0.5)*0.3; trunk.castShadow = true;
    scene.add(trunk);
    for (let j = 0; j < 3; j++) {
      const br = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.11, 1.5, 5), treeMat);
      br.position.set(0, 1.1 + j*0.6, 0);
      br.rotation.z = (Math.random()-0.5)*1.5 + (j%2 ? 0.7 : -0.7);
      br.rotation.x = (Math.random()-0.5)*0.7;
      trunk.add(br);
    }
  }

  // broken streetlamps — unlit, just dark silhouettes
  const lampMat = mat("#101012"), lampHead = new THREE.MeshBasicMaterial({ color:"#1a1505" });
  for (let i = 0; i < 3; i++) {
    const a = i*(TAU/3) + 0.5, r = 19;
    const post = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.16, 6, 6), lampMat);
    post.position.set(Math.cos(a)*r, 3, Math.sin(a)*r);
    post.rotation.z = (Math.random()-0.5)*0.25; post.castShadow = true;
    scene.add(post);
    const lamp = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.4, 0.5), lampHead);
    lamp.position.set(post.position.x, 6, post.position.z); scene.add(lamp);
  }

  // scattered debris — crates, rubble, planks, a wrecked car
  const crateMat = mat("#231c12"), rubbleMat = mat("#141414"), plankMat = mat("#1d150c");
  for (let i = 0; i < 16; i++) {
    const r = 4 + Math.random()*21, a = Math.random()*TAU;
    const x = Math.cos(a)*r, z = Math.sin(a)*r;
    const kind = Math.random();
    if (kind < 0.4) {
      const s = rand(0.5, 1.0);
      const crate = new THREE.Mesh(new THREE.BoxGeometry(s, s, s), crateMat);
      crate.position.set(x, s/2, z); crate.rotation.y = Math.random()*TAU;
      crate.castShadow = true; scene.add(crate);
    } else if (kind < 0.75) {
      const rb = new THREE.Mesh(new THREE.BoxGeometry(rand(0.5,1.4), rand(0.2,0.5), rand(0.5,1.4)), rubbleMat);
      rb.position.set(x, 0.15, z); rb.rotation.y = Math.random()*TAU; scene.add(rb);
    } else {
      const pl = new THREE.Mesh(new THREE.BoxGeometry(rand(1.2,2.4), 0.12, 0.24), plankMat);
      pl.position.set(x, 0.08, z); pl.rotation.y = Math.random()*TAU;
      pl.rotation.z = (Math.random()-0.5)*0.3; scene.add(pl);
    }
  }
  // a wrecked car hulk
  const carMat = mat("#171715"), car = new THREE.Group();
  const cBody = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.9, 4.4), carMat);
  cBody.position.y = 0.7; cBody.castShadow = true; car.add(cBody);
  const cCab = new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.8, 2.0), carMat);
  cCab.position.set(0, 1.45, -0.3); car.add(cCab);
  car.position.set(rand(-14,14), 0, rand(-14,14)); car.rotation.y = Math.random()*TAU;
  scene.add(car);

  return { ground, moon };
}

/* ─── player ────────────────────────────────────────────────────────────────
   Movement, melee combat and procedural animation. Reads `state` and the
   `keys` map; mutates `state.pos` and the player meshes. updatePlayer() runs
   once per frame while phase === PLAYING.                                    */

// movement (units/second) — both modifiable by upgrades in Milestone 4
const WALK_SPEED   = 5.0;
const SPRINT_SPEED = 8.5;
const ARENA_RADIUS = 27;          // simple circular bound; zones replace this later

// melee swing timing (ms from swing start) and reach
const SWING_WINDUP_END   = 210;   // 0-210ms   : club rears up behind the head
const SWING_STRIKE_END   = 400;   // 210-400ms : the chop down across the body — HIT WINDOW
const SWING_RECOVERY_END = 620;   // 400-620ms : returns to rest
const SWING_COOLDOWN     = 520;   // gap before another swing is allowed
const MELEE_RANGE  = 7.0;         // long reach — a committed overhand chop
const MELEE_CONE   = 0.3;         // cos(half-angle) — 0.3 ≈ 73 degrees
const MELEE_DAMAGE = 2;

// input
const keys = Object.create(null);

document.addEventListener("keydown", (e) => {
  keys[e.code] = true;
  if (e.code === "ShiftLeft" || e.code === "ShiftRight") state.sprinting = true;
});
document.addEventListener("keyup", (e) => {
  keys[e.code] = false;
  if (e.code === "ShiftLeft" || e.code === "ShiftRight") state.sprinting = false;
});
document.addEventListener("mousemove", (e) => {
  if (!pointerLocked || state.phase !== Phase.PLAYING) return;
  const s = 0.0022;
  state.yaw   -= e.movementX * s;
  state.pitch += e.movementY * s;   // standard (non-inverted) Y
  state.pitch = clamp(state.pitch, -0.6, 0.85);
});
document.addEventListener("mousedown", (e) => {
  if (state.phase !== Phase.PLAYING) return;
  if (e.button === 0) trySwing();
});

// begin a swing if not mid-swing and off cooldown
function trySwing() {
  const now = performance.now();
  if (state.swinging) return;
  if (now - state.swingStartAt < SWING_COOLDOWN) return;
  state.swinging = true;
  state.swingStartAt = now;
  state.swingHitIds.clear();
  Audio.swing();
}

// resolve hits for the current swing — a forward cone, one hit per zombie
function checkMeleeHits(now) {
  const fx = -Math.sin(state.yaw);   // player forward (opposite the camera offset)
  const fz = -Math.cos(state.yaw);

  for (let i = 0; i < zombies.length; i++) {
    const zd = zombies[i];
    if (!zd.alive) continue;
    if (state.swingHitIds.has(zd)) continue;

    const dx = zd.parts.root.position.x - state.pos.x;
    const dz = zd.parts.root.position.z - state.pos.z;
    const dist = Math.sqrt(dx*dx + dz*dz);
    if (dist > MELEE_RANGE || dist < 0.01) continue;

    const nx = dx / dist, nz = dz / dist;
    if (nx*fx + nz*fz < MELEE_CONE) continue;   // outside the forward cone

    // hit!
    state.swingHitIds.add(zd);
    zd.hp -= MELEE_DAMAGE;
    Audio.hit();
    spawnBlood(zd.parts.root.position.x, 2.0, zd.parts.root.position.z);
    crosshair.classList.add("hit");
    setTimeout(() => crosshair.classList.remove("hit"), 180);
    spawnHitFloater(zd.hp <= 0 ? "DOWN!" : "+" + MELEE_DAMAGE, zd.hp <= 0);

    // knockback — shove the zombie away from the player
    zd.knockX = fx * 0.6;
    zd.knockZ = fz * 0.6;
    zd.knockUntil = now + 220;
    zd.attackCooldown = Math.max(zd.attackCooldown, 0.5);   // brief stagger

    if (zd.hp <= 0) killZombie(zd);
  }
}

// apply damage to the player; triggers GAME_OVER at 0
function damagePlayer(amt) {
  state.health = Math.max(0, state.health - amt);
  state.lastDamageAt = performance.now();
  damageVignette.classList.add("on");
  setTimeout(() => damageVignette.classList.remove("on"), 220);
  Audio.hurt();
  updateHealthUI();
  if (state.health <= 0 && state.phase === Phase.PLAYING) gameOver();
}

function updatePlayer(dt) {
  const now = performance.now();

  // movement input, relative to camera yaw
  state.moveVec.set(0, 0);
  if (keys["KeyW"]) state.moveVec.y += 1;
  if (keys["KeyS"]) state.moveVec.y -= 1;
  if (keys["KeyA"]) state.moveVec.x -= 1;
  if (keys["KeyD"]) state.moveVec.x += 1;
  if (state.moveVec.lengthSq() > 0) state.moveVec.normalize();

  // "forward" is the camera-offset direction; walking forward = away from it
  _fwd.set(Math.sin(state.yaw), 0, Math.cos(state.yaw));
  _rgt.set(Math.sin(state.yaw + Math.PI/2), 0, Math.cos(state.yaw + Math.PI/2));

  const speed = (state.sprinting && state.moveVec.y > 0) ? SPRINT_SPEED : WALK_SPEED;
  state.pos.x += (_rgt.x * state.moveVec.x - _fwd.x * state.moveVec.y) * speed * dt;
  state.pos.z += (_rgt.z * state.moveVec.x - _fwd.z * state.moveVec.y) * speed * dt;

  // keep within the arena
  const distFromCenter = Math.hypot(state.pos.x, state.pos.z);
  if (distFromCenter > ARENA_RADIUS) {
    const a = Math.atan2(state.pos.z, state.pos.x);
    state.pos.x = Math.cos(a) * ARENA_RADIUS;
    state.pos.z = Math.sin(a) * ARENA_RADIUS;
  }

  // place + face the player (player faces the camera-forward direction)
  player.root.position.set(state.pos.x, 1.65, state.pos.z);
  player.root.rotation.y = state.yaw + Math.PI;

  // walk-cycle leg bob
  const moving = state.moveVec.lengthSq() > 0.01;
  if (moving) {
    state.bobTime += dt * (state.sprinting ? 12 : 8);
    const swing = state.sprinting ? 0.7 : 0.5;
    player.legL.userData.thighPiv.rotation.x =  Math.sin(state.bobTime) * swing;
    player.legR.userData.thighPiv.rotation.x = -Math.sin(state.bobTime) * swing;
  } else {
    player.legL.userData.thighPiv.rotation.x = lerp(player.legL.userData.thighPiv.rotation.x, 0, 0.2);
    player.legR.userData.thighPiv.rotation.x = lerp(player.legR.userData.thighPiv.rotation.x, 0, 0.2);
  }

  // melee swing — an overhand chop via quaternion slerp
  const sp = player.stickPivot;
  const { qRest, qWind, qStrike } = sp.userData;
  const fx = player.slashFx;
  if (state.swinging) {
    const elapsed = now - state.swingStartAt;
    let armPitch = 0;
    if (elapsed < SWING_WINDUP_END) {
      const t = easeOutCubic(elapsed / SWING_WINDUP_END);
      _qTmp.slerpQuaternions(qRest, qWind, t);
      armPitch = lerp(0, -1.5, t);              // arms rear up behind the head
      fx.visible = false;
    } else if (elapsed < SWING_STRIKE_END) {
      const t = easeInQuad((elapsed - SWING_WINDUP_END) / (SWING_STRIKE_END - SWING_WINDUP_END));
      _qTmp.slerpQuaternions(qWind, qStrike, t);
      armPitch = lerp(-1.5, 0.5, t);            // chop down and across the body
      checkMeleeHits(now);
      fx.visible = true;                        // the cut streak flashes
      fx.material.opacity = (1 - t) * 0.8;
      fx.scale.setScalar(0.85 + t * 0.5);
    } else if (elapsed < SWING_RECOVERY_END) {
      const t = easeOutCubic((elapsed - SWING_STRIKE_END) / (SWING_RECOVERY_END - SWING_STRIKE_END));
      _qTmp.slerpQuaternions(qStrike, qRest, t);
      armPitch = lerp(0.5, 0, t);
      fx.visible = false;
    } else {
      state.swinging = false;
      _qTmp.copy(qRest);
      fx.visible = false;
    }
    sp.quaternion.copy(_qTmp);
    player.armR.rotation.x = armPitch;
    player.armL.rotation.x = armPitch;
  } else {
    sp.quaternion.slerp(qRest, 0.15);
    player.armR.rotation.x = lerp(player.armR.rotation.x, 0, 0.2);
    player.armL.rotation.x = lerp(player.armL.rotation.x, 0, 0.2);
    fx.visible = false;
  }
}

/* ─── zombies ───────────────────────────────────────────────────────────────
   Spawning, chase/attack AI and animation. Each entry of `zombies` is:
   { parts, hp, maxHp, speed, attackCooldown, alive, dyingAt, walkPhase,
     groanAt, knockX/Z, knockUntil, fallAxis, fallDir }.
   M1 NOTE: zombies are still allocated per spawn — pooling arrives in M2.    */
const zombies = [];

/* blood — a short-lived particle spray flung when a zombie is struck.
   Shared geometry + material; particles are plain meshes removed on expiry. */
const blood = [];
const bloodGeo = new THREE.SphereGeometry(0.085, 5, 4);
const bloodMat = new THREE.MeshBasicMaterial({ color: 0x7c0f08 });
function spawnBlood(x, y, z) {
  for (let i = 0; i < 14; i++) {
    const m = new THREE.Mesh(bloodGeo, bloodMat);
    m.position.set(x, y, z);
    scene.add(m);
    blood.push({ mesh: m, vx: rand(-3.6,3.6), vy: rand(2,6.5), vz: rand(-3.6,3.6),
                 age: 0, life: rand(0.4, 0.85) });
  }
}
function updateBlood(dt) {
  for (let i = blood.length - 1; i >= 0; i--) {
    const b = blood[i];
    b.age += dt;
    if (b.age >= b.life) { scene.remove(b.mesh); blood.splice(i, 1); continue; }
    b.vy -= 15 * dt;
    b.mesh.position.x += b.vx * dt;
    b.mesh.position.y += b.vy * dt;
    b.mesh.position.z += b.vz * dt;
    if (b.mesh.position.y < 0.06) { b.mesh.position.y = 0.06; b.vy *= -0.3; b.vx *= 0.6; b.vz *= 0.6; }
    b.mesh.scale.setScalar(clamp(1 - b.age / b.life, 0.25, 1));
  }
}

function spawnZombie() {
  const variant = Math.floor(Math.random()*4);
  const z = buildZombie(variant);
  // spawn on the outer ring, around the player
  const r = 22 + Math.random()*5;
  const a = Math.random()*TAU;
  z.root.position.set(Math.cos(a)*r + state.pos.x, 1.8, Math.sin(a)*r + state.pos.z);
  scene.add(z.root);

  const speed = rand(1.2, 2.4) + state.wave*0.08;
  // HP scales with the wave: wave 1 dies in one hit, +1 hit needed per wave.
  const hp = MELEE_DAMAGE * state.wave;
  zombies.push({
    parts: z, hp, maxHp: hp, speed,
    attackCooldown: 0, alive: true, dyingAt: 0,
    walkPhase: Math.random()*TAU,
    groanAt: performance.now() + rand(2000, 8000),
  });
  state.zombiesAlive++;
}

// take a zombie down — score, topple animation setup
function killZombie(zd) {
  zd.alive = false;
  zd.dyingAt = performance.now();
  state.zombiesAlive--;
  state.kills++;
  state.score += 100;
  updateScoreUI();
  zd.fallAxis = Math.random() < 0.5 ? "x" : "z";
  zd.fallDir  = Math.random() < 0.5 ? 1 : -1;
}

function updateZombies(dt) {
  const now = performance.now();

  for (let i = zombies.length - 1; i >= 0; i--) {
    const zd = zombies[i];

    // dying animation: topple, sink, fade, then remove
    if (!zd.alive) {
      const t = (now - zd.dyingAt) / 1000;
      if (t < 1.2) {
        const angle = clamp(t * 1.6, 0, Math.PI/2);
        if (zd.fallAxis === "x") zd.parts.root.rotation.x = -angle * zd.fallDir;
        else                     zd.parts.root.rotation.z =  angle * zd.fallDir;
        zd.parts.root.position.y = 1.8 - t*0.2;
      } else if (t < 3) {
        zd.parts.root.position.y = 1.6 - (t-1.2)*0.5;
        zd.parts.root.traverse(o => {
          if (o.material && o.material.opacity != null) {
            o.material.transparent = true;
            o.material.opacity = clamp(1 - (t-1.2)/1.8, 0, 1);
          }
        });
      } else {
        scene.remove(zd.parts.root);
        zd.parts.root.traverse(o => { if (o.geometry) o.geometry.dispose(); });
        zombies.splice(i, 1);
      }
      continue;
    }

    // knockback (from melee) — overrides chase movement briefly
    if (zd.knockUntil && now < zd.knockUntil) {
      const knockT = (zd.knockUntil - now) / 220;
      zd.parts.root.position.x += zd.knockX * knockT * dt * 8;
      zd.parts.root.position.z += zd.knockZ * knockT * dt * 8;
      zd.parts.torso.rotation.x = lerp(zd.parts.torso.rotation.x, -0.3, 0.3);
      continue;
    } else if (zd.parts.torso.rotation.x !== 0) {
      zd.parts.torso.rotation.x = lerp(zd.parts.torso.rotation.x, 0, 0.2);
    }

    // chase the player
    _chase.set(state.pos.x - zd.parts.root.position.x, 0, state.pos.z - zd.parts.root.position.z);
    const dist = _chase.length();
    if (dist > 0.0001) _chase.normalize();
    const targetYaw = Math.atan2(_chase.x, _chase.z);
    zd.parts.root.rotation.y = lerpAngle(zd.parts.root.rotation.y, targetYaw, 0.12);

    if (dist > 1.7) {
      // move closer + walk cycle
      zd.parts.root.position.x += _chase.x * zd.speed * dt;
      zd.parts.root.position.z += _chase.z * zd.speed * dt;
      zd.walkPhase += dt * (3 + zd.speed*0.5);
      const sw = Math.sin(zd.walkPhase) * 0.4;
      zd.parts.legL.userData.thighPiv.rotation.x = sw;
      zd.parts.legR.userData.thighPiv.rotation.x = -sw;
      zd.parts.torso.rotation.z = Math.sin(zd.walkPhase*0.5) * 0.06;
      zd.parts.root.position.y = 1.8 + Math.abs(Math.sin(zd.walkPhase))*0.05;
      zd.parts.armL.userData.upper.rotation.x = -1.3 + Math.sin(zd.walkPhase)*0.15;
      zd.parts.armR.userData.upper.rotation.x = -1.3 - Math.sin(zd.walkPhase)*0.15;
    } else {
      // in range — attack
      zd.attackCooldown -= dt;
      const lunge = Math.sin(now * 0.012) * 0.3 - 1.6;
      zd.parts.armL.userData.upper.rotation.x = lunge;
      zd.parts.armR.userData.upper.rotation.x = lunge;
      if (zd.attackCooldown <= 0) {
        damagePlayer(10);
        zd.attackCooldown = 1.1;
      }
    }

    // occasional groan, only when reasonably close (avoids sound spam)
    if (now > zd.groanAt) {
      if (dist < 18) Audio.groan();
      zd.groanAt = now + rand(4000, 12000);
    }
  }
}

/* ─── waves ──────────────────────────────────────────────────────────────────
   Spawn scheduling, difficulty scaling and the end-of-wave bonus. updateWaves()
   runs only while phase === PLAYING.
   M1 NOTE: the brief's reworked formulas (5+N*2, 30-alive cap, 6s inter-wave
   pause) are Milestone 3. The end-of-wave bonus is applied once (v1 applied it
   every frame of the gap — a bug; brief 5.5 specifies it once).              */
function startNextWave() {
  state.wave++;
  state.zombiesToSpawn = 4 + state.wave * 2;
  waveNum.textContent = state.wave;
  showBanner("Wave " + state.wave, state.wave === 1 ? "Brace yourself" : "More are coming");
}

function showBanner(big, sub) {
  waveBannerBig.textContent = big;
  waveBannerSub.textContent = sub;
  waveBanner.classList.add("on");
  setTimeout(() => waveBanner.classList.remove("on"), 2200);
}

function updateWaves(dt) {
  const now = performance.now();
  if (state.zombiesToSpawn > 0 && state.zombiesAlive < 12) {
    if (Math.random() < 0.04) {            // throttled trickle spawn
      spawnZombie();
      state.zombiesToSpawn--;
    }
  } else if (state.zombiesToSpawn === 0 && state.zombiesAlive === 0) {
    // wave cleared — bonus once, then schedule the next wave
    if (!state.nextWaveAt) {
      state.score += 250 * state.wave;
      updateScoreUI();
      state.nextWaveAt = now + 3500;
    }
    if (now >= state.nextWaveAt) {
      state.nextWaveAt = 0;
      startNextWave();
    }
  }
}

/* ─── upgrades ───────────────────────────────────────────────────────────────
   Between-wave card picker and run-state modifiers. Added in Milestone 4 —
   this section is an intentional placeholder so the architecture is complete. */
// (Milestone 4)

/* ─── hud ────────────────────────────────────────────────────────────────────
   Overlay DOM references and their update helpers. All HUD is plain DOM —
   nothing is rendered as text in the 3D scene.                               */
const stage          = document.getElementById("stage");
const overlay        = document.getElementById("overlay");
const centerCard     = document.getElementById("centerCard");
const startBtn       = document.getElementById("startBtn");
const healthFill     = document.getElementById("healthFill");
const scoreText      = document.getElementById("scoreText");
const waveNum        = document.getElementById("waveNum");
const waveBanner     = document.getElementById("waveBanner");
const waveBannerBig  = document.getElementById("waveBannerBig");
const waveBannerSub  = document.getElementById("waveBannerSub");
const crosshair      = document.getElementById("crosshair");
const damageVignette = document.getElementById("damageVignette");

function updateScoreUI() {
  scoreText.textContent = state.kills + " · " + state.score;
}
function updateHealthUI() {
  healthFill.style.width = (state.health / state.maxHealth * 100) + "%";
}

// rising "+N" / "DOWN!" text near screen centre
function spawnHitFloater(text, head) {
  const el = document.createElement("div");
  el.className = "floater";
  el.textContent = text;
  if (head) el.style.color = "#c0392b";
  el.style.left = (window.innerWidth/2 + rand(-30, 30)) + "px";
  el.style.top  = (window.innerHeight/2 + rand(-30, -10)) + "px";
  document.body.appendChild(el);
  const start = performance.now();
  (function tick() {
    const t = (performance.now() - start) / 700;
    if (t >= 1) { el.remove(); return; }
    el.style.transform = "translateY(" + (-t*60) + "px)";
    el.style.opacity = (1 - t).toString();
    requestAnimationFrame(tick);
  })();
}

/* ─── state machine ──────────────────────────────────────────────────────────
   Explicit game-flow FSM. `state` is the single global mutable record; every
   gameplay system reads and writes through it.

     TITLE - PLAYING - UPGRADE_PICK ;  PLAYING - GAME_OVER - TITLE

   UPGRADE_PICK is declared but unused until Milestone 4. "Try again" routes
   GAME_OVER - TITLE via a page reload (a seamless reset is a later item).    */
const Phase = { TITLE: "TITLE", PLAYING: "PLAYING", UPGRADE_PICK: "UPGRADE_PICK", GAME_OVER: "GAME_OVER" };

const state = {
  phase: Phase.TITLE,
  health: 100, maxHealth: 100,
  score: 0, kills: 0,
  wave: 0,
  zombiesAlive: 0, zombiesToSpawn: 0,
  nextWaveAt: 0,
  yaw: 0, pitch: 0.35,
  pos: new THREE.Vector3(0, 0, 0),
  sprinting: false,
  moveVec: new THREE.Vector2(),
  bobTime: 0,
  lastDamageAt: -10,
  swinging: false,
  swingStartAt: -1000,
  swingHitIds: new Set(),
};

// pointer lock is held only during PLAYING
let pointerLocked = false;
function lockPointer() {
  if (document.pointerLockElement !== renderer.domElement) {
    renderer.domElement.requestPointerLock();
  }
}
document.addEventListener("pointerlockchange", () => {
  pointerLocked = (document.pointerLockElement === renderer.domElement);
});

// the single phase-transition entry point
function setPhase(next) {
  state.phase = next;
  const playing = (next === Phase.PLAYING);
  overlay.classList.toggle("hidden", playing);
  if (playing) lockPointer();
  else if (document.pointerLockElement) document.exitPointerLock();
}

// TITLE -> PLAYING : fresh run
function beginGame() {
  state.health = state.maxHealth;
  state.score = 0; state.kills = 0;
  state.wave = 0;
  state.zombiesAlive = 0; state.zombiesToSpawn = 0;
  state.nextWaveAt = 0;
  state.pos.set(0, 0, 0);
  state.yaw = 0; state.pitch = 0.35;
  state.sprinting = false;
  state.swinging = false; state.swingStartAt = -1000;
  state.swingHitIds.clear();
  updateHealthUI();
  updateScoreUI();
  startNextWave();
  setPhase(Phase.PLAYING);
  Ambience.start();
}

// PLAYING -> GAME_OVER
function gameOver() {
  centerCard.innerHTML =
      '<div class="big">You Were Devoured</div>'
    + '<div class="sub">Survived ' + state.wave + ' wave' + (state.wave===1?"":"s")
    + ' · ' + state.kills + ' kill' + (state.kills===1?"":"s")
    + ' · score ' + state.score + '</div>'
    + '<button class="btn" id="restartBtn">Try again</button>';
  setPhase(Phase.GAME_OVER);
  Ambience.stop();
  document.getElementById("restartBtn").addEventListener("click", () => location.reload());
}

/* ─── main loop ──────────────────────────────────────────────────────────────
   Three.js core (renderer / scene / camera / lights), the per-frame update +
   render, and boot wiring. The render loop runs continuously; gameplay systems
   are stepped only while phase === PLAYING.                                   */

// third-person orbit camera — base framing (modifiable by upgrades in M4)
const CAM_DIST = 11.0;
const CAM_HEIGHT = 6.5;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 200);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
stage.appendChild(renderer.domElement);

// fog — the dead loom out of the murk (lighter and deeper than before)
scene.fog = new THREE.Fog(0x0c0e16, 10, 54);

// lighting — a dim cold night with a warm survivor light pool
const hemi = new THREE.HemisphereLight(0x3a4252, 0x0a0b0f, 0.95);
scene.add(hemi);
const moonLight = new THREE.DirectionalLight(0x9aa8c4, 0.7);
moonLight.position.set(-24, 34, -18); moonLight.castShadow = true;
moonLight.shadow.mapSize.set(1024, 1024);
moonLight.shadow.camera.left = -34; moonLight.shadow.camera.right = 34;
moonLight.shadow.camera.top = 34; moonLight.shadow.camera.bottom = -34;
moonLight.shadow.camera.near = 0.1; moonLight.shadow.camera.far = 90;
scene.add(moonLight);
// warm light that follows the player — a pool of safety against the dark
const playerLight = new THREE.PointLight(0xffb878, 3.0, 36);
playerLight.position.set(0, 4.2, 0);
scene.add(playerLight);

// build the world and the player
buildEnvironment(scene);
const player = buildPlayer();
scene.add(player.root);

// third-person follow camera — computes position directly, no per-frame alloc
function updateCamera() {
  const ph = state.pitch, cy = state.yaw, chp = Math.cos(ph);
  camera.position.set(
    state.pos.x + Math.sin(cy) * chp * CAM_DIST,
    CAM_HEIGHT + Math.sin(ph) * CAM_DIST,
    state.pos.z + Math.cos(cy) * chp * CAM_DIST
  );
  camera.lookAt(state.pos.x, 2.3, state.pos.z);
  playerLight.position.set(state.pos.x, 4.2, state.pos.z);
  // subtle torch-like flicker — keeps the light pool uneasy
  playerLight.intensity = 3.0 + Math.sin(performance.now()*0.014)*0.22 + (Math.random()-0.5)*0.45;
}

const clock = new THREE.Clock();
let raf = null;

function frame() {
  raf = requestAnimationFrame(frame);
  const dt = Math.min(clock.getDelta(), 0.05);
  if (state.phase === Phase.PLAYING) {
    updatePlayer(dt);
    updateZombies(dt);
    updateWaves(dt);
    updateBlood(dt);
  }
  updateCamera();
  renderer.render(scene, camera);
}

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ── boot ── */
setPhase(Phase.TITLE);
startBtn.addEventListener("click", beginGame);
// re-acquire pointer lock if it was dropped mid-run (e.g. via Esc)
renderer.domElement.addEventListener("click", () => {
  if (state.phase === Phase.PLAYING && !pointerLocked) lockPointer();
});
frame();

};  // end window.startMortimersHorde
</script>
</body>
</html>
