<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="icon" href="data:," />
<title>Mortimer's Horde</title>
<style>
  html, body { margin: 0; height: 100%; background: #05040a; overflow: hidden;
    font-family: 'Arial Narrow', Arial, sans-serif; color: #d8cdbb; }
  #game { display: block; position: fixed; inset: 0; z-index: 0; }
  #ui { position: fixed; inset: 0; z-index: 10; pointer-events: none;
    user-select: none; -webkit-user-select: none; }

  /* ---- in-game HUD ---- */
  .topbar { position: absolute; top: 14px; left: 0; right: 0; display: flex;
    justify-content: space-between; padding: 0 26px; font-weight: 700; }
  #lvl { color: #e3bd57; font-size: 21px; }
  #district { color: #7d7668; font-size: 12px; letter-spacing: 1px; }
  #wave { color: #c8c0b0; font-size: 27px; letter-spacing: 2px;
    text-shadow: 0 0 18px rgba(150,25,15,.7); }
  #score { color: #8b8478; font-size: 16px; text-align: right; }

  #hpwrap { position: absolute; left: 26px; bottom: 30px; width: 280px; }
  #hpbar { height: 22px; background: #1c0707; border: 2px solid #3a2018;
    border-radius: 4px; overflow: hidden; box-shadow: 0 0 14px rgba(0,0,0,.7);
    position: relative; }
  #hpfill { height: 100%; width: 100%;
    background: linear-gradient(90deg, #6e0d09, #e8362a); transition: width .12s; }
  #hptext { position: absolute; inset: 0; text-align: center; line-height: 22px;
    font-size: 13px; font-weight: 700; color: #f0e6da; }
  #stats { margin-top: 6px; font-size: 12px; color: #8b8478; font-weight: 700;
    letter-spacing: 1px; }

  #xpbar { position: absolute; left: 0; right: 0; bottom: 0; height: 7px;
    background: rgba(0,0,0,.7); }
  #xpfill { height: 100%; width: 0%;
    background: linear-gradient(90deg, #caa23a, #f4e08a); transition: width .15s; }

  #abilities { position: absolute; left: 50%; transform: translateX(-50%);
    bottom: 22px; display: flex; gap: 12px; }
  .abil { width: 50px; height: 50px; background: rgba(8,8,10,.85);
    border: 2px solid #2c2c33; border-radius: 7px; position: relative;
    overflow: hidden; }
  .abil .dot { position: absolute; left: 50%; top: 19px;
    transform: translateX(-50%); width: 22px; height: 22px; border-radius: 50%; }
  .abil .cd { position: absolute; left: 0; right: 0; bottom: 0; top: 100%;
    background: rgba(0,0,0,.72); }
  .abil .key { position: absolute; left: 0; right: 0; bottom: 3px;
    text-align: center; font-size: 9px; color: #8b8478; }

  #crosshair { position: absolute; width: 26px; height: 26px; margin: -13px;
    pointer-events: none; display: none; }
  #crosshair::before, #crosshair::after { content: ''; position: absolute;
    background: rgba(200,80,62,.9); }
  #crosshair::before { left: 12px; top: 0; width: 2px; height: 26px; }
  #crosshair::after { top: 12px; left: 0; height: 2px; width: 26px; }

  #banner { position: absolute; left: 0; right: 0; top: 21%; text-align: center;
    opacity: 0; transition: opacity .4s; }
  #banner .big { font-size: 56px; font-weight: 800; color: #c8c0b0;
    text-shadow: 0 0 26px rgba(150,25,15,.75); }
  #banner .sub { font-size: 13px; letter-spacing: 3px; color: #7d4f38; }

  /* ---- full-screen overlays ---- */
  .overlay { position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; pointer-events: auto;
    background: radial-gradient(ellipse at center,
      rgba(8,6,12,.72) 0%, rgba(4,3,7,.96) 80%); text-align: center; }
  .overlay.hidden { display: none; }
  .title-main { font-size: 70px; font-weight: 800; color: #b3aa9b;
    text-shadow: 0 0 34px rgba(150,22,12,.85); margin: 0; }
  .rule { width: 480px; height: 2px; background: #7a1a12; margin: 14px 0; }
  .muted { color: #6f6a60; font-size: 13px; letter-spacing: 1px; }
  .controls { color: #857f72; font-size: 12px; letter-spacing: 1px;
    margin-top: 8px; }
  .blink { color: #c9bfae; font-size: 17px; font-weight: 800; margin-top: 30px;
    animation: blink 1.4s infinite; }
  @keyframes blink { 50% { opacity: .35; } }
  .fell { font-size: 80px; font-weight: 800; color: #7c1b12;
    text-shadow: 0 0 22px rgba(0,0,0,.9); margin: 0; }

  /* ---- choice cards ---- */
  #choice .ctitle { font-size: 29px; font-weight: 800; color: #d8b75a;
    letter-spacing: 1px; margin-bottom: 26px; }
  .cards { display: flex; gap: 30px; }
  .card { width: 250px; height: 308px; background: #121016;
    border: 2px solid #3a3640; border-radius: 9px; display: flex;
    flex-direction: column; align-items: center; padding: 28px 18px 0;
    cursor: pointer; transition: border-color .12s, background .12s,
      transform .12s; box-sizing: border-box; }
  .card:hover { background: #1c1822; border-color: #d8b75a;
    transform: translateY(-4px); }
  .card.locked { opacity: .45; cursor: default; pointer-events: none;
    filter: grayscale(.6); }
  .card .emblem { width: 56px; height: 56px; border-radius: 50%;
    margin-bottom: 22px; box-shadow: 0 0 26px currentColor; }
  .card .cn { font-size: 23px; font-weight: 800; color: #e8ddc6;
    margin-bottom: 12px; }
  .card .cd2 { font-size: 15px; color: #9a9488; line-height: 1.4; }
  .card .take { margin-top: auto; margin-bottom: 18px; font-size: 11px;
    letter-spacing: 2px; color: #d8b75a; }
  #choice .ready { margin-top: 22px; font-size: 12px; letter-spacing: 2px;
    color: #6f6a60; height: 16px; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="ui">
  <div class="topbar">
    <div><div id="lvl">LEVEL 1</div><div id="district">THE BONEYARD</div></div>
    <div id="wave">WAVE 1</div>
    <div id="score">KILLS 0 &nbsp; SCORE 0</div>
  </div>

  <div id="hpwrap">
    <div id="hpbar"><div id="hpfill"></div><div id="hptext">120 / 120</div></div>
    <div id="stats">STR 0 &nbsp; VIT 0 &nbsp; SWI 0</div>
  </div>

  <div id="abilities">
    <div class="abil"><div class="dot" style="background:#9298a1"></div>
      <div class="cd" id="cd-atk"></div><div class="key">LMB</div></div>
    <div class="abil"><div class="dot" style="background:#caa24a"></div>
      <div class="cd" id="cd-smash"></div><div class="key">Q / RMB</div></div>
    <div class="abil"><div class="dot" style="background:#9fd0ff"></div>
      <div class="cd" id="cd-dash"></div><div class="key">SPACE</div></div>
  </div>

  <div id="xpbar"><div id="xpfill"></div></div>
  <div id="banner"><div class="big"></div><div class="sub"></div></div>
  <div id="crosshair"></div>

  <div id="title" class="overlay">
    <h1 class="title-main">MORTIMER'S HORDE</h1>
    <div class="rule"></div>
    <div class="muted">A 3D GOTHIC ARPG — CARVE THROUGH THE DEAD, GROW IN POWER</div>
    <div class="controls">WASD MOVE · MOUSE AIM · CLICK CLEAVE ·
      Q / RMB SMASH · SPACE DASH</div>
    <div class="blink">CLICK TO BEGIN</div>
  </div>

  <div id="choice" class="overlay hidden">
    <div class="ctitle"></div>
    <div class="cards"></div>
    <div class="ready"></div>
  </div>

  <div id="over" class="overlay hidden">
    <h1 class="fell">YOU FELL</h1>
    <div class="muted" id="over-stats"></div>
    <div class="blink" id="over-again" style="visibility:hidden">
      CLICK TO RISE AGAIN</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>
<script>
"use strict";
/* =========================================================================
   MORTIMER'S HORDE — a 3D gothic action-RPG  (Three.js r149, WebGL)
   A lone survivor cuts through the undead on rolling, living terrain:
   real 3D ground, grass that bends as you pass, drifting mist, firelight.
   ========================================================================= */
(function () {
const THREE = window.THREE;

/* ─── tuning ──────────────────────────────────────────────────────────────── */
const ARENA = 74;                       // playable radius
const P = {
  speed: 17, dashSpeed: 56, r: 1.15,
  baseHp: 120, baseDmg: 7, baseCrit: 0.13, baseCritMul: 2.0,
  atkRange: 7.6, atkArc: 1.15,
  atkWindup: 0.10, atkStrike: 0.13, atkRecover: 0.16,
  smashRange: 11, smashDmg: 26, smashCd: 4.2,
  dashCd: 1.8, dashTime: 0.17, dashIframes: 0.32,
};
// hitting carries a consequence: each swing briefly slows your stride
const ATK_SLOW_DUR = 0.55, ATK_SLOW_AMT = 0.28;

// archetypes — HP is fixed; the horde grows through numbers, speed & damage
const ETYPES = {
  shambler: { hp: 6,   speed: 4.4,  dmg: 9,  r: 1.2, h: 3.4, xp: 9,   sc: 1.0 },
  runner:   { hp: 5,   speed: 10.5, dmg: 7,  r: 1.0, h: 3.0, xp: 13,  sc: 0.86 },
  brute:    { hp: 26,  speed: 4.0,  dmg: 22, r: 2.0, h: 4.8, xp: 34,  sc: 1.55 },
  giant:    { hp: 130, speed: 3.2,  dmg: 40, r: 3.4, h: 7.4, xp: 130, sc: 2.5 },
};
const DISTRICTS = ["THE BONEYARD", "THE IRON GATE", "THE OLD STREETS",
                   "THE MARKET SQUARE", "THE OUTER WARD"];

/* ─── helpers ─────────────────────────────────────────────────────────────── */
const TAU = Math.PI * 2;
const rand  = (a, b) => a + Math.random() * (b - a);
const pick  = (a) => a[(Math.random() * a.length) | 0];
const clamp = (v, a, b) => (v < a ? a : v > b ? b : v);
const lerp  = (a, b, t) => a + (b - a) * t;
const easeOut = (t) => 1 - (1 - t) * (1 - t);
const easeIn  = (t) => t * t;
function angDiff(a, b) { let d = b - a; while (d > Math.PI) d -= TAU;
  while (d < -Math.PI) d += TAU; return d; }
function pick3(pool) {
  const c = pool.slice(), out = [];
  for (let i = 0; i < 3 && c.length; i++)
    out.push(c.splice((Math.random() * c.length) | 0, 1)[0]);
  return out;
}

/* ─── renderer / scene / camera ───────────────────────────────────────────── */
const canvas = document.getElementById("game");
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x07060c);
scene.fog = new THREE.FogExp2(0x07060c, 0.0142);

const camera = new THREE.PerspectiveCamera(54, 1, 0.1, 600);
const CAM_OFF = new THREE.Vector3(0, 31, 27);

function resize() {
  const w = innerWidth, h = innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
addEventListener("resize", resize); resize();

/* ─── lights ──────────────────────────────────────────────────────────────── */
scene.add(new THREE.HemisphereLight(0x3a4060, 0x0a0808, 0.55));
const moon = new THREE.DirectionalLight(0x9fb0d8, 0.62);
moon.position.set(60, 90, 40);
moon.castShadow = true;
moon.shadow.mapSize.set(2048, 2048);
moon.shadow.camera.near = 1; moon.shadow.camera.far = 230;
moon.shadow.camera.left = -ARENA; moon.shadow.camera.right = ARENA;
moon.shadow.camera.top = ARENA; moon.shadow.camera.bottom = -ARENA;
moon.shadow.bias = -0.0015;
scene.add(moon);
scene.add(moon.target);

/* ─── audio ───────────────────────────────────────────────────────────────── */
const Sound = (() => {
  let ac = null;
  function actx() { if (!ac) { try {
    ac = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) {} } return ac; }
  function tone(type, f0, f1, dur, vol, when) {
    const c = actx(); if (!c) return;
    const t = c.currentTime + (when || 0);
    const o = c.createOscillator(), g = c.createGain();
    o.type = type; o.frequency.setValueAtTime(f0, t);
    o.frequency.exponentialRampToValueAtTime(Math.max(1, f1), t + dur);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0008, t + dur);
    o.connect(g).connect(c.destination); o.start(t); o.stop(t + dur + 0.02);
  }
  function noise(dur, vol, type, f, q) {
    const c = actx(); if (!c) return;
    const t = c.currentTime;
    const b = c.createBuffer(1, Math.max(1, (dur * c.sampleRate) | 0),
      c.sampleRate), d = b.getChannelData(0);
    for (let i = 0; i < d.length; i++)
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 1.8);
    const s = c.createBufferSource(); s.buffer = b;
    const fl = c.createBiquadFilter();
    fl.type = type; fl.frequency.value = f; if (q) fl.Q.value = q;
    const g = c.createGain(); g.gain.value = vol;
    s.connect(fl).connect(g).connect(c.destination);
    s.start(t); s.stop(t + dur + 0.02);
  }
  return {
    actx,
    swing() { noise(0.2, 0.32, "bandpass", 2600, 3); },
    hit()   { noise(0.16, 0.46, "lowpass", 780); tone("sine",175,48,0.14,0.4); },
    crit()  { noise(0.18, 0.5, "lowpass", 950); tone("sine",240,55,0.18,0.46);
              tone("square", 600, 300, 0.1, 0.16); },
    smash() { noise(0.4, 0.55, "lowpass", 420); tone("sine",130,32,0.5,0.55); },
    dash()  { noise(0.22, 0.28, "highpass", 900); },
    hurt()  { tone("sawtooth", 200, 70, 0.3, 0.38); },
    groan() { tone("sawtooth", 56 + Math.random()*18, 33, 0.7, 0.06); },
    die()   { noise(0.3, 0.28, "lowpass", 500); tone("sawtooth",90,30,0.4,0.14); },
    pickup(){ tone("triangle", 520, 880, 0.12, 0.18); },
    levelup(){ [0,0.1,0.2,0.33].forEach((o,i) =>
      tone("triangle",330*Math.pow(1.26,i),330*Math.pow(1.26,i),0.22,0.18,o)); },
    choose(){ tone("triangle", 440, 660, 0.14, 0.22); },
    wave()  { tone("sawtooth", 84, 36, 1.2, 0.2); },
    step()  { noise(0.05, 0.12, "lowpass", 300); },
    heart() { tone("sine",60,32,0.16,0.32); tone("sine",58,30,0.14,0.28,0.17); },
  };
})();
const Ambience = (() => {
  let on = false, nodes = [], master = null, stingT = 0;
  function start() {
    const c = Sound.actx(); if (!c || on) return;
    on = true;
    master = c.createGain();
    master.gain.setValueAtTime(0.0001, c.currentTime);
    master.gain.linearRampToValueAtTime(0.42, c.currentTime + 5);
    const lp = c.createBiquadFilter();
    lp.type = "lowpass"; lp.frequency.value = 230;
    lp.connect(master); master.connect(c.destination);
    [[39,0.15,"sawtooth"],[39.5,0.15,"sawtooth"],[58,0.09,"sine"]].forEach(v => {
      const o = c.createOscillator();
      o.type = v[2]; o.frequency.value = v[0];
      const g = c.createGain(); g.gain.value = v[1];
      o.connect(g).connect(lp); o.start(); nodes.push(o);
    });
    const lfo = c.createOscillator(); lfo.frequency.value = 0.06;
    const lg = c.createGain(); lg.gain.value = 0.2;
    lfo.connect(lg).connect(master.gain); lfo.start(); nodes.push(lfo);
    stingT = rand(7, 13);
  }
  function update(dt) {
    if (!on) return;
    stingT -= dt;
    if (stingT <= 0) {
      stingT = rand(8, 17);
      const c = Sound.actx(); if (!c) return;
      const base = 230 + Math.random() * 460, t = c.currentTime;
      [base, base * 1.414].forEach(f => {
        const o = c.createOscillator();
        o.type = "triangle"; o.frequency.value = f;
        const g = c.createGain();
        g.gain.setValueAtTime(0.0001, t);
        g.gain.linearRampToValueAtTime(0.038, t + 0.9);
        g.gain.linearRampToValueAtTime(0.0001, t + 3.4);
        o.connect(g).connect(c.destination); o.start(t); o.stop(t + 3.5);
      });
    }
  }
  function stop() {
    if (!on) return; on = false;
    const c = Sound.actx();
    if (c && master)
      master.gain.linearRampToValueAtTime(0.0001, c.currentTime + 1.3);
    const dy = nodes; nodes = [];
    setTimeout(() => dy.forEach(o => { try { o.stop(); } catch (e) {} }), 1500);
  }
  return { start, update, stop };
})();

/* ─── terrain ─────────────────────────────────────────────────────────────────
   The ground is a real 3D heightmapped mesh — rolling, hilled and uneven.
   Everything (player, horde, props) is seated onto its surface.            */
function groundHeight(x, z) {
  return (Math.sin(x * 0.045) * 1.6 + Math.cos(z * 0.05) * 1.5
        + Math.sin((x + z) * 0.028) * 1.8
        + Math.sin(x * 0.013 - z * 0.017) * 2.3) * 0.62;
}
const GROUND = 230, GSEG = 200;
(function buildGround() {
  const geo = new THREE.PlaneGeometry(GROUND, GROUND, GSEG, GSEG);
  geo.rotateX(-Math.PI / 2);
  const pos = geo.attributes.position;
  const col = new Float32Array(pos.count * 3);
  const cLow = new THREE.Color(0x141118), cMid = new THREE.Color(0x232017);
  const cHi  = new THREE.Color(0x2c2a1c), cGrass = new THREE.Color(0x1d2415);
  const tmp = new THREE.Color();
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), z = pos.getZ(i);
    const y = groundHeight(x, z);
    pos.setY(i, y);
    const t = clamp((y + 4) / 8, 0, 1);
    tmp.copy(t < 0.5 ? cLow : cMid).lerp(t < 0.5 ? cMid : cHi, (t % 0.5) * 2);
    if (Math.random() < 0.16) tmp.lerp(cGrass, rand(0.3, 0.8));
    tmp.multiplyScalar(rand(0.82, 1.12));
    col[i*3] = tmp.r; col[i*3+1] = tmp.g; col[i*3+2] = tmp.b;
  }
  geo.setAttribute("color", new THREE.BufferAttribute(col, 3));
  geo.computeVertexNormals();
  const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({
    vertexColors: true, roughness: 1, metalness: 0 }));
  mesh.receiveShadow = true;
  scene.add(mesh);
})();

/* interactive grass — instanced tufts that bend away as you walk through */
const GRASS_N = 720;
const grassBlade = [];
let grass = null;
(function buildGrass() {
  const geo = new THREE.ConeGeometry(0.17, 1.7, 4);
  geo.translate(0, 0.85, 0);
  const m = new THREE.MeshStandardMaterial({ color: 0x26301a,
    roughness: 1, metalness: 0, flatShading: true });
  grass = new THREE.InstancedMesh(geo, m, GRASS_N);
  grass.receiveShadow = true;
  const d = new THREE.Object3D();
  for (let i = 0; i < GRASS_N; i++) {
    const a = rand(0, TAU), rr = Math.sqrt(Math.random()) * (ARENA - 3);
    const x = Math.cos(a) * rr, z = Math.sin(a) * rr;
    grassBlade.push({ x, z, y: groundHeight(x, z),
      phase: rand(0, TAU), h: rand(0.7, 1.5) });
    d.position.set(x, grassBlade[i].y, z);
    d.scale.set(1, grassBlade[i].h, 1);
    d.rotation.set(0, rand(0, TAU), 0);
    d.updateMatrix(); grass.setMatrixAt(i, d.matrix);
  }
  scene.add(grass);
})();
let grassFlatten = null;       // {x, z, r, t} — smash stomps the grass flat
const _gd = new THREE.Object3D();
function updateGrass(dt, t) {
  const px = player.x, pz = player.z;
  if (grassFlatten) { grassFlatten.t += dt;
    if (grassFlatten.t > 1.4) grassFlatten = null; }
  for (let i = 0; i < GRASS_N; i++) {
    const b = grassBlade[i];
    let bx = Math.sin(t * 1.3 + b.phase) * 0.12, bz = Math.cos(t + b.phase)*0.1;
    const dx = b.x - px, dz = b.z - pz, dd = Math.hypot(dx, dz);
    if (dd < 6.5) {
      const k = (1 - dd / 6.5) * 1.3;
      bx += dx / (dd || 1) * k; bz += dz / (dd || 1) * k;
    }
    if (grassFlatten) {
      const fx = b.x - grassFlatten.x, fz = b.z - grassFlatten.z;
      const fd = Math.hypot(fx, fz);
      if (fd < grassFlatten.r) {
        const k = (1 - fd / grassFlatten.r) * (1 - grassFlatten.t / 1.4) * 1.7;
        bx += fx / (fd || 1) * k; bz += fz / (fd || 1) * k;
      }
    }
    _gd.position.set(b.x, b.y, b.z);
    _gd.rotation.set(bz, b.phase, -bx);
    _gd.scale.set(1, b.h, 1);
    _gd.updateMatrix(); grass.setMatrixAt(i, _gd.matrix);
  }
  grass.instanceMatrix.needsUpdate = true;
}

/* drifting mist — slow translucent sheets that keep the ground alive */
const mists = [];
(function buildMist() {
  const c = document.createElement("canvas"); c.width = c.height = 128;
  const g = c.getContext("2d");
  const gr = g.createRadialGradient(64, 64, 4, 64, 64, 64);
  gr.addColorStop(0, "rgba(150,155,175,0.5)");
  gr.addColorStop(1, "rgba(150,155,175,0)");
  g.fillStyle = gr; g.fillRect(0, 0, 128, 128);
  const tex = new THREE.CanvasTexture(c);
  const geo = new THREE.PlaneGeometry(58, 58);
  geo.rotateX(-Math.PI / 2);
  for (let i = 0; i < 5; i++) {
    const m = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ map: tex,
      transparent: true, opacity: 0.13, depthWrite: false }));
    m.position.set(rand(-ARENA, ARENA), rand(2.5, 5), rand(-ARENA, ARENA));
    m.userData = { vx: rand(-1.4, 1.4), vz: rand(-1.4, 1.4),
      spin: rand(-0.1, 0.1) };
    scene.add(m); mists.push(m);
  }
})();

/* ─── particles ───────────────────────────────────────────────────────────── */
const PCOUNT = 900;
const pState = [];
let pCursor = 0;
const pGeo = new THREE.BufferGeometry();
const pPos = new Float32Array(PCOUNT * 3);
const pCol = new Float32Array(PCOUNT * 3);
for (let i = 0; i < PCOUNT; i++) {
  pPos[i*3+1] = -999;
  pState.push({ vx: 0, vy: 0, vz: 0, age: 0, life: 0, grav: 1 });
}
pGeo.setAttribute("position", new THREE.BufferAttribute(pPos, 3));
pGeo.setAttribute("color", new THREE.BufferAttribute(pCol, 3));
const pPoints = new THREE.Points(pGeo, new THREE.PointsMaterial({
  size: 0.42, vertexColors: true, transparent: true, opacity: 0.95,
  depthWrite: false, sizeAttenuation: true }));
pPoints.frustumCulled = false;
scene.add(pPoints);
const _pc = new THREE.Color();
function spawnParts(x, y, z, n, opt) {
  opt = opt || {};
  const sp = opt.speed || 9, life = opt.life || 0.55, up = opt.up || 0;
  _pc.set(opt.color || 0x7c1109);
  for (let i = 0; i < n; i++) {
    const idx = pCursor; pCursor = (pCursor + 1) % PCOUNT;
    const a = rand(0, TAU), el = rand(-0.6, 1.0);
    const s = pState[idx];
    s.vx = Math.cos(a) * Math.cos(el) * sp * rand(0.3, 1);
    s.vz = Math.sin(a) * Math.cos(el) * sp * rand(0.3, 1);
    s.vy = Math.sin(el) * sp * rand(0.3, 1) + up;
    s.age = 0; s.life = life * rand(0.7, 1.2);
    s.grav = opt.grav == null ? 1 : opt.grav;
    pPos[idx*3] = x; pPos[idx*3+1] = y; pPos[idx*3+2] = z;
    pCol[idx*3] = _pc.r; pCol[idx*3+1] = _pc.g; pCol[idx*3+2] = _pc.b;
  }
}
function updateParts(dt) {
  for (let i = 0; i < PCOUNT; i++) {
    const s = pState[i];
    if (s.age >= s.life) continue;
    s.age += dt;
    if (s.age >= s.life) { pPos[i*3+1] = -999; continue; }
    s.vx *= 0.92; s.vz *= 0.92;
    s.vy = s.vy * 0.96 - 22 * s.grav * dt;
    pPos[i*3]   += s.vx * dt;
    pPos[i*3+1] += s.vy * dt;
    pPos[i*3+2] += s.vz * dt;
  }
  pGeo.attributes.position.needsUpdate = true;
  pGeo.attributes.color.needsUpdate = true;
}

/* floating damage numbers — projected DOM */
const dmgPool = [];
(function () {
  const wrap = document.createElement("div");
  wrap.style.cssText = "position:fixed;inset:0;pointer-events:none;z-index:9";
  document.body.appendChild(wrap);
  for (let i = 0; i < 26; i++) {
    const el = document.createElement("div");
    el.style.cssText = "position:absolute;font-weight:800;display:none;" +
      "text-shadow:0 2px 4px #000";
    wrap.appendChild(el);
    dmgPool.push({ el, x: 0, y: 0, z: 0, age: 0, life: 0 });
  }
})();
function damageNum(x, y, z, n, crit) {
  for (const d of dmgPool) {
    if (d.age < d.life) continue;
    d.x = x; d.y = y; d.z = z; d.age = 0; d.life = crit ? 0.95 : 0.62;
    d.el.textContent = crit ? n + "!" : "" + n;
    d.el.style.color = crit ? "#ffd23a" : "#f0e7d6";
    d.el.style.fontSize = (crit ? 28 : 19) + "px";
    d.el.style.display = "block";
    return;
  }
}
const _proj = new THREE.Vector3();
function updateDmgNums(dt) {
  for (const d of dmgPool) {
    if (d.age >= d.life) continue;
    d.age += dt; d.y += 7 * dt;
    if (d.age >= d.life) { d.el.style.display = "none"; continue; }
    _proj.set(d.x, d.y, d.z).project(camera);
    if (_proj.z > 1) { d.el.style.display = "none"; continue; }
    d.el.style.display = "block";
    d.el.style.left = (_proj.x * 0.5 + 0.5) * innerWidth + "px";
    d.el.style.top = (-_proj.y * 0.5 + 0.5) * innerHeight + "px";
    d.el.style.opacity = clamp(1 - d.age / d.life, 0, 1);
  }
}

/* ─── combat ──────────────────────────────────────────────────────────────── */
function tryAttack() {
  if (player.atk || player.dashT > 0 || !player.alive) return;
  player.atk = true; player.atkT = 0;
  player.atkW = P.atkWindup / player.atkSpeed;
  player.atkS = P.atkStrike / player.atkSpeed;
  player.atkR = P.atkRecover / player.atkSpeed;
  player.atkHits = new Set();
  player.atkSlowT = ATK_SLOW_DUR;        // a swing costs you a step of speed
  Sound.swing();
}
function trySmash() {
  if (player.smashCd > 0 || !player.alive || player.atk) return;
  player.smashCd = P.smashCd * player.cdMul;
  Sound.smash(); shake(0.5);
  const rng = P.smashRange * player.smashRangeMul *
    (1 + (player.smashMul - 1) * 0.5);
  for (const z of zombies) {
    if (z.state === "die") continue;
    const dx = z.x - player.x, dz = z.z - player.z;
    if (Math.hypot(dx, dz) < rng + z.r)
      hitZombie(z, (P.smashDmg + player.level * 2) * player.dmgMul *
        player.smashMul, true, Math.atan2(dx, dz), 3.2);
  }
  spawnParts(player.x, player.y + 0.5, player.z, 46,
    { color: 0xcaa24a, speed: 17, up: 5, life: 0.6 });
  smashRing.show(player.x, player.y + 0.15, player.z, rng);
  grassFlatten = { x: player.x, z: player.z, r: rng + 3, t: 0 };
  flashLight(player.x, player.y + 1, player.z, 0.5);
}
function tryDash() {
  if (player.dashCd > 0 || player.dashT > 0 || !player.alive) return;
  let mx = 0, mz = 0;
  if (keys["KeyW"] || keys["ArrowUp"]) mz -= 1;
  if (keys["KeyS"] || keys["ArrowDown"]) mz += 1;
  if (keys["KeyA"] || keys["ArrowLeft"]) mx -= 1;
  if (keys["KeyD"] || keys["ArrowRight"]) mx += 1;
  if (mx === 0 && mz === 0) {
    mx = Math.sin(player.aim); mz = Math.cos(player.aim);
  }
  player.moveAng = Math.atan2(mx, mz);
  player.dashT = P.dashTime;
  player.dashCd = P.dashCd * player.cdMul * player.dashCdMul;
  player.iframes = P.dashIframes + player.dashIfBonus;
  Sound.dash();
}
function meleeStrike() {
  let hits = 0;
  const range = P.atkRange * player.rangeMul;
  const arc = P.atkArc * Math.min(1.5, player.rangeMul);
  for (const z of zombies) {
    if (z.state === "die" || player.atkHits.has(z)) continue;
    const dx = z.x - player.x, dz = z.z - player.z;
    const dist = Math.hypot(dx, dz);
    if (dist > range + z.r) continue;
    if (Math.abs(angDiff(player.aim, Math.atan2(dx, dz))) > arc) continue;
    player.atkHits.add(z);
    const crit = Math.random() < player.critChance;
    hitZombie(z, P.baseDmg * player.dmgMul * (crit ? player.critMul : 1),
      crit, Math.atan2(dx, dz), 1);
    hits++;
  }
  if (hits) {
    hitStop = 0.045; shake(0.14 + hits * 0.04);
    if (player.lifesteal)
      player.hp = Math.min(player.maxHp, player.hp + player.lifesteal);
  }
}
function hitZombie(z, dmg, crit, ang, knockMul) {
  dmg = Math.max(1, Math.round(dmg));
  z.hp -= dmg; z.flash = 0.13;
  const kb = 9 * (knockMul || 1) / Math.max(0.4, z.r * 0.5);
  z.kx += Math.sin(ang) * kb; z.kz += Math.cos(ang) * kb;
  z.stagger = Math.max(z.stagger, 0.15);
  const d = ETYPES[z.type];
  spawnParts(z.x, z.y + d.h * 0.5, z.z, crit ? 22 : 13,
    { color: 0x7c1109, speed: crit ? 13 : 9 });
  damageNum(z.x, z.y + d.h, z.z, dmg, crit);
  crit ? Sound.crit() : Sound.hit();
  if (z.hp <= 0 && z.state !== "die") killZombie(z);
}
function killZombie(z) {
  z.state = "die"; z.dieT = 0;
  zombiesAlive--;
  kills++; score += ETYPES[z.type].xp;
  gainXp(ETYPES[z.type].xp);
  spawnParts(z.x, z.y + 1, z.z, 26, { color: 0x7c1109, speed: 10 });
  Sound.die();
  if (Math.random() < (z.type === "giant" ? 1 :
      z.type === "brute" ? 0.5 : 0.14))
    spawnOrb(z.x, z.z);
}

  { n: "Bulwark",      d: "+34 health and -8% damage taken",
    a: () => { player.maxHp += 34; player.hp += 34;
      player.dmgTakenMul = Math.max(0.2, player.dmgTakenMul - 0.08); } },
];

/* ─── progression & waves ─────────────────────────────────────────────────── */
let wave = 0, kills = 0, score = 0, zombiesAlive = 0;
let waveState = "fight", toSpawn = [], spawnT = 0, waveCountPrev = 0;
let levelFx = 0;

function gainXp(n) {
  player.xp += Math.round(n * player.xpMul);
  while (player.xp >= player.xpNext) {
    player.xp -= player.xpNext;
    player.level++;
    player.xpNext = Math.round(26 * Math.pow(player.level, 1.7));
    player.hp = Math.min(player.maxHp, player.hp + 14);
    levelFx = 1; Sound.levelup();
    spawnParts(player.x, player.y + 1.5, player.z, 40,
      { color: 0xffe27a, speed: 11, up: 6, life: 0.9, grav: 0.4 });
    // every level → allocate a core stat
    queueChoice({ kind: "stat",
      title: "LEVEL " + player.level + " — ALLOCATE A STAT", opts: STATS });
  }
}
function startWave(n) {
  wave = n;
  toSpawn = [];
  // 10% more of the horde than the wave before — compounding pressure
  let count;
  if (n === 1) count = 12;
  else count = Math.max(waveCountPrev + 1, Math.round(waveCountPrev * 1.10));
  waveCountPrev = count;
  for (let i = 0; i < count; i++) {
    const r = Math.random();
    let t = "shambler";
    if (n >= 3 && r < 0.32) t = "runner";
    if (n >= 5 && r > 0.80) t = "brute";
    toSpawn.push(t);
  }
  if (n % 5 === 0) { toSpawn.push("giant"); if (n >= 15) toSpawn.push("giant"); }
  spawnT = 0.6;
  waveState = "fight";
  banner(n % 5 === 0 ? "Something vast stirs" : "The horde presses in",
    "WAVE " + n);
  Sound.wave();
}
function updateWaves(dt) {
  if (levelFx > 0) levelFx -= dt * 1.4;
  if (waveState !== "fight") return;
  if (toSpawn.length) {
    spawnT -= dt;
    if (spawnT <= 0 && zombiesAlive < 40) {
      spawnZombie(toSpawn.pop());
      spawnT = Math.max(0.18, 0.8 - wave * 0.03);
    }
  } else if (zombiesAlive <= 0) {
    waveState = "intermission";
    // the wave ends — game pauses — choose a skill (NOT a stat)
    queueChoice({ kind: "skill",
      title: "WAVE " + wave + " CLEARED — CHOOSE A SKILL",
      opts: pick3(SKILLS) });
  }
}

/* ─── loot orbs ───────────────────────────────────────────────────────────── */
let orbs = [];
const orbGeo = new THREE.IcosahedronGeometry(0.55, 0);
const orbMat = new THREE.MeshBasicMaterial({ color: 0xff5a4a });
function spawnOrb(x, z) {
  const m = new THREE.Mesh(orbGeo, orbMat);
  m.position.set(x, groundHeight(x, z) + 1, z);
  scene.add(m);
  orbs.push({ obj: m, x, z, t: 0 });
}
function updateOrbs(dt) {
  for (let i = orbs.length - 1; i >= 0; i--) {
    const o = orbs[i]; o.t += dt;
    const dx = player.x - o.x, dz = player.z - o.z;
    const dist = Math.hypot(dx, dz);
    if (dist < 16) {
      o.x += dx / (dist || 1) * 22 * dt;
      o.z += dz / (dist || 1) * 22 * dt;
    }
    o.obj.position.set(o.x, groundHeight(o.x, o.z) + 1
      + Math.sin(o.t * 4) * 0.3, o.z);
    o.obj.rotation.y += dt * 2.4;
    if (dist < 2.6) {
      player.hp = Math.min(player.maxHp,
        player.hp + Math.round(player.maxHp * 0.22));
      Sound.pickup();
      spawnParts(o.x, o.obj.position.y, o.z, 12,
        { color: 0xff5a4a, speed: 8 });
      scene.remove(o.obj); orbs.splice(i, 1);
    }
  }
}

/* ─── camera shake + light flashes ────────────────────────────────────────── */
let camShake = 0;
function shake(a) { camShake = Math.min(1.4, camShake + a); }
// pooled flash lights — kept in the scene at intensity 0 so the light
// count never changes (a changing count forces shader recompiles).
const flashPool = [];
for (let i = 0; i < 3; i++) {
  const l = new THREE.PointLight(0xffd27a, 0, 26, 2);
  scene.add(l);
  flashPool.push({ l, age: 0, life: 0, on: false });
}
function flashLight(x, y, z, life) {
  for (const f of flashPool) {
    if (f.on) continue;
    f.on = true; f.age = 0; f.life = life || 0.4;
    f.l.position.set(x, y, z); f.l.intensity = 6;
    return;
  }
}
function updateFlashes(dt) {
  for (const f of flashPool) {
    if (!f.on) continue;
    f.age += dt;
    f.l.intensity = 6 * Math.max(0, 1 - f.age / f.life);
    if (f.age >= f.life) { f.on = false; f.l.intensity = 0; }
  }
}

/* ─── smash ring effect ───────────────────────────────────────────────────── */
const smashRing = (() => {
  const geo = new THREE.RingGeometry(0.9, 1.0, 40);
  geo.rotateX(-Math.PI / 2);
  const m = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({
    color: 0xffd680, transparent: true, opacity: 0, side: THREE.DoubleSide }));
  scene.add(m);
  let t = 0, max = 0, on = false;
  return {
    show(x, y, z, r) { m.position.set(x, y, z); t = 0; max = r; on = true; },
    update(dt) {
      if (!on) return;
      t += dt;
      const k = t / 0.42;
      if (k >= 1) { on = false; m.material.opacity = 0; return; }
      const s = k * max;
      m.scale.set(s, 1, s);
      m.material.opacity = (1 - k) * 0.75;
    },
  };
})();

/* swing arc visual */
const swingArc = (() => {
  const geo = new THREE.RingGeometry(P.atkRange * 0.32, P.atkRange, 22, 1,
    -P.atkArc, P.atkArc * 2);
  geo.rotateX(-Math.PI / 2);
  const m = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({
    color: 0xfff2dc, transparent: true, opacity: 0, side: THREE.DoubleSide }));
  m.visible = false;
  scene.add(m);
  return m;
})();

/* choice screen — pauses the game; cards are disabled briefly so a click

/* ─── state machine ───────────────────────────────────────────────────────── */

  orbs = [];
  for (let i = 0; i < PCOUNT; i++) { pState[i].life = 0; pPos[i*3+1] = -999; }

  grassFlatten = null; levelFx = 0;

/* ─── update ──────────────────────────────────────────────────────────────── */
function hurtPlayer(amt) {
  if (!player.alive || player.iframes > 0) return;
  amt = Math.round(amt * player.dmgTakenMul);
  player.hp -= amt; player.hurt = 0.4;
  Sound.hurt(); shake(0.5);
  if (player.hp <= 0) { player.hp = 0; player.alive = false; gameOver(); }
}
function updatePlayer(dt) {
  const e = player; e.t += dt;
  // aim — raycast the cursor onto the ground plane
  aimPlane.constant = -e.y;
  raycaster.setFromCamera(ndc, camera);
  if (raycaster.ray.intersectPlane(aimPlane, _hit)) {
    e.aim = Math.atan2(_hit.x - e.x, _hit.z - e.z);
  }
  if (e.atkSlowT > 0) e.atkSlowT -= dt;

  if (e.dashT > 0) {
    e.dashT -= dt;
    e.x = clamp(e.x + Math.sin(e.moveAng) * P.dashSpeed * dt,
      -ARENA + P.r, ARENA - P.r);
    e.z = clamp(e.z + Math.cos(e.moveAng) * P.dashSpeed * dt,
      -ARENA + P.r, ARENA - P.r);
    e.moving = true;
  } else {
    let mx = 0, mz = 0;
    if (keys["KeyW"] || keys["ArrowUp"]) mz -= 1;
    if (keys["KeyS"] || keys["ArrowDown"]) mz += 1;
    if (keys["KeyA"] || keys["ArrowLeft"]) mx -= 1;
    if (keys["KeyD"] || keys["ArrowRight"]) mx += 1;
    e.moving = mx !== 0 || mz !== 0;
    if (e.moving) {
      const inv = 1 / Math.hypot(mx, mz);
      // hitting slows you: a fading penalty on your stride
      const slow = 1 - ATK_SLOW_AMT * clamp(e.atkSlowT / ATK_SLOW_DUR, 0, 1);
      const sp = P.speed * e.moveMul * slow;
      e.x = clamp(e.x + mx * inv * sp * dt, -ARENA + P.r, ARENA - P.r);
      e.z = clamp(e.z + mz * inv * sp * dt, -ARENA + P.r, ARENA - P.r);
      e.moveAng = Math.atan2(mx, mz);
      e.walkP += dt * 13;
      e.stepT -= dt;
      if (e.stepT <= 0) { Sound.step(); e.stepT = 0.32; }
    } else e.walkP += dt * 4;
  }
  e.y = groundHeight(e.x, e.z);

  if (e.smashCd > 0) e.smashCd -= dt;
  if (e.dashCd > 0) e.dashCd -= dt;
  if (e.iframes > 0) e.iframes -= dt;
  if (e.hurt > 0) e.hurt -= dt;
  if (e.regen > 0 && e.hp < e.maxHp)
    e.hp = Math.min(e.maxHp, e.hp + e.regen * dt);

  if (mouseDown && !e.atk && e.dashT <= 0) tryAttack();
  if (e.atk) {
    e.atkT += dt;
    if (e.atkT >= e.atkW && e.atkT < e.atkW + e.atkS) meleeStrike();
    if (e.atkT >= e.atkW + e.atkS + e.atkR) e.atk = false;
  }
  if (e.hp < e.maxHp * 0.28 && e.alive) {
    heartT -= dt;
    if (heartT <= 0) { Sound.heart(); heartT = 0.95; }
  }
  poseSurvivor();
}
function poseSurvivor() {
  const e = player, o = e.obj, u = o.userData;
  o.rotation.y = e.aim;
  const bob = e.moving ? Math.abs(Math.sin(e.walkP)) * 0.22 : 0;
  o.position.set(e.x, e.y + bob, e.z);
  const sw = e.moving ? 0.7 : 0.06;
  u.legs[0].rotation.x = Math.sin(e.walkP) * sw;
  u.legs[1].rotation.x = Math.sin(e.walkP + Math.PI) * sw;
  let arm = -0.4;
  if (e.atk) {
    const a = e.atkT, w = e.atkW, s = e.atkS, r = e.atkR;
    if (a < w) arm = lerp(-0.4, -2.4, easeOut(a / w));
    else if (a < w + s) arm = lerp(-2.4, 1.5, easeIn((a - w) / s));
    else arm = lerp(1.5, -0.4, clamp((a - w - s) / r, 0, 1));
  }
  u.arm.rotation.y = arm;
  u.arm.rotation.x = -0.2 + (e.atk ? -0.3 : 0);
  if (e.atk && e.atkT >= e.atkW && e.atkT < e.atkW + e.atkS + 0.05) {
    const k = clamp((e.atkT - e.atkW) / e.atkS, 0, 1);
    swingArc.visible = true;
    swingArc.position.set(e.x, e.y + 0.2, e.z);
    swingArc.rotation.y = e.aim - Math.PI / 2;
    swingArc.scale.setScalar(player.rangeMul);
    swingArc.material.opacity = (1 - k) * 0.7;
  } else swingArc.visible = false;
}
function updateZombies(dt) {
  for (let i = zombies.length - 1; i >= 0; i--) {
    const z = zombies[i], d = ETYPES[z.type];
    z.t += dt;
    if (z.flash > 0) z.flash -= dt;
    if (z.state === "die") {
      z.dieT += dt;
      const k = clamp(z.dieT / 0.8, 0, 1);
      z.obj.rotation.x = k * 1.5;
      z.obj.position.y = groundHeight(z.x, z.z) - k * 1.6;
      z.obj.scale.setScalar(1 - k * 0.4);
      if (z.dieT > 0.85) { scene.remove(z.obj); zombies.splice(i, 1); }
      continue;
    }
    z.x += z.kx * dt; z.z += z.kz * dt;
    z.kx *= 0.84; z.kz *= 0.84;
    z.x = clamp(z.x, -ARENA + 2, ARENA - 2);
    z.z = clamp(z.z, -ARENA + 2, ARENA - 2);
    if (z.stagger > 0) z.stagger -= dt;
    else {
      const dx = player.x - z.x, dz = player.z - z.z;
      const dist = Math.hypot(dx, dz) || 1;
      const reach = z.r + P.r + 0.6;
      if (dist > reach) {
        z.state = "chase";
        z.x += dx / dist * z.speed * dt;
        z.z += dz / dist * z.speed * dt;
        z.walkP += dt * (4 + z.speed * 0.4);
      } else {
        z.state = "attack";
        z.atkCd -= dt;
        if (z.atkCd <= 0) {
          z.atkCd = z.type === "runner" ? 0.8 : 1.15;
          // the dead hit harder, and harder still each wave
          hurtPlayer(d.dmg * (1 + (wave - 1) * 0.13));
        }
      }
      for (let j = i - 1; j >= 0; j--) {
        const o = zombies[j];
        if (o.state === "die") continue;
        const ox = z.x - o.x, oz = z.z - o.z;
        const od = Math.hypot(ox, oz), mn = z.r + o.r;
        if (od > 0 && od < mn) {
          const pu = (mn - od) / od * 0.5;
          z.x += ox * pu; z.z += oz * pu;
          o.x -= ox * pu; o.z -= oz * pu;
        }
      }
    }
    z.groanT -= dt;
    if (z.groanT <= 0) {
      if (Math.hypot(player.x - z.x, player.z - z.z) < 60) Sound.groan();
      z.groanT = rand(5, 13);
    }
    poseZombie(z, d);
  }
}
const _camQ = new THREE.Quaternion();
function poseZombie(z, d) {
  const o = z.obj, u = o.userData;
  const gy = groundHeight(z.x, z.z);
  o.rotation.y = Math.atan2(player.x - z.x, player.z - z.z);
  const moving = z.state === "chase";
  const amp = moving ? 0.8 : 0.12;
  u.legs[0].rotation.x = Math.sin(z.walkP) * amp;
  u.legs[1].rotation.x = Math.sin(z.walkP + Math.PI) * amp;
  o.position.set(z.x, gy + (moving ? Math.abs(Math.sin(z.walkP)) * 0.18 : 0),
    z.z);
  const lunge = z.state === "attack" ? Math.max(0, Math.sin(z.t * 13)) : 0;
  u.arms[0].rotation.x = -1.0 - lunge * 0.7 + Math.sin(z.walkP) * 0.2;
  u.arms[1].rotation.x = -1.0 - lunge * 0.7 - Math.sin(z.walkP) * 0.2;
  const em = z.flash > 0 ? clamp(z.flash * 7, 0, 1) : 0;
  for (const m of u.mats) m.emissive.setRGB(em, em, em);
  if (z.hp < z.maxHp) {
    u.hp.visible = true;
    u.hp.quaternion.copy(_camQ);
    const f = clamp(z.hp / z.maxHp, 0, 1);
    u.hpFill.scale.x = f;
    u.hpFill.position.x = -(1 - f) * u.hpW * 0.5;
  } else u.hp.visible = false;
}
function updateCamera(dt) {
  const tx = player.x + CAM_OFF.x;
  const ty = player.y + CAM_OFF.y;
  const tz = player.z + CAM_OFF.z;
  camera.position.x = lerp(camera.position.x, tx, 0.12);
  camera.position.y = lerp(camera.position.y, ty, 0.12);
  camera.position.z = lerp(camera.position.z, tz, 0.12);
  camShake = Math.max(0, camShake - dt * 3.2);
  if (camShake > 0) {
    camera.position.x += rand(-1, 1) * camShake;
    camera.position.y += rand(-1, 1) * camShake;
  }
  camera.lookAt(player.x, player.y + 2, player.z);
  _camQ.copy(camera.quaternion);
}
function updateAmbient(dt, t) {
  for (const b of braziers) {
    const fl = 1 + Math.sin(t * 9 + b.phase) * 0.22
      + Math.sin(t * 23 + b.phase) * 0.12;
    b.light.intensity = b.base * fl;
    b.flame.scale.set(0.9 + fl * 0.2, fl, 0.9 + fl * 0.2);
  }
  for (const m of mists) {
    m.position.x += m.userData.vx * dt;
    m.position.z += m.userData.vz * dt;
    m.rotation.z += m.userData.spin * dt;
    if (m.position.x > ARENA) m.position.x = -ARENA;
    if (m.position.x < -ARENA) m.position.x = ARENA;
    if (m.position.z > ARENA) m.position.z = -ARENA;
    if (m.position.z < -ARENA) m.position.z = ARENA;
  }
  if (player) moon.target.position.set(player.x, 0, player.z);
}

let clock = 0;
function update(dt) {
  clock += dt;
  updatePlayer(dt);
  updateZombies(dt);
  updateWaves(dt);
  updateOrbs(dt);
  updateParts(dt);
  updateFlashes(dt);
  smashRing.update(dt);
  updateCamera(dt);
  updateGrass(dt, clock);
  updateAmbient(dt, clock);
  updateDmgNums(dt);
  Ambience.update(dt);
  if (bannerT > 0) {
    bannerT -= dt;
    if (bannerT <= 0) UI.banner.style.opacity = "0";
  }
}

/* ─── loop ────────────────────────────────────────────────────────────────── */
let last = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  let dt = (ts - last) / 1000; last = ts;
  if (!dt || dt > 0.05) dt = Math.min(dt || 0.016, 0.05);

  if (state === ST.PLAYING) {
    if (hitStop > 0) hitStop -= dt; else update(dt);
    updateHUD();
  } else if (state === ST.CHOICE) {
    // game is paused; keep effects/camera gently alive
    clock += dt;
    updateParts(dt);
    smashRing.update(dt);
    updateGrass(dt, clock);
    updateAmbient(dt, clock);
    updateCamera(dt);
    updateDmgNums(dt);
  } else if (state === ST.GAMEOVER) {
    gameOverT += dt;
    clock += dt;
    updateParts(dt);
    updateFlashes(dt);
    updateAmbient(dt, clock);
    camShake = Math.max(0, camShake - dt * 3.2);
    if (gameOverT > 1.1 && UI.overAgain.style.visibility === "hidden")
      UI.overAgain.style.visibility = "visible";
  } else if (state === ST.TITLE) {
    clock += dt;
    camera.position.set(
      Math.sin(clock * 0.1) * 34, 24, Math.cos(clock * 0.1) * 34);
    camera.lookAt(0, 3, 0);
    updateAmbient(dt, clock);
  }
  renderer.render(scene, camera);
}

// seat the title camera, then run
camera.position.set(0, 24, 34);
camera.lookAt(0, 3, 0);
moon.target.position.set(0, 0, 0);
requestAnimationFrame(loop);

})();
</script>
